<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { overflow: hidden; margin: 0; padding: 0; background: #000; }
        #overlay {
            position: absolute; inset: 0;
            background: #000; opacity: 1;
            transition: opacity 0.4s ease;
            pointer-events: none; z-index: 10;
        }
        /* CAF protocol vehicle — in caf_wav_sync it produces audio output.
           Invisible but NOT muted. */
        #caf-el {
            position: absolute; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
        }
        /* Video player — muted, visual output only. Manual MSE drives it. */
        #player {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <video id="caf-el" class="castMediaElement"></video>
    <video id="player" playsinline muted></video>
    <div id="overlay"></div>

    <script>
    (function () {
        'use strict';

        // Bump on every receiver change so the settings panel can confirm the Chromecast is
        // running the current build (rules out GitHub Pages / cast-app caching of a stale file).
        var RECEIVER_VERSION = '2026-06-02-r17-balanced-hold';

        // ── CAF init ────────────────────────────────────────────────────────────
        var CHANNEL       = 'urn:x-cast:com.google.cast.media';
        var context       = cast.framework.CastReceiverContext.getInstance();
        var playerManager = context.getPlayerManager();

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE           |
            cast.framework.messages.Command.QUEUE_NEXT      |
            cast.framework.messages.Command.QUEUE_PREV
        );

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.PRELOAD,
            function (req) { return req; }
        );

        // ── Module state ───────────────────────────────────────────────────────
        var _baseUrl     = '';
        var _mode        = '';
        var _syncTimer   = null;  // PLL sync interval
        var _pollTimer   = null;  // m3u8 poll interval
        var _ms          = null;  // MediaSource for manual MSE
        var _sb          = null;  // SourceBuffer
        var _appendQueue = [];    // segments waiting to be appended
        var _appending   = false;
        var _trimming    = false;
        var _loadedSegs  = {};    // sn → true
        var _initLoaded  = false;
        var _segsBuffered = 0;    // count of segments appended to SourceBuffer
        var _epochMs     = -1;    // AudioClockTee position when CAF connected
        var _epochWallMs = -1;    // UTC wall ms at same instant
        var _videoEpochMs = -1;   // AudioClockTee position represented by video PTS 0
        // Cdisp (presentation skew) is now baked into the server's reported audio epoch
        // (epochMs already biased by the connected device's Cdisp), so the receiver targets
        // PURE content equality (videoContentMs == audioContentMs). Kept at 0 so the legacy
        // "- _contentLagMs" terms are no-ops; the server no longer sends contentLagMs.
        var _contentLagMs = 0;
        var _cdispMs     = 0;    // latest Cdisp reported by /cast/audio-clock (raw; baked at anchor)
        var _cdispBaked  = 0;    // Cdisp BAKED into the video target — set once at anchor, then held
                                 // constant; only re-baked on a re-anchor (reanchorSeq change).
        var _lastReanchorSeq = -1; // last reanchorSeq seen; a change = "Save" → one clean re-anchor
        var _reanchorPending = false; // set by the poll on a reanchorSeq change; the drift loop does one clean seek
        var _serverRtt   = 0;    // round-trip time estimate to server
        var _cafPlaying  = false;
        var _videoReady  = false;
        var _maxBufferedWindowSec = 24;
        var _backBufferKeepSec = 10;
        var _lastManifestInfo = null;
        var _lastClockInfo = null;
        var _debugWatchTimer = null;
        var _epochPollTimer = null;  // /cast/audio-clock poll (epoch refresh + reanchor signal)
        var _reportTimer = null;     // sync-report POST interval
        var _lastSeekMs  = 0;        // last seek/anchor wall time (anti seek-storm), module-level

        // Audio-clock health. The PLL syncs VIDEO to the AUDIO clock, so a frozen audio clock (a CAF
        // reconnect, a server blip, a buffering stall) must NOT cause video seeking — that just
        // thrashes against a dead reference (the seek-storm) and, worse, re-derives a garbage epoch
        // from a frozen audioMs. Instead we HOLD: keep playing at rate 1.0, no seeks, no re-anchor,
        // until the audio clock advances again — then the normal PLL re-converges on its own
        // (loss of sync IS recoverable as long as the reference clock is alive).
        var _audioLastMs   = -1;     // last observed audio-clock ms
        var _audioLastWall = 0;      // wall ms when the audio clock last advanced
        var _audioHeld     = false;  // currently holding because audio stalled

        // Sync geometry (seconds / ms). Balance: gentle rate-trim for small drift, ONE clamped
        // in-buffer seek for medium drift, and a bounded RE-ANCHOR only for a GENUINE discontinuity
        // (target well outside the buffer — track change / seek / fast-forward) while the audio
        // clock is healthy. Edge-of-buffer is NOT a discontinuity — it clamps and waits.
        var SEEK_GUARD_SEC      = 0.5;   // keep targets this clear of both buffer edges
        var HEAL_LEAD_SEC       = 4.0;   // on re-anchor, play this far behind the live edge
        var HARD_SEEK_MS        = 1000;  // medium drift → one clamped in-buffer seek
        var REANCHOR_OUTSIDE_SEC = 1.5;  // re-anchor only if the target is outside the buffer by MORE
                                         // than this (a real discontinuity, not a buffer-edge nudge)
        var AUDIO_STALL_MS      = 700;   // audio clock unchanged this long ⇒ HOLD (≈3 sync ticks)

        function _getBufferedRanges(mediaEl) {
            if (!mediaEl || !mediaEl.buffered) return [];
            var ranges = [];
            for (var i = 0; i < mediaEl.buffered.length; i++) {
                var start = mediaEl.buffered.start(i);
                var end = mediaEl.buffered.end(i);
                ranges.push({ start: start, end: end, duration: end - start });
            }
            return ranges;
        }

        function _snapshotSyncState() {
            var player = document.getElementById('player');
            var cafEl = document.getElementById('caf-el');
            var audioClockMs = null;
            var videoClockMs = null;
            var errorMs = null;
            var targetSec = null;
            var bufferAheadSec = null;

            if (cafEl && _epochMs >= 0) audioClockMs = _getAudioClockMs(cafEl);
            if (player && _videoEpochMs >= 0) videoClockMs = _getVideoClockMs(player);
            if (audioClockMs != null && videoClockMs != null) {
                errorMs = videoClockMs - audioClockMs - _cdispBaked;
                targetSec = _getVideoTimeSecForAudioMs(audioClockMs);
            }
            if (player && player.buffered && player.buffered.length > 0) {
                bufferAheadSec = player.buffered.end(player.buffered.length - 1) - player.currentTime;
            }

            var rVFCActive = _rVFCMediaTimeSec >= 0;
            return {
                mode: _mode,
                epochs: {
                    epochMs: _epochMs,
                    epochWallMs: _epochWallMs,
                    videoEpochMs: _videoEpochMs,
                    serverRttMs: _serverRtt
                },
                contentLagMs: _contentLagMs,
                audioOutputLatencyMs: _audioOutputLatencyMs,
                latestClockPoll: _lastClockInfo,
                latestManifest: _lastManifestInfo,
                queue: {
                    pendingAppends: _appendQueue.length,
                    appending: _appending,
                    trimming: _trimming,
                    loadedSegCount: Object.keys(_loadedSegs).length,
                    segsBuffered: _segsBuffered,
                    videoReady: _videoReady,
                    cafPlaying: _cafPlaying
                },
                audio: cafEl ? {
                    currentTime: cafEl.currentTime,
                    paused: cafEl.paused,
                    readyState: cafEl.readyState,
                    computedClockMs: audioClockMs
                } : null,
                video: player ? {
                    currentTime: player.currentTime,
                    paused: player.paused,
                    readyState: player.readyState,
                    playbackRate: player.playbackRate,
                    computedClockMs: videoClockMs,
                    rVFCActive: rVFCActive,
                    rVFCMediaTimeSec: _rVFCMediaTimeSec,
                    rVFCDeltaMs: rVFCActive ? (player.currentTime - _rVFCMediaTimeSec) * 1000 : null,
                    rVFCRenderedCount: _rVFCRenderedCount,
                    targetTimeSecForAudio: targetSec,
                    bufferAheadSec: bufferAheadSec,
                    buffered: _getBufferedRanges(player)
                } : null,
                drift: { errorMs: errorMs },
                nowMs: Date.now()
            };
        }

        window.__cws = {
            state: function () { return _snapshotSyncState(); },
            log: function () {
                var s = _snapshotSyncState();
                console.log('[cws][debug]', s);
                if (console.table && s.video && s.video.buffered) console.table(s.video.buffered);
                return s;
            },
            watch: function (intervalMs) {
                var ms = Math.max(250, intervalMs || 1000);
                if (_debugWatchTimer) clearInterval(_debugWatchTimer);
                _debugWatchTimer = setInterval(function () {
                    var s = _snapshotSyncState();
                    console.log('[cws][watch] err=' + (s.drift.errorMs != null ? s.drift.errorMs.toFixed(0) : 'n/a') +
                                'ms audio=' + (s.audio && s.audio.computedClockMs != null ? (s.audio.computedClockMs / 1000).toFixed(3) : 'n/a') +
                                's video=' + (s.video && s.video.computedClockMs != null ? (s.video.computedClockMs / 1000).toFixed(3) : 'n/a') +
                                's playerT=' + (s.video ? s.video.currentTime.toFixed(3) : 'n/a') +
                                's rate=' + (s.video ? s.video.playbackRate.toFixed(4) : 'n/a') +
                                ' bufAhead=' + (s.video && s.video.bufferAheadSec != null ? s.video.bufferAheadSec.toFixed(3) : 'n/a') + 's');
                }, ms);
                return ms;
            },
            stopWatch: function () {
                if (_debugWatchTimer) clearInterval(_debugWatchTimer);
                _debugWatchTimer = null;
            },
            player: function () { return document.getElementById('player'); },
            caf: function () { return document.getElementById('caf-el'); }
        };

        // ── LOAD interceptor ────────────────────────────────────────────────────
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            function (request) {
                var custom = request.media && request.media.customData;
                _baseUrl = (custom && custom.MediaBaseUrl) || '';
                _mode = (custom && custom.HlsStreamingMode) || '';

                _reset();

                if (_mode === 'caf_wav_sync') {
                    // CAF will load the WAV URL (contentId) onto #caf-el automatically.
                    // We just need to start the video-only MSE pipeline.
                    _startCafWavSync(_baseUrl);
                } else if (_mode === 'fmp4_muxed') {
                    // Legacy muxed mode — silence CAF, use hls.js for A+V
                    _silenceCaf();
                    _startMuxed(_baseUrl);
                } else {
                    console.error('[receiver] Unsupported mode: ' + _mode);
                    _showOverlay(1);
                }

                return request;
            }
        );

        // ── CAF PAUSE ──────────────────────────────────────────────────────────
        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, function () {
            _showOverlay(1);
            var p = document.getElementById('player');
            if (p && !p.paused) p.pause();
            _cafPlaying = false;
            _postAck('PAUSED');
            setTimeout(function () { _showOverlay(0); }, 1500);
        });

        // ── CAF PLAYING ────────────────────────────────────────────────────────
        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, function () {
            _cafPlaying = true;
            if (_mode === 'caf_wav_sync') {
                // CAF now owns audio — do NOT silence it
                var p = document.getElementById('player');
                if (p && p.paused) p.play().catch(function () {});
            } else {
                _silenceCaf();
                var p2 = document.getElementById('player');
                if (p2 && p2.paused) p2.play().catch(function () {});
            }
            _postAck('PLAYING');
        });

        // ── Queue next / prev ──────────────────────────────────────────────────
        playerManager.addEventListener(
            cast.framework.events.EventType.REQUEST_QUEUE_UPDATE,
            function (event) {
                var next = event.requestData && event.requestData.jump === 1;
                context.sendCustomMessage(CHANNEL, undefined, {
                    type:    next ? 'NEXT' : 'PREVIOUS',
                    message: next ? 'NEXT' : 'PREVIOUS',
                });
            }
        );

        // ── Sender disconnected ────────────────────────────────────────────────
        context.addEventListener(
            cast.framework.system.EventType.SENDER_DISCONNECTED,
            function () { context.stop(); }
        );

        // ── CAF options + start ────────────────────────────────────────────────
        var options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = {};
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600;
        options.mediaElement = document.getElementById('caf-el');
        context.start(options);

        // ══════════════════════════════════════════════════════════════════════
        // caf_wav_sync mode
        //
        // Audio: CAF plays lossless WAV via #caf-el (hardware audio pipeline,
        //        no MSE, no JavaScript in audio path).
        // Video: Manual MSE loads video-only H.264 fMP4 segments from
        //        /cast/split_video/ into #player (muted).
        // Sync:  PLL (phase-locked loop) continuously adjusts #player.playbackRate
        //        so video tracks the audio clock. No seeks except >2s drift.
        //
        // Epoch model:
        //   Server exposes /cast/audio-clock → {epochMs, epochWallMs, videoEpochMs, serverNowMs}
        //   epochMs      = AudioClockTee sample position (ms) when CAF HTTP client connected
        //   videoEpochMs = AudioClockTee sample position (ms) represented by video PTS 0
        //   CAF audio position = epochMs + cafEl.currentTime * 1000
        //   Video position     = videoEpochMs + player.currentTime * 1000
        //   Sync target: videoNowMs ≈ audioNowMs
        // ══════════════════════════════════════════════════════════════════════

        function _startCafWavSync(baseUrl) {
            var player = document.getElementById('player');
            if (!player) { console.error('[cws] #player missing'); return; }
            player.muted = true;

            _showOverlay(1);
            console.log('[cws] Starting caf_wav_sync pipeline');

            // Measure device audio output latency once before anything starts.
            // Posted to server in the first sync-report so contentLagMs can be
            // calibrated automatically per device without manual config.
            _measureAudioOutputLatency();

            // Step 1: Wait for audio clock epoch (CAF has connected to /cast/caf-audio)
            _waitForEpoch(baseUrl, function () {
                console.log('[cws] Epoch acquired: epochMs=' + _epochMs + ' epochWallMs=' + _epochWallMs + ' videoEpochMs=' + _videoEpochMs);
                // Step 2: Set up manual MSE for video
                _initVideoMSE(player, baseUrl);
            });
        }

        // rVFC state — updated by requestVideoFrameCallback once player is playing.
        // _rVFCMediaTimeSec is the PTS of the most recently *displayed* frame (not just
        // decoded). _getVideoClockMs uses this instead of player.currentTime to eliminate
        // the ~1-frame display-pipeline offset from the PLL error signal.
        var _rVFCMediaTimeSec = -1;
        var _rVFCRenderedCount = 0;
        // Measured audio output latency (ms) — AudioContext.outputLatency, read once on
        // startup and reported to the server so it can compute contentLagMs accurately.
        var _audioOutputLatencyMs = -1;

        // Measure AudioContext.outputLatency without producing any sound.
        function _measureAudioOutputLatency() {
            try {
                var ctx = new (window.AudioContext || window.webkitAudioContext)();
                _audioOutputLatencyMs = Math.round((ctx.outputLatency || 0) * 1000);
                ctx.close();
                console.log('[cws] AudioContext.outputLatency=' + _audioOutputLatencyMs + 'ms');
            } catch(e) {
                console.warn('[cws] AudioContext not available: ' + e);
                _audioOutputLatencyMs = 0;
            }
        }

        // Poll /cast/audio-clock until both epochs are available.
        // Retries indefinitely — no timeout — because preroll + encoder startup
        // can legitimately take >30 s on slow hardware or cold app launches.
        function _waitForEpoch(baseUrl, cb) {
            var attempt = 0;
            (function poll() {
                var t0 = Date.now();
                fetch(baseUrl + 'cast/audio-clock')
                    .then(function (r) { return r.json(); })
                    .then(function (d) {
                        _serverRtt = Date.now() - t0;
                        _lastClockInfo = {
                            audioMs: d.audioMs,
                            epochMs: d.epochMs,
                            epochWallMs: d.epochWallMs,
                            videoEpochMs: d.videoEpochMs,
                            serverNowMs: d.serverNowMs,
                            receiverNowMs: Date.now(),
                            receiverRttMs: _serverRtt
                        };
                        if (d.epochMs >= 0 && d.videoEpochMs >= 0) {
                            _epochMs      = d.epochMs;
                            _epochWallMs  = d.epochWallMs;
                            _videoEpochMs = d.videoEpochMs;
                            _cdispMs      = (typeof d.cdispMs === 'number') ? d.cdispMs : 0;
                            // BAKE the offset once at this anchor; the drift loop holds it constant.
                            _cdispBaked      = _cdispMs;
                            _lastReanchorSeq = (typeof d.reanchorSeq === 'number') ? d.reanchorSeq : 0;
                            cb();
                        } else {
                            attempt++;
                            // Log every 10 attempts (~5 s) so the console shows progress
                            if (attempt % 10 === 0)
                                console.log('[cws] Waiting for epochs (attempt ' + attempt + ')...');
                            setTimeout(poll, 500);
                        }
                    })
                    .catch(function () {
                        attempt++;
                        setTimeout(poll, 1000);
                    });
            })();
        }

        // Builds the exact RFC6381 codec string from the init segment's avcC box
        // (configurationVersion, AVCProfileIndication, profile_compatibility, AVCLevelIndication)
        // so the SourceBuffer codec matches the stream's real profile/level. A hardcoded
        // avc1.640029 was silently rejected by this device's hardware decoder when the encoder
        // produced a different level → empty buffer → blank video.
        function _codecFromInit(u8) {
            for (var i = 0; i + 8 < u8.length; i++) {
                if (u8[i] === 0x61 && u8[i + 1] === 0x76 && u8[i + 2] === 0x63 && u8[i + 3] === 0x43) { // 'avcC'
                    var hx = function (b) { return ('0' + b.toString(16)).slice(-2); };
                    return 'video/mp4; codecs="avc1.' + hx(u8[i + 5]) + hx(u8[i + 6]) + hx(u8[i + 7]) + '"';
                }
            }
            return null;
        }

        function _logSbError(tag) {
            var p = document.getElementById('player');
            var me = p && p.error ? { code: p.error.code, message: p.error.message } : null;
            // code 2=NETWORK (mixed-content?), 3=DECODE (codec), 4=SRC_NOT_SUPPORTED (codec)
            console.error('[cws] ' + tag + ' player.error=' + JSON.stringify(me) +
                ' msState=' + (_ms && _ms.readyState) +
                ' sbUpdating=' + (_sb && _sb.updating) +
                ' buffered=' + (_sb && _sb.buffered.length ? (_sb.buffered.start(0).toFixed(2) + '-' + _sb.buffered.end(_sb.buffered.length - 1).toFixed(2)) : 'empty'));
        }

        // Set up MediaSource + SourceBuffer for video-only fMP4. Fetches init first so the
        // SourceBuffer is created with the stream's exact codec.
        function _initVideoMSE(player, baseUrl) {
            _ms = new MediaSource();
            player.src = URL.createObjectURL(_ms);
            player.onerror = function () { _logSbError('video element error.'); };

            _ms.addEventListener('sourceopen', function () {
                console.log('[cws] MediaSource opened');
                fetch(baseUrl + 'cast/split_video/init.mp4')
                    .then(function (r) { if (!r.ok) throw new Error('init.mp4 HTTP ' + r.status); return r.arrayBuffer(); })
                    .then(function (buf) {
                        var u8 = new Uint8Array(buf);
                        var codec = _codecFromInit(u8);
                        var fallbacks = ['video/mp4; codecs="avc1.640029"', 'video/mp4; codecs="avc1.4d401f"', 'video/mp4; codecs="avc1.42E01E"'];
                        if (!codec || !MediaSource.isTypeSupported(codec)) {
                            console.warn('[cws] codec from init (' + codec + ') unsupported; trying fallbacks');
                            for (var k = 0; k < fallbacks.length; k++) { if (MediaSource.isTypeSupported(fallbacks[k])) { codec = fallbacks[k]; break; } }
                        }
                        console.log('[cws] MSE codec (from init): ' + codec);
                        try {
                            _sb = _ms.addSourceBuffer(codec);
                        } catch (e) {
                            console.error('[cws] addSourceBuffer failed:', e, 'codec=' + codec);
                            return;
                        }
                        _sb.mode = 'segments';
                        _sb.addEventListener('updateend', _drainAppendQueue);
                        _sb.addEventListener('error', function () { _logSbError('SourceBuffer error.'); });

                        _queueAppend(u8, function () {
                            _initLoaded = true;
                            console.log('[cws] init.mp4 appended (' + u8.length + ' bytes)');
                            _pollManifest(baseUrl);
                        });
                    })
                    .catch(function (e) {
                        console.error('[cws] init.mp4 fetch failed:', e, '— retrying');
                        setTimeout(function () { _initVideoMSE(player, baseUrl); }, 2000);
                    });
            });
        }

        function _loadInitSegment(baseUrl, cb) {
            fetch(baseUrl + 'cast/split_video/init.mp4')
                .then(function (r) {
                    if (!r.ok) throw new Error('init.mp4 HTTP ' + r.status);
                    return r.arrayBuffer();
                })
                .then(function (buf) {
                    _queueAppend(new Uint8Array(buf), cb);
                })
                .catch(function (e) {
                    console.error('[cws] init.mp4 fetch failed:', e);
                    // Retry after 2s
                    setTimeout(function () { _loadInitSegment(baseUrl, cb); }, 2000);
                });
        }

        // Parse m3u8, fetch new segments, schedule next poll
        function _pollManifest(baseUrl) {
            var manifestUrl = baseUrl + 'cast/split_video/stream.m3u8';
            fetch(manifestUrl)
                .then(function (r) {
                    if (!r.ok) throw new Error('m3u8 HTTP ' + r.status);
                    return r.text();
                })
                .then(function (text) {
                    var parsed = _parseM3u8(text);
                    _lastManifestInfo = {
                        fetchedAtMs: Date.now(),
                        mediaSeq: parsed.mediaSeq,
                        targetDuration: parsed.targetDuration,
                        segmentCount: parsed.segments.length,
                        firstSegment: parsed.segments.length > 0 ? parsed.segments[0] : null,
                        lastSegment: parsed.segments.length > 0 ? parsed.segments[parsed.segments.length - 1] : null
                    };
                    var newFrags = [];
                    for (var i = 0; i < parsed.segments.length; i++) {
                        var seg = parsed.segments[i];
                        if (!_loadedSegs[seg.sn]) {
                            newFrags.push(seg);
                            _loadedSegs[seg.sn] = true;
                        }
                    }
                    if (newFrags.length > 0) {
                        _fetchSegments(baseUrl, newFrags, 0);
                    }
                    // Schedule next poll: target duration / 2 (HLS spec recommendation)
                    var pollMs = Math.max(500, (parsed.targetDuration || 1) * 500);
                    _pollTimer = setTimeout(function () { _pollManifest(baseUrl); }, pollMs);
                })
                .catch(function (e) {
                    console.warn('[cws] m3u8 fetch failed:', e);
                    _pollTimer = setTimeout(function () { _pollManifest(baseUrl); }, 2000);
                });
        }

        // Fetch segments sequentially (preserve decode order)
        function _fetchSegments(baseUrl, segs, idx) {
            if (idx >= segs.length) return;
            var seg = segs[idx];
            fetch(baseUrl + 'cast/split_video/' + seg.uri)
                .then(function (r) {
                    if (!r.ok) throw new Error(seg.uri + ' HTTP ' + r.status);
                    return r.arrayBuffer();
                })
                .then(function (buf) {
                    _queueAppend(new Uint8Array(buf), function (appendErr) {
                        if (appendErr) {
                            console.warn('[cws] Segment ' + seg.sn + ' append failed:', appendErr);
                            _fetchSegments(baseUrl, segs, idx + 1);
                            return;
                        }
                        _segsBuffered++;
                        console.log('[cws] Segment ' + seg.sn + ' buffered (' + _segsBuffered + ' total)');
                        // Wait for preroll (5 segments ≈ 5s at hls_time=1) before starting playback
                        if (!_videoReady && _segsBuffered >= 5) {
                            _videoReady = true;
                            _startVideoPlayback();
                        }
                        // Fetch next segment
                        _fetchSegments(baseUrl, segs, idx + 1);
                    });
                })
                .catch(function (e) {
                    console.warn('[cws] segment fetch failed:', e);
                    // Skip and continue
                    _fetchSegments(baseUrl, segs, idx + 1);
                });
        }

        // SourceBuffer append queue — ensures only one appendBuffer at a time
        function _queueAppend(data, cb) {
            _appendQueue.push({ data: data, cb: cb });
            _drainAppendQueue();
        }

        // True only when the SourceBuffer is still attached to an OPEN MediaSource. Reading
        // _sb.buffered / .updating on a SourceBuffer that has been removed from its parent
        // MediaSource (e.g. after _reset() ends the stream on calibration-stop / track-change)
        // throws an InvalidStateError DOMException, so callers must gate on this first.
        function _sbReady() {
            if (!_ms || !_sb || _ms.readyState !== 'open') return false;
            try {
                var list = _ms.sourceBuffers;
                for (var i = 0; i < list.length; i++) if (list[i] === _sb) return true;
            } catch (e) {}
            return false;
        }

        function _trimBufferedVideo(aggressive) {
            if (_trimming || !_sbReady()) return false;

            // Capture the SourceBuffer instance so a teardown that swaps/nulls _sb mid-flight
            // can't make the updateend callback operate on the wrong (or detached) buffer.
            var sb = _sb;
            var firstStart, trimEnd;
            try {
                if (sb.updating) return false;
                var buffered = sb.buffered;
                if (!buffered || buffered.length === 0) return false;

                var player = document.getElementById('player');
                var currentTime = player ? (player.currentTime || 0) : 0;
                firstStart = buffered.start(0);
                var lastEnd = buffered.end(buffered.length - 1);
                var maxWindowSec = aggressive ? 16 : _maxBufferedWindowSec;
                var backBufferKeepSec = aggressive ? 6 : _backBufferKeepSec;
                trimEnd = Math.max(
                    currentTime > 0.5 ? currentTime - backBufferKeepSec : 0,
                    lastEnd - maxWindowSec
                );

                if (!(trimEnd > firstStart + 0.25)) return false;

                _trimming = true;
                console.log('[cws] Trimming video buffer ' + firstStart.toFixed(2) + 's..' + trimEnd.toFixed(2) + 's');
                sb.remove(firstStart, trimEnd);
            } catch (e) {
                _trimming = false;
                console.warn('[cws] buffer trim skipped:', e && e.message);
                return false;
            }

            var onTrimEnd = function () {
                try { sb.removeEventListener('updateend', onTrimEnd); } catch (e) {}
                _trimming = false;
            };
            sb.addEventListener('updateend', onTrimEnd);
            return true;
        }

        function _isQuotaExceededError(e) {
            if (!e) return false;
            return e.name === 'QuotaExceededError' ||
                (typeof e.message === 'string' && /SourceBuffer is full|quota/i.test(e.message));
        }

        function _drainAppendQueue() {
            if (_appending || _appendQueue.length === 0 || !_sbReady()) return;
            var sb = _sb;
            try { if (sb.updating) return; } catch (e) { return; }
            if (_trimBufferedVideo(false)) return;
            _appending = true;
            var item = _appendQueue.shift();
            try {
                sb.appendBuffer(item.data);
            } catch (e) {
                _appending = false;
                if (_isQuotaExceededError(e)) {
                    console.warn('[cws] appendBuffer hit buffer quota, trimming and retrying:', e);
                    _appendQueue.unshift(item);
                    if (_trimBufferedVideo(true)) return;
                }
                console.error('[cws] appendBuffer error:', e && e.message);
                if (item.cb) item.cb(e);
                // Only keep draining if the SourceBuffer is still usable (avoid a tight loop
                // re-throwing on a detached buffer during teardown).
                if (_sbReady()) _drainAppendQueue();
                return;
            }
            // updateend will fire → _drainAppendQueue called again
            var onEnd = function () {
                try { sb.removeEventListener('updateend', onEnd); } catch (e) {}
                _appending = false;
                if (item.cb) item.cb(null);
                _drainAppendQueue();
            };
            sb.addEventListener('updateend', onEnd);
        }

        // Start video playback + PLL sync loop
        function _startVideoPlayback() {
            var player = document.getElementById('player');
            var cafEl  = document.getElementById('caf-el');
            if (!player || !cafEl) return;

            // Wait until CAF audio is actually playing before starting sync.
            // CAF may still be buffering the WAV stream.
            if (!_cafPlaying || cafEl.readyState < 2) {
                console.log('[cws] Waiting for CAF audio to start playing...');
                var waitCaf = setInterval(function () {
                    if (_cafPlaying && cafEl.readyState >= 2) {
                        clearInterval(waitCaf);
                        _startVideoPlayback();
                    }
                }, 250);
                return;
            }

            // Refresh epoch right before starting sync — this is the initial anchor, so BAKE Cdisp.
            var t0 = Date.now();
            fetch(_baseUrl + 'cast/audio-clock')
                .then(function (r) { return r.json(); })
                .then(function (d) {
                    _serverRtt = Date.now() - t0;
                    if (d.epochMs >= 0) {
                        _epochMs     = d.epochMs;
                        _epochWallMs = d.epochWallMs;
                        // _videoEpochMs is NOT taken from the server here — _anchorVideo derives it
                        // from the live edge (the server value goes stale across wall/sample gaps).
                        _cdispMs     = (typeof d.cdispMs === 'number') ? d.cdispMs : 0;
                        _cdispBaked      = _cdispMs;
                        _lastReanchorSeq = (typeof d.reanchorSeq === 'number') ? d.reanchorSeq : 0;
                    }
                    _beginSyncedPlayback(player, cafEl);
                })
                .catch(function () {
                    // Use existing epoch
                    _beginSyncedPlayback(player, cafEl);
                });
        }

        // Clock helpers. Audio clock = PURE CAF content position (epoch + currentTime). The
        // per-device offset (Cdisp) is NOT applied to the live clock — it's BAKED ONCE into the
        // video target as _cdispBaked (held constant; only changes on a re-anchor), so the drift
        // loop never chases a moving offset (which caused the live-seek ping-pong).
        function _getAudioClockMs(cafEl) {
            return _epochMs + cafEl.currentTime * 1000;
        }
        function _getVideoClockMs(player) {
            var t = (_rVFCMediaTimeSec >= 0) ? _rVFCMediaTimeSec : player.currentTime;
            return _videoEpochMs + t * 1000;
        }
        // Video time (s) whose content matches a given audio clock ms, shifted by the baked offset.
        // Steady state targets: videoContent == audioContent + _cdispBaked.
        function _getVideoTimeSecForAudioMs(audioMs) {
            return (audioMs + _cdispBaked - _videoEpochMs) / 1000;
        }

        // ── Self-healing video anchor ────────────────────────────────────────────
        // The single place that positions video against the audio clock. Tolerant of ANY
        // discontinuity (track change, seek, fast-forward, rewind, buffering gap, or a stale
        // server epoch): if the cdisp-correct target is reachable it honors it exactly; if not, it
        // heals to a guaranteed-in-buffer position near the live edge and RE-DERIVES _videoEpochMs
        // so the held relationship (and the Cdisp trim) stays consistent from there on. It never
        // seeks outside the buffered range — an out-of-buffer seek is exactly what froze video.
        function _anchorVideo(player, cafEl, reason) {
            var buf = player.buffered;
            if (!buf || buf.length === 0) return false;
            var bufStart = buf.start(0), bufEnd = buf.end(buf.length - 1);
            var lo = bufStart + SEEK_GUARD_SEC, hi = bufEnd - SEEK_GUARD_SEC;
            if (hi < lo) { lo = hi = (bufStart + bufEnd) / 2; }   // buffer thinner than 2×guard
            var audioMs = _getAudioClockMs(cafEl);
            var ideal = _getVideoTimeSecForAudioMs(audioMs);      // cdisp-correct, current epoch
            var target, healed = false;
            if (ideal >= lo && ideal <= hi) {
                target = ideal;                                   // reachable → honor Cdisp exactly
            } else {
                target = bufEnd - HEAL_LEAD_SEC;                  // unreachable → heal near live edge
                if (target < lo) target = lo;
                if (target > hi) target = hi;
                _videoEpochMs = audioMs + _cdispBaked - target * 1000;   // re-derive so error→0 here
                healed = true;
            }
            _rVFCMediaTimeSec = -1;
            try { player.currentTime = target; } catch (e) {}
            player.playbackRate = 1.0;
            _lastSeekMs = Date.now();
            console.log('[cws] anchor(' + reason + '): ' + (healed ? 'HEAL ' : '') +
                        't=' + target.toFixed(3) + ' buf=[' + bufStart.toFixed(2) + ',' + bufEnd.toFixed(2) + ']' +
                        ' audioMs=' + audioMs.toFixed(0) + ' cdisp=' + _cdispBaked +
                        (healed ? (' → videoEpochMs=' + Math.round(_videoEpochMs)) : ''));
            return true;
        }

        function _beginSyncedPlayback(player, cafEl) {
            // Wait only until there is a minimal buffer to anchor against. We do NOT require the
            // buffer to "extend past the audio position" (the old forward-only assumption that hung
            // forever when the live edge sat ahead of a stale audio target) — _anchorVideo
            // self-heals to whatever is actually playable, in either direction.
            var buf = player.buffered;
            var bufLenSec = buf.length > 0 ? (buf.end(buf.length - 1) - buf.start(0)) : 0;
            if (bufLenSec < 2 * SEEK_GUARD_SEC) {
                setTimeout(function () { _beginSyncedPlayback(player, cafEl); }, 300);
                return;
            }

            _anchorVideo(player, cafEl, 'start');
            player.play().catch(function () {});
            console.log('[cws] Video playback started at ' + player.currentTime.toFixed(3) +
                        's, epochMs=' + _epochMs + ' videoEpochMs=' + Math.round(_videoEpochMs) +
                        ' cafT=' + cafEl.currentTime.toFixed(3));

            _showOverlay(0);

            // ── requestVideoFrameCallback loop ────────────────────────────
            // Updates _rVFCMediaTimeSec with the PTS of the frame actually on
            // screen (not just decoded). _getVideoClockMs uses this so the PLL
            // error signal reflects the displayed frame, eliminating the
            // ~1-frame (~33 ms) decode-to-display pipeline offset.
            if (typeof player.requestVideoFrameCallback === 'function') {
                console.log('[cws] requestVideoFrameCallback available — using display-accurate video clock');
                (function rVFCLoop(now, meta) {
                    // Only accept real callbacks (mediaTime > 0), not the synthetic bootstrap.
                    if (meta && typeof meta.mediaTime === 'number' && meta.mediaTime > 0) {
                        _rVFCMediaTimeSec = meta.mediaTime;
                        _rVFCRenderedCount++;
                    }
                    player.requestVideoFrameCallback(rVFCLoop);
                })(0, {});
            } else {
                console.log('[cws] requestVideoFrameCallback not available — falling back to player.currentTime');
            }

            // ── Drift-trim sync loop ───────────────────────────────────────
            // Cdisp is baked into the server's reported epoch, so the target is PURE content
            // equality (videoContentMs == audioContentMs; _contentLagMs == 0). Both streams
            // ride the same audio sample clock, so steady-state error stays within a small
            // dead band — this loop only trims slow drift. playbackRate affects the MUTED
            // video only (audio is separate CAF), so rate changes are inaudible, but rate>1
            // drains the video buffer, so the trim is clamped (tighter when the buffer is
            // low). Large excursions (startup, track change, gap) snap via a hard seek.
            var DEAD_BAND_MS = 80;             // hold rate at 1.0 within this band
            var KP = 0.0002;                   // 200 ms error → ~4% trim (then clamped)
            var MAX_TRIM = 0.06;               // ±6% when the buffer is healthy
            var MAX_TRIM_SAFE = 0.03;          // ±3% when the buffer is low
            var BUFFER_LOW_SEC = 4;
            var SEEK_COOLDOWN_MS = 2000;       // never seek/re-anchor more than once per 2s
            var _syncLogCounter = 0;

            if (_syncTimer) clearInterval(_syncTimer);
            _syncTimer = setInterval(function () {
                if (!_cafPlaying) return;
                if (player.paused || player.readyState < 2) return;

                var nowWall = Date.now();
                var audioMs = _getAudioClockMs(cafEl);

                // ── Audio-clock health gate ─────────────────────────────────────────────
                // The PLL syncs video TO the audio clock. If that clock is frozen, seeking video is
                // futile and harmful (it thrashes, and re-anchoring would bake a garbage epoch from a
                // dead clock — the seek-storm + runaway videoEpochMs we hit). So HOLD: keep playing at
                // 1× (which tracks the segment-arrival rate, keeping the buffer bounded) and stop
                // chasing until the clock advances. When it resumes, the logic below re-converges.
                if (_audioLastMs < 0 || audioMs > _audioLastMs + 1) {
                    _audioLastMs = audioMs;
                    _audioLastWall = nowWall;
                    if (_audioHeld) { _audioHeld = false; console.log('[cws] audio clock resumed at ' + (audioMs / 1000).toFixed(2) + 's — resuming sync'); }
                } else if (nowWall - _audioLastWall > AUDIO_STALL_MS) {
                    player.playbackRate = 1.0;
                    if (!_audioHeld) { _audioHeld = true; console.log('[cws] HOLD: audio clock stalled — pausing sync until it resumes'); }
                    return;
                }

                var videoMs = _getVideoClockMs(player);
                var errorMs = videoMs - audioMs - _cdispBaked;  // target: videoContent == audioContent + Cdisp

                var buf = player.buffered;
                if (!buf || buf.length === 0) return;
                var bufStart = buf.start(0), bufEnd = buf.end(buf.length - 1);
                var ideal = _getVideoTimeSecForAudioMs(audioMs);
                var canSeek = (nowWall - _lastSeekMs) > SEEK_COOLDOWN_MS;

                // A "Save" (reanchorSeq bump) re-bakes Cdisp → one clean anchor that honors it.
                if (_reanchorPending) {
                    _reanchorPending = false;
                    _anchorVideo(player, cafEl, 'cdisp-save');
                    return;
                }

                // RE-ANCHOR only for a GENUINE discontinuity: the target sits outside the live buffer
                // by a real margin (track change / seek / fast-forward / long gap). The audio clock is
                // healthy here (gated above), so the re-derived epoch is sound. Edge-of-buffer is NOT a
                // discontinuity — it falls through to the clamped seek and converges normally.
                var outsideBy = (ideal < bufStart) ? (bufStart - ideal)
                              : (ideal > bufEnd)   ? (ideal - bufEnd) : 0;
                if (outsideBy > REANCHOR_OUTSIDE_SEC && canSeek) {
                    _anchorVideo(player, cafEl, 'reanchor (off ' + outsideBy.toFixed(1) + 's, err=' + Math.round(errorMs) + ')');
                    return;
                }

                // Medium drift → ONE clamped in-buffer seek (the proven recovery). Clamping keeps the
                // target inside the buffer, so a near-edge target seeks to the edge instead of failing.
                if (Math.abs(errorMs) > HARD_SEEK_MS && canSeek) {
                    var target = ideal;
                    if (target < bufStart + SEEK_GUARD_SEC) target = bufStart + SEEK_GUARD_SEC;
                    if (target > bufEnd - SEEK_GUARD_SEC)   target = bufEnd - SEEK_GUARD_SEC;
                    _rVFCMediaTimeSec = -1;
                    player.currentTime = target;
                    player.playbackRate = 1.0;
                    _lastSeekMs = nowWall;
                    console.log('[cws] seek: err=' + errorMs.toFixed(0) + 'ms → t=' + target.toFixed(3));
                    return;
                }

                // Fine alignment → gentle rate trim on the (muted) video only.
                var bufAheadSec = bufEnd - player.currentTime;
                var rate;
                if (Math.abs(errorMs) <= DEAD_BAND_MS) {
                    rate = 1.0;  // within dead band — hold steady, no trim
                } else {
                    var maxTrim = bufAheadSec < BUFFER_LOW_SEC ? MAX_TRIM_SAFE : MAX_TRIM;
                    rate = 1.0 - KP * errorMs;
                    rate = Math.max(1 - maxTrim, Math.min(1 + maxTrim, rate));
                }
                player.playbackRate = rate;

                _syncLogCounter++;
                if (_syncLogCounter % 16 === 0) {
                    var rVFCActive = _rVFCMediaTimeSec >= 0;
                    console.log('[cws] drift: err=' + errorMs.toFixed(0) + 'ms rate=' + rate.toFixed(4) +
                                ' vt=' + (videoMs / 1000).toFixed(2) + ' at=' + (audioMs / 1000).toFixed(2) +
                                ' buf=' + (bufAheadSec * 1000).toFixed(0) + 'ms src=' + (rVFCActive ? 'rVFC' : 'pCT'));
                }
            }, 250);

            // A/V-sync calibration no longer involves the receiver: the Chromecast cannot read
            // hardware-decoded video pixels, so measurement is done by the phone companion
            // (camera reads the on-screen barcode, mic reads the FSK audio timecode).

            // Periodically refresh the AUDIO epoch from the server (handles slow wall-clock drift /
            // an audio reconnect) AND watch for the re-anchor signal (reanchorSeq bumps when the
            // user Saves a new offset). NOTE: the poll must NOT overwrite _videoEpochMs — the
            // receiver OWNS that after _anchorVideo derives it from the live edge; the server's
            // value is captured once and goes stale across gaps (wall-paced video vs sample-paced
            // audio), which is what desynced track changes. It also must NOT touch _cdispBaked —
            // only a reanchorSeq change re-bakes it (one clean anchor in the drift loop).
            // Captured in _epochPollTimer so _reset() can clear it (else every track change leaks
            // another poll that fights over the shared state).
            if (_epochPollTimer) clearInterval(_epochPollTimer);
            _epochPollTimer = setInterval(function () {
                if (!_baseUrl) return;
                var t0 = Date.now();
                fetch(_baseUrl + 'cast/audio-clock')
                    .then(function (r) { return r.json(); })
                    .then(function (d) {
                        _serverRtt = Date.now() - t0;
                        if (d.epochMs >= 0) {
                            _epochMs     = d.epochMs;
                            _epochWallMs = d.epochWallMs;
                            _cdispMs     = (typeof d.cdispMs === 'number') ? d.cdispMs : 0;
                            if (typeof d.reanchorSeq === 'number' && d.reanchorSeq !== _lastReanchorSeq) {
                                _lastReanchorSeq = d.reanchorSeq;
                                _cdispBaked = _cdispMs;
                                _reanchorPending = true;
                                console.log('[cws] re-anchor requested (Cdisp=' + _cdispBaked + 'ms)');
                            }
                            _lastClockInfo = {
                                audioMs: d.audioMs,
                                epochMs: d.epochMs,
                                epochWallMs: d.epochWallMs,
                                videoEpochMs: d.videoEpochMs,
                                serverNowMs: d.serverNowMs,
                                receiverNowMs: Date.now(),
                                receiverRttMs: _serverRtt
                            };
                        }
                    })
                    .catch(function () {});
            }, 2000);

            // Periodically POST sync telemetry so server can monitor convergence.
            // Captured in _reportTimer so _reset() can clear it (avoids leaking one per track change).
            if (_reportTimer) clearInterval(_reportTimer);
            _reportTimer = setInterval(function () {
                if (!_baseUrl || !_cafPlaying) return;
                try {
                    var aMs = _getAudioClockMs(cafEl);
                    var vMs = _getVideoClockMs(player);
                    var bAhead = player.buffered.length > 0
                        ? (player.buffered.end(player.buffered.length - 1) - player.currentTime) * 1000
                        : 0;
                    var pllErr = vMs - aMs - _contentLagMs;
                    var rVFCActive = _rVFCMediaTimeSec >= 0;
                    fetch(_baseUrl + 'cast/sync-report', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            audioTimeMs: Math.round(aMs),
                            videoTimeMs: Math.round(vMs),
                            bufferAheadMs: Math.round(bAhead),
                            pllErrorMs: Math.round(pllErr),
                            contentLagMs: _contentLagMs,
                            audioOutputLatencyMs: _audioOutputLatencyMs,
                            rVFCAvailable: typeof player.requestVideoFrameCallback === 'function',
                            rVFCActive: rVFCActive,
                            rVFCRenderedCount: _rVFCRenderedCount,
                            rVFCDeltaMs: rVFCActive ? Math.round((player.currentTime - _rVFCMediaTimeSec) * 1000) : null,
                            playerCurrentTime: player.currentTime,
                            playbackRate: player.playbackRate,
                            // Anchor diagnostics: makes a stalled/disjoint anchor visible server-side
                            // (e.g. a seek target outside [bufStartSec,bufEndSec] is the freeze signature).
                            bufStartSec: player.buffered.length > 0 ? +player.buffered.start(0).toFixed(2) : -1,
                            bufEndSec:   player.buffered.length > 0 ? +player.buffered.end(player.buffered.length - 1).toFixed(2) : -1,
                            videoEpochMs: Math.round(_videoEpochMs),
                            epochMs: _epochMs
                        })
                    }).catch(function () {});
                } catch(_) {}
            }, 5000);
        }

        // Minimal m3u8 parser — extracts segment URIs, sequence numbers, target duration
        function _parseM3u8(text) {
            var lines = text.split('\n');
            var segments = [];
            var mediaSeq = 0;
            var targetDuration = 4;
            var sn = 0;
            var pendingProgramDateTime = null;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line.indexOf('#EXT-X-MEDIA-SEQUENCE:') === 0) {
                    mediaSeq = parseInt(line.split(':')[1], 10) || 0;
                    sn = mediaSeq;
                } else if (line.indexOf('#EXT-X-TARGETDURATION:') === 0) {
                    targetDuration = parseInt(line.split(':')[1], 10) || 4;
                } else if (line.indexOf('#EXT-X-PROGRAM-DATE-TIME:') === 0) {
                    pendingProgramDateTime = Date.parse(line.substring('#EXT-X-PROGRAM-DATE-TIME:'.length));
                } else if (line.indexOf('#EXTINF:') === 0) {
                    // Next non-comment line is the segment URI
                    for (var j = i + 1; j < lines.length; j++) {
                        var nextLine = lines[j].trim();
                        if (nextLine && nextLine.charAt(0) !== '#') {
                            segments.push({ sn: sn, uri: nextLine, programDateTimeMs: pendingProgramDateTime });
                            pendingProgramDateTime = null;
                            sn++;
                            i = j;
                            break;
                        }
                    }
                }
            }
            return { segments: segments, mediaSeq: mediaSeq, targetDuration: targetDuration };
        }

        // ══════════════════════════════════════════════════════════════════════
        // Silence CAF element (for fmp4_muxed mode only)
        // ══════════════════════════════════════════════════════════════════════
        function _silenceCaf() {
            var cafEl = document.getElementById('caf-el');
            if (!cafEl || cafEl._silenced) return;
            cafEl._silenced = true;
            try {
                var silenceCtx = new (window.AudioContext || window.webkitAudioContext)();
                silenceCtx.createMediaElementSource(cafEl);
                // NOT connected to destination → silence
            } catch (e) {
                cafEl.addEventListener('volumechange', function () {
                    if (cafEl.volume !== 0) cafEl.volume = 0;
                });
                cafEl.volume = 0;
            }
        }

        // ══════════════════════════════════════════════════════════════════════
        // fmp4_muxed mode (legacy — kept for fallback)
        // ══════════════════════════════════════════════════════════════════════
        var _hls = null;
        window.__hls = function () { return _hls; };

        function _startMuxed(baseUrl) {
            var player = document.getElementById('player');
            if (!player) { console.error('[muxed] #player missing'); return; }
            if (!window.Hls || !Hls.isSupported()) {
                console.error('[muxed] hls.js / MSE not available');
                return;
            }

            player.muted = false;  // muxed mode: player produces audio
            _showOverlay(1);

            fetch(baseUrl + 'api/settings')
                .then(function (r) { return r.ok ? r.json() : null; })
                .catch(function () { return null; })
                .then(function (cfg) {
                    var liveSyncCount = (cfg && cfg.hlsLiveSyncSegments  > 0) ? cfg.hlsLiveSyncSegments  : 3;
                    var liveMaxCount  = (cfg && cfg.hlsMaxLatencySegments > 0) ? cfg.hlsMaxLatencySegments : 6;

                    _hls = new Hls({
                        lowLatencyMode:              false,
                        liveSyncDurationCount:       liveSyncCount,
                        liveMaxLatencyDurationCount: liveMaxCount,
                        maxBufferLength:             30,
                        maxMaxBufferLength:          60,
                        maxBufferSize:               60 * 1024 * 1024,
                        backBufferLength:            Infinity,
                        enableWorker:                false,
                        abrEnabled:                  false,
                        startLevel:                  0,
                        debug:                       false,
                        progressive:                 false,
                        manifestLoadingMaxRetry:     12,
                        manifestLoadingRetryDelay:   1000,
                        manifestLoadingMaxRetryTimeout: 12000,
                    });

                    var _playStarted = false;
                    var _fragsBuffered = 0;
                    function _tryStartPlayback() {
                        if (_playStarted) return;
                        _playStarted = true;
                        var pos = _hls.liveSyncPosition;
                        if (pos != null) player.currentTime = pos;
                        player.play().catch(function () {});
                        player.addEventListener('playing', function onP() {
                            player.removeEventListener('playing', onP);
                            setTimeout(function () { _showOverlay(0); }, 500);
                        });
                        setTimeout(function () { _showOverlay(0); }, 6000);
                    }

                    _hls.on(Hls.Events.LEVEL_LOADED, function (e, d) {
                        if (!_playStarted && d.details.fragments.length >= 3) _tryStartPlayback();
                    });
                    _hls.on(Hls.Events.FRAG_BUFFERED, function () {
                        _fragsBuffered++;
                        if (!_playStarted && _fragsBuffered >= 3) _tryStartPlayback();
                    });
                    _hls.on(Hls.Events.ERROR, function (e, d) {
                        if (!d.fatal) return;
                        if (_hls) { try { _hls.destroy(); } catch (err) {} _hls = null; }
                        setTimeout(function () { if (_baseUrl) _startMuxed(_baseUrl); }, 3000);
                    });

                    _hls.loadSource(baseUrl + 'cast/muxed/stream.m3u8');
                    _hls.attachMedia(player);
                });
        }

        // ── Common helpers ──────────────────────────────────────────────────────

        function _reset() {
            if (_syncTimer)  { clearInterval(_syncTimer); _syncTimer = null; }
            if (_pollTimer)  { clearTimeout(_pollTimer); _pollTimer = null; }
            if (_epochPollTimer) { clearInterval(_epochPollTimer); _epochPollTimer = null; }
            if (_reportTimer)    { clearInterval(_reportTimer); _reportTimer = null; }
            _lastSeekMs = 0;
            _audioLastMs = -1; _audioLastWall = 0; _audioHeld = false;
            if (_hls)        { try { _hls.destroy(); } catch (e) {} _hls = null; }
            if (_ms)         { try { _ms.endOfStream(); } catch (e) {} }
            _ms = null; _sb = null;
            _appendQueue = []; _appending = false; _trimming = false;
            _loadedSegs = {}; _initLoaded = false; _segsBuffered = 0;
            _epochMs = -1; _epochWallMs = -1; _videoEpochMs = -1; _cdispMs = 0;
            _cdispBaked = 0; _lastReanchorSeq = -1; _reanchorPending = false;
            _videoReady = false; _cafPlaying = false;
            _lastManifestInfo = null; _lastClockInfo = null;
            if (_debugWatchTimer) clearInterval(_debugWatchTimer);
            _debugWatchTimer = null;
            var p = document.getElementById('player');
            if (p) {
                try { p.pause(); } catch (e) {}
                p.removeAttribute('src');
                try { p.load(); } catch (e) {}
                p.playbackRate = 1.0;
            }
            _showOverlay(1);
        }

        function _showOverlay(opacity) {
            var el = document.getElementById('overlay');
            if (el) el.style.opacity = String(opacity);
        }

        function _postAck(state) {
            if (!_baseUrl) return;
            fetch(_baseUrl + 'cast/ack', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: state }),
            }).catch(function () {});
        }

    })();
    </script>
</body>
