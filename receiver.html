<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        /* Base receiver styles */
        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #3d2645 0%, #4a3052 50%, #5a4a6e 100%);
        }

        /* CAF audio media element — kept invisible; background role moved to #art-blur-light */
        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0;
            pointer-events: none;
        }

        #art-blur-light {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-size: cover;
            background-position: center;
            filter: blur(14px) saturate(150%);
            transform: scale(1.06);
            will-change: transform;
        }

        #backdrop {
            position: absolute;
            inset: 0;
            z-index: 1;
            background-size: cover;
            background-position: center;
            opacity: 0.35;
            filter: blur(22px) saturate(140%);
            transform: scale(1.08);
            will-change: transform;
        }

        #skin-root {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0;
            transition: opacity 260ms ease;
            will-change: opacity;
            contain: layout paint style;
        }

        body.ready #skin-root {
            opacity: 1;
        }

        #skin-root.track-transition {
            animation: trackFade 260ms ease;
        }

        #splash {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #f5f7ff;
            z-index: 3;
            font-family: Segoe UI, Roboto, Arial, sans-serif;
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
            opacity: 1;
            transition: opacity 240ms ease;
        }

        body.ready #splash {
            opacity: 0;
            pointer-events: none;
        }

        @keyframes trackFade {
            0% { opacity: 0.88; }
            100% { opacity: 1; }
        }

        #spectrum-canvas {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            transition: opacity 600ms ease;
            will-change: transform;
        }
        #spectrum-canvas.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- class="castMediaElement" is the Google-recommended way to designate the media element -->
    <!-- instead of passing options.mediaElement explicitly (which is discouraged per CAF docs) -->
    <video id="receiverVideoElement" class="castMediaElement"></video>
    <div id="art-blur-light"></div>
    <div id="backdrop"></div>
    <div id="skin-root"></div>
    <div id="splash">BeeCaster</div>
    <canvas id="spectrum-canvas"></canvas>

    <script>
        const CHANNEL = 'urn:x-cast:com.google.cast.media';
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE |
            cast.framework.messages.Command.QUEUE_NEXT |
            cast.framework.messages.Command.QUEUE_PREV
        );

        const state = {
            media: {},
            customData: {},
            currentTimeSec: 0,
            durationSec: 0,
            layoutEndpoint: '/cast/layout',
            themeEndpoint: '/cast/theme'
        };

        const defaultLayout = `
<div class='np-shell'>
  <div class='np-art-wrap'>
    <img class='np-art' data-field='albumArtUrl' alt='Album art' />
  </div>
  <div class='np-main'>
    <div class='np-kicker'>Now Playing</div>
    <div class='np-title' data-field='trackTitle'></div>
    <div class='np-subtitle' data-field='artist'></div>
    <div class='np-meta' data-field='album'></div>
    <div class='np-progress'>
      <span class='np-time' data-field='currentPositionText'>0:00</span>
      <div class='np-progress-track'><div class='np-progress-fill' data-field='progressFill'></div></div>
      <span class='np-time' data-field='durationText'>0:00</span>
    </div>
    <div class='np-detail-grid'>
      <div><span class='np-label'>Codec</span><span data-field='audioCodec'></span></div>
      <div><span class='np-label'>Quality</span><span data-field='qualityLevel'></span></div>
      <div><span class='np-label'>Format</span><span data-field='properties'></span></div>
      <div><span class='np-label'>Queue</span><span data-field='position'></span></div>
      <div><span class='np-label'>Next</span><span data-field='next'></span></div>
      <div><span class='np-label'>Genre</span><span data-field='genre'></span></div>
    </div>
  </div>
</div>`;

        const defaultTheme = `
:root {
  --np-bg: #090a0f;
  --np-surface: rgba(24, 27, 38, 0.82);
  --np-text: #f5f7ff;
  --np-text-muted: #adb3ca;
  --np-accent: #1db954;
}

.np-shell {
  display: grid;
  grid-template-columns: minmax(320px, 36vw) 1fr;
  gap: 4vw;
  height: 100vh;
  padding: 5vh 5vw;
  box-sizing: border-box;
}

.np-art-wrap { display: flex; align-items: center; justify-content: center; }

.np-art {
  width: min(34vw, 520px);
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 22px;
  box-shadow: 0 26px 70px rgba(0,0,0,0.5);
  will-change: transform;
}

.np-main { align-self: center; }
.np-kicker { text-transform: uppercase; letter-spacing: .15em; color: var(--np-text-muted); font-size: 1.2vw; }
.np-title { font-size: 4.2vw; font-weight: 800; line-height: 1.05; margin-top: .4rem; }
.np-subtitle { margin-top: .7rem; font-size: 2vw; color: var(--np-text-muted); }
.np-meta { margin-top: .4rem; font-size: 1.45vw; color: var(--np-text-muted); }

.np-progress {
  margin-top: 2.8rem;
  display: grid;
  grid-template-columns: 80px 1fr 80px;
  gap: 1rem;
  align-items: center;
}

.np-progress-track {
  background: rgba(255,255,255,.16);
  height: 8px;
  border-radius: 999px;
  overflow: hidden;
  contain: paint layout;
}

.np-progress-fill {
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, var(--np-accent), #63e29f);
  transform-origin: left center;
  transform: scaleX(0);
  transition: transform 0.28s linear;
  will-change: transform;
}

.np-time { font-variant-numeric: tabular-nums; color: var(--np-text-muted); }
.np-detail-grid {
  margin-top: 2.1rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem 2rem;
}

.np-label {
  display: block;
  font-size: .95vw;
  color: var(--np-text-muted);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.np-detail-grid span[data-field] {
  display: block;
  margin-top: .2rem;
  font-size: 1.2vw;
}
`;

        // Track last art URL to prevent redundant background updates
        let lastBackgroundUrl = null;
        const artBlurLight = document.getElementById('art-blur-light');
        const backdropEl = document.getElementById('backdrop');

        // Returns a Promise that resolves once the background DOM has been updated
        // (or immediately if the URL is unchanged/empty, or on load failure).
        // Callers that need to sequence after the paint (e.g. first reveal) can await it.
        function setBackground(artUrl) {
            if (!artUrl) {
                console.log('[bg] No album art URL provided');
                return Promise.resolve();
            }

            if (lastBackgroundUrl === artUrl) {
                console.log('[bg] Already set, skipping:', artUrl);
                return Promise.resolve();
            }

            console.log('[bg] Setting background:', artUrl);

            return new Promise(resolve => {
                // Preload then apply atomically to both layers
                const img = new Image();
                img.onload = () => {
                    const gradient = `linear-gradient(135deg, rgba(61,38,69,0.75) 0%, rgba(74,48,82,0.65) 50%, rgba(90,74,110,0.75) 100%)`;
                    // Use dedicated #art-blur-light — NOT the CAF video element
                    artBlurLight.style.backgroundImage = `${gradient}, url("${artUrl}")`;
                    backdropEl.style.backgroundImage = `url("${artUrl}")`;
                    lastBackgroundUrl = artUrl;
                    console.log('[bg] Applied:', artUrl);
                    resolve();
                };
                img.onerror = () => {
                    console.error('[bg] Failed to load image:', artUrl);
                    lastBackgroundUrl = null;
                    resolve(); // don't block reveal on a missing image
                };
                img.src = artUrl;
            });
        }

        function formatSeconds(value) {
            if (!value || value < 0) {
                return '0:00';
            }

            const whole = Math.floor(value);
            const h = Math.floor(whole / 3600);
            const m = Math.floor((whole % 3600) / 60);
            const s = whole % 60;

            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function readMediaState(request) {
            state.media = request.media || {};
            state.customData = state.media.customData || {};

            // Construct absolute URLs from MediaBaseUrl if provided
            const baseUrl = state.customData.MediaBaseUrl || '';
            console.log('MediaBaseUrl from customData:', baseUrl);

            state.layoutEndpoint = state.customData.LayoutEndpoint || (baseUrl ? baseUrl + 'cast/layout' : '/cast/layout');
            state.themeEndpoint = state.customData.ThemeEndpoint || (baseUrl ? baseUrl + 'cast/theme' : '/cast/theme');

            console.log('Layout endpoint:', state.layoutEndpoint);
            console.log('Theme endpoint:', state.themeEndpoint);

            state.durationSec = Number(state.media.duration || 0);
            if (!state.durationSec && state.customData.DurationMs) {
                state.durationSec = Number(state.customData.DurationMs) / 1000;
            }

            if (state.customData.CurrentPositionMs) {
                state.currentTimeSec = Number(state.customData.CurrentPositionMs) / 1000;
            }
        }

        const fieldNodeCache = new Map();

        function clearFieldCache() {
            fieldNodeCache.clear();
        }

        function getFieldNodes(name) {
            const cached = fieldNodeCache.get(name);
            if (cached && cached.length > 0) {
                return cached;
            }

            const nodes = Array.from(document.querySelectorAll(`[data-field='${name}']`));
            fieldNodeCache.set(name, nodes);
            return nodes;
        }

        function setField(name, value) {
            const nodes = getFieldNodes(name);
            nodes.forEach(node => {
                if (name === 'albumArtUrl' && node.tagName === 'IMG') {
                    const newSrc = value || '';
                    if (node.getAttribute('data-current-src') === newSrc) {
                        // Already showing or pending — skip
                        return;
                    }
                    // Claim the slot immediately so concurrent calls don't double-fire
                    node.setAttribute('data-current-src', newSrc);
                    if (!newSrc) {
                        node.src = '';
                        return;
                    }
                    // Preload into a throwaway Image first so the <img> never goes blank
                    const preload = new Image();
                    preload.onload = () => {
                        // Only apply if the pending src hasn't been superseded by another track
                        if (node.getAttribute('data-current-src') === newSrc) {
                            node.src = newSrc;
                            console.log('[art] img src swapped after preload:', newSrc);
                        }
                    };
                    preload.onerror = () => {
                        console.error('[art] img preload failed:', newSrc);
                        if (node.getAttribute('data-current-src') === newSrc) {
                            node.removeAttribute('data-current-src');
                        }
                    };
                    preload.src = newSrc;
                } else if (name === 'progressFill') {
                    // Use scaleX transform — compositor-only, never triggers layout
                    const ratio = Math.min(1, Math.max(0, parseFloat(value) / 100 || 0));
                    node.style.transform = `scaleX(${ratio.toFixed(4)})`;
                } else {
                    // Only update text if it changed
                    const newText = value || '';
                    if (node.textContent !== newText) {
                        node.textContent = newText;
                    }
                }
            });
        }

        function revealUiOnce() {
            if (document.body.classList.contains('ready')) {
                console.log('[reveal] already revealed — no-op');
                return;
            }

            console.log('[reveal] hiding splash, showing UI');
            document.body.classList.add('ready');
        }

        function buildSnapshot(mediaOverride) {
            const media = mediaOverride || state.media || {};
            const metadata = media.metadata || {};
            const custom = state.customData || {};
            const images = metadata.images || [];
            const artUrl = images.length > 0 ? images[0].url : '';
            const safeDuration = Number(state.durationSec || 0);
            const safeCurrent = Number(state.currentTimeSec || 0);
            const ratio = safeDuration > 0 ? Math.min(100, Math.max(0, (safeCurrent / safeDuration) * 100)) : 0;

            return {
                contentId: media.contentId || '',
                trackTitle: metadata.title || custom.TrackTitle || 'Unknown title',
                artist: metadata.artist || custom.Artist || 'Unknown artist',
                album: metadata.albumName || custom.Album || '',
                albumArtist: metadata.albumArtist || custom.AlbumArtist || '',
                genre: custom.Genre || '',
                year: custom.Year || '',
                trackNumber: custom.TrackNumber || '',
                position: custom.Position || '',
                next: custom.Next || '',
                properties: custom.Properties || '',
                audioCodec: custom.AudioCodec || '',
                qualityLevel: custom.QualityLevel || '',
                durationText: custom.DurationText || formatSeconds(safeDuration),
                currentText: formatSeconds(safeCurrent),
                progressFill: `${ratio.toFixed(2)}%`,
                artUrl
            };
        }

        function buildTrackSignature(snapshot) {
            return [
                snapshot.contentId,
                snapshot.trackTitle,
                snapshot.artist,
                snapshot.album,
                snapshot.artUrl,
                snapshot.durationText
            ].join('|');
        }

        function applyProgressOnly(snapshot) {
            setField('currentPositionText', snapshot.currentText);
            setField('progressFill', snapshot.progressFill);
        }

        // Returns the Promise from setBackground so callers can await the DOM paint.
        function applyTrackSnapshot(snapshot, animate = false) {
            applyProgressOnly(snapshot);

            setField('trackTitle', snapshot.trackTitle);
            setField('artist', snapshot.artist);
            setField('album', snapshot.album);
            setField('albumArtist', snapshot.albumArtist);
            setField('genre', snapshot.genre);
            setField('year', snapshot.year);
            setField('trackNumber', snapshot.trackNumber);
            setField('position', snapshot.position);
            setField('next', snapshot.next);
            setField('properties', snapshot.properties);
            setField('audioCodec', snapshot.audioCodec);
            setField('qualityLevel', snapshot.qualityLevel);
            setField('durationText', snapshot.durationText);
            setField('albumArtUrl', snapshot.artUrl);
            const bgPromise = setBackground(snapshot.artUrl);

            if (animate) {
                const root = document.getElementById('skin-root');
                root.classList.remove('track-transition');
                // Defer to next frame — avoids forcing a synchronous full-page reflow
                requestAnimationFrame(() => root.classList.add('track-transition'));
            }

            return bgPromise;
        }

        let progressRafPending = false;
        let lastProgressMs = 0;
        const PROGRESS_MIN_INTERVAL_MS = 250;

        function scheduleProgressRender() {
            if (progressRafPending) {
                return;
            }

            progressRafPending = true;
            requestAnimationFrame(() => {
                progressRafPending = false;
                const now = performance.now();
                if (now - lastProgressMs < PROGRESS_MIN_INTERVAL_MS) return;
                lastProgressMs = now;
                const snapshot = buildSnapshot();
                applyProgressOnly(snapshot);
            });
        }

        async function loadTheme() {
            try {
                const resp = await fetch(state.themeEndpoint, { cache: 'default' });
                if (!resp.ok) {
                    console.log('Theme endpoint not available, using default theme');
                    applyDefaultTheme();
                    return;
                }

                const css = await resp.text();
                let style = document.getElementById('dynamic-theme');
                if (!style) {
                    style = document.createElement('style');
                    style.id = 'dynamic-theme';
                    document.head.appendChild(style);
                }

                style.textContent = css;
            } catch (err) {
                console.log('Failed to load theme, using default:', err);
                applyDefaultTheme();
            }
        }

        function applyDefaultTheme() {
            let style = document.getElementById('dynamic-theme');
            if (!style) {
                style = document.createElement('style');
                style.id = 'dynamic-theme';
                document.head.appendChild(style);
            }
            style.textContent = defaultTheme;
        }

        let lastLoadedLayout = '';
        let layoutLoadCount = 0;

        async function loadLayout() {
            layoutLoadCount++;
            console.log(`=== loadLayout called (count: ${layoutLoadCount}) ===`);

            let html = defaultLayout;
            try {
                console.log('Fetching layout from:', state.layoutEndpoint);
                const resp = await fetch(state.layoutEndpoint, { cache: 'default', mode: 'cors' });
                console.log('Layout response status:', resp.status);
                if (resp.ok) {
                    html = await resp.text();
                    console.log('Layout loaded successfully, length:', html.length);
                } else {
                    console.warn('Layout endpoint returned', resp.status, '- using default layout');
                }
            } catch (err) {
                console.error('Failed to load layout, using default:', err);
            }

            const root = document.getElementById('skin-root');
            // Only update if layout actually changed to prevent flashing
            if (lastLoadedLayout !== html) {
                console.log('Layout changed, updating DOM');
                root.innerHTML = html;
                lastLoadedLayout = html;
                clearFieldCache();
                console.log('Layout DOM updated');
            } else {
                console.log('Layout unchanged, skipping DOM update');
            }
        }

        let loadCount = 0;
        let isLoadInProgress = false;
        let firstLoadComplete = false;
        let currentTrackSignature = '';
        let lastLayoutEndpoint = '';
        let lastThemeEndpoint = '';
        let lastLoadTimestamp = 0;
        const LOAD_DEBOUNCE_MS = 500; // Ignore LOAD events within 500ms of last one
        const LOAD_DUPLICATE_WINDOW_MS = 3000;
        let lastAcceptedContentId = '';
        let lastAcceptedArtUrl = '';
        let lastAcceptedLoadTimestamp = 0;

        // CRITICAL: If no PRELOAD interceptor is registered, CAF calls the LOAD interceptor
        // for PRELOAD messages too (documented behavior). This would render the next queued
        // track's art/metadata while the current track is still playing. Register a no-op
        // PRELOAD interceptor to block that.
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.PRELOAD,
            request => {
                console.log('[caf] PRELOAD received (suppressing UI update) contentId:',
                    request.media?.contentId);
                return request;
            }
        );

        playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, async request => {
            loadCount++;
            const now = Date.now();
            const timeSinceLastLoad = now - lastLoadTimestamp;

            console.log(`=== LOAD interceptor triggered (call #${loadCount}) ===`);
            console.log('Timestamp:', new Date().toISOString());
            console.log('Time since last LOAD:', timeSinceLastLoad, 'ms');
            console.log('First load complete:', firstLoadComplete);

            // Debounce rapid LOAD events — return null to abort so CAF doesn't restart the player
            if (timeSinceLastLoad < LOAD_DEBOUNCE_MS && loadCount > 1) {
                console.warn(`LOAD event too soon (${timeSinceLastLoad}ms), dropping duplicate`);
                return null;
            }

            if (isLoadInProgress) {
                console.warn('LOAD already in progress, dropping concurrent duplicate');
                return null;
            }

            lastLoadTimestamp = now;
            isLoadInProgress = true;

            try {
                console.log('Media info:', request.media);
                console.log('Content ID:', request.media?.contentId);
                console.log('Content Type:', request.media?.contentType);
                console.log('Stream Type:', request.media?.streamType);
                console.log('Custom Data keys:', Object.keys(request.media?.customData || {}));

                const incomingContentId = request.media?.contentId || '';
                const incomingImages = request.media?.metadata?.images || [];
                const incomingArtUrl = incomingImages.length > 0 ? incomingImages[0].url : '';
                const sinceAcceptedMs = now - lastAcceptedLoadTimestamp;

                if (
                    firstLoadComplete &&
                    incomingContentId &&
                    incomingContentId === lastAcceptedContentId &&
                    incomingArtUrl === lastAcceptedArtUrl &&
                    sinceAcceptedMs < LOAD_DUPLICATE_WINDOW_MS
                ) {
                    console.warn(`Dropping duplicate LOAD for same content within ${LOAD_DUPLICATE_WINDOW_MS}ms`);
                    return null;
                }

                readMediaState(request);

                const snapshot = buildSnapshot(request.media || {});
                const nextTrackSignature = buildTrackSignature(snapshot);
                const endpointsChanged = (state.layoutEndpoint !== lastLayoutEndpoint) || (state.themeEndpoint !== lastThemeEndpoint);

                // Only load theme/layout on first load or if endpoints changed
                if (!firstLoadComplete || endpointsChanged) {
                    console.log('Loading theme/layout for initial render or endpoint change');
                    await loadTheme();
                    await loadLayout();
                    firstLoadComplete = true;
                    lastLayoutEndpoint = state.layoutEndpoint;
                    lastThemeEndpoint = state.themeEndpoint;

                    // Wait for DOM to be ready before rendering on first load
                    await new Promise(resolve => setTimeout(resolve, 100));
                } else {
                    console.log('Subsequent load - skipping theme/layout reload');
                }

                if (nextTrackSignature === currentTrackSignature) {
                    console.log('Same track signature detected - applying progress-only update');
                    applyProgressOnly(snapshot);
                    revealUiOnce();
                    return request;
                }

                // applyTrackSnapshot returns the setBackground Promise so we can await
                // the actual DOM update rather than a separate probe Image (which had a
                // race: probe.onload could resolve before setBackground's img.onload ran).
                const bgPromise = applyTrackSnapshot(snapshot, true);
                currentTrackSignature = nextTrackSignature;

                // On the very first reveal: wait for the backdrop to be painted before
                // fading the splash away — prevents the black flash where the splash fades
                // against an empty/black backdrop.
                if (!document.body.classList.contains('ready')) {
                    console.log('[reveal] waiting for background before first reveal');
                    await bgPromise;
                }

                revealUiOnce();

                lastAcceptedContentId = incomingContentId;
                lastAcceptedArtUrl = incomingArtUrl;
                lastAcceptedLoadTimestamp = now;

                console.log('=== LOAD interceptor complete ===');
            } catch (error) {
                console.error('Error in LOAD interceptor:', error);
            } finally {
                isLoadInProgress = false;
            }

            // Return the original request to allow default processing
            return request;
        });

        const playerData = {};
        const playerDataBinder = new cast.framework.ui.PlayerDataBinder(playerData);
        playerDataBinder.addEventListener(cast.framework.ui.PlayerDataEventType.CURRENT_TIME_CHANGED, e => {
            state.currentTimeSec = Number(e.value || 0);
            scheduleProgressRender();
        });

        // Listen for player state changes
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOADING, (event) => {
            console.log('[caf] PLAYER_LOADING (CAF begins handling LOAD) itemId:',
                event.media?.contentId);
        });

        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            console.log('[caf] PLAYER_LOAD_COMPLETE');
        });

        playerManager.addEventListener(cast.framework.events.EventType.MEDIA_INFORMATION_CHANGED, () => {
            // Fires for live radio metadata changes; log but don\'t re-render
            console.log('[caf] MEDIA_INFORMATION_CHANGED');
        });

        playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
            console.error('[caf] ERROR:', event.detailedErrorCode, event.error);
        });

        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, () => {
            console.log('[caf] PLAYING');
        });

        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, () => {
            console.log('[caf] PAUSED');
        });

        playerManager.addEventListener(cast.framework.events.EventType.BUFFERING, () => {
            console.log('[caf] BUFFERING');
        });

        playerManager.addEventListener(cast.framework.events.EventType.MEDIA_STATUS, (event) => {
            console.log('[caf] MEDIA_STATUS playerState=', event.mediaStatus?.playerState,
                'currentTime=', event.mediaStatus?.currentTime);
        });

        // Detect if CAF disrupts video element styles (suspected root cause of redraw flash)
        (function installVideoStyleWatcher() {
            const videoEl = document.getElementById('receiverVideoElement');
            const observer = new MutationObserver(mutations => {
                mutations.forEach(m => {
                    if (m.type === 'attributes' && m.attributeName === 'style') {
                        console.warn('[DEBUG] video element style mutated by CAF:',
                            videoEl.getAttribute('style'));
                    }
                    if (m.type === 'attributes' && m.attributeName === 'src') {
                        console.warn('[DEBUG] video element src mutated:', videoEl.src);
                    }
                });
            });
            observer.observe(videoEl, { attributes: true, attributeFilter: ['style', 'src', 'class'] });
            console.log('[DEBUG] MutationObserver on video element installed');
        })();

        playerManager.addEventListener(cast.framework.events.EventType.REQUEST_QUEUE_UPDATE, event => {
            const next = event.requestData && event.requestData.jump == 1;
            const objToSender = {
                type: next ? 'NEXT' : 'PREVIOUS',
                message: next ? 'NEXT' : 'PREVIOUS'
            };
            context.sendCustomMessage(CHANNEL, undefined, objToSender);
        });

        context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
            context.stop();
        });

        const options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = Object.assign({});
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;

        // BeeCaster control namespace — receives out-of-band updates (e.g. UPDATE_ART)
        const CONTROL_NS = 'urn:x-cast:com.beecaster.control';
        options.customNamespaces[CONTROL_NS] = cast.framework.system.MessageType.JSON;

        // Spectrum namespace — receives 24-band FFT data from the plugin
        // const SPECTRUM_NS = 'urn:x-cast:com.beecaster.spectrum';
        // options.customNamespaces[SPECTRUM_NS] = cast.framework.system.MessageType.JSON;

        // ── Spectrum renderer — DISABLED for debugging ────────────────────────
        (function () {
            return; // disabled — re-enable once cast page load is confirmed working
            const FAKE_DATA = true;  // TODO: remove — drives canvas with synthetic data for layout testing

            const canvas  = document.getElementById('spectrum-canvas');
            const ctx     = canvas.getContext('2d');
            const BANDS   = 24;
            const BAR_GAP = 0.18;  // fraction of bar width used as gap

            let bins      = new Float32Array(BANDS);   // latest data from plugin
            let hasData   = false;

            // ── Fake data generator (testing only) ────────────────────────────
            if (FAKE_DATA) {
                const fakeSmoothed = new Float32Array(BANDS);
                let t = 0;
                setInterval(() => {
                    t += 0.07;
                    for (let i = 0; i < BANDS; i++) {
                        // Bass hump at low bands, roll-off toward highs
                        const bassCurve  = Math.max(0, 1 - i / 6);
                        const midBump    = Math.exp(-Math.pow((i - 10) / 4, 2)) * 0.55;
                        const noise      = Math.random() * 0.25;
                        const wave       = (Math.sin(t + i * 0.4) * 0.5 + 0.5) * 0.45;
                        const raw        = Math.min(1, bassCurve * 0.7 + midBump + wave + noise);
                        // Fast attack, slow decay
                        fakeSmoothed[i]  = raw > fakeSmoothed[i]
                            ? raw * 0.6 + fakeSmoothed[i] * 0.4
                            : fakeSmoothed[i] * 0.82;
                        bins[i] = fakeSmoothed[i];
                    }
                    if (!hasData) { hasData = true; canvas.classList.add('visible'); }
                }, 64); // ~15 fps, matching real analyzer cadence
            }

            // Resize canvas to its CSS pixel size (account for devicePixelRatio)
            function resizeCanvas() {
                const dpr = window.devicePixelRatio || 1;
                canvas.width  = canvas.offsetWidth  * dpr;
                canvas.height = canvas.offsetHeight * dpr;
                ctx.scale(dpr, dpr);
            }
            resizeCanvas();
            window.addEventListener('resize', () => { ctx.resetTransform(); resizeCanvas(); });

            // Receive spectrum data from the plugin
            context.addCustomMessageListener(SPECTRUM_NS, event => {
                const msg = event.data;
                if (!msg || !Array.isArray(msg.bins) || msg.bins.length !== BANDS) return;
                for (let i = 0; i < BANDS; i++) bins[i] = msg.bins[i];
                if (!hasData) {
                    hasData = true;
                    canvas.classList.add('visible');
                }
            });

            // rAF render loop — decoupled from message receive rate
            function render() {
                requestAnimationFrame(render);
                if (!hasData) return;

                const W = canvas.offsetWidth;
                const H = canvas.offsetHeight;
                ctx.clearRect(0, 0, W, H);

                const totalGap  = W * 0.02;           // 1% padding each side
                const drawW     = W - totalGap * 2;
                const barW      = drawW / BANDS;
                const gapW      = barW * BAR_GAP;
                const fillW     = barW - gapW;

                for (let i = 0; i < BANDS; i++) {
                    const v   = Math.max(0, Math.min(1, bins[i]));
                    const bH  = Math.max(2, v * H * 0.92);
                    const x   = totalGap + i * barW + gapW * 0.5;
                    const y   = H - bH;

                    // Gradient: brighter at the top, softer at the base
                    const grad = ctx.createLinearGradient(0, y, 0, H);
                    grad.addColorStop(0,   'rgba(220, 200, 255, 0.55)');
                    grad.addColorStop(0.5, 'rgba(180, 140, 230, 0.30)');
                    grad.addColorStop(1,   'rgba(140, 100, 200, 0.10)');

                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(x, y, fillW, bH, [3, 3, 0, 0]);
                    ctx.fill();
                }
            }
            render();
        })();

        // Enable detailed logs for debugging
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600; // 1 hour

        // Enable verbose CAF framework logging — visible in chrome://inspect
        options.loggerLevel = cast.framework.LoggerLevel.DEBUG;

        // Set options.mediaElement explicitly as a fallback — required on older CAF versions
        // that may not support class="castMediaElement" auto-discovery. Both are set (belt + suspenders).
        options.mediaElement = document.getElementById('receiverVideoElement');

        // Surface any JS crashes to the remote debugger console
        window.onerror = function (msg, src, line, col, err) {
            console.error('[CRASH] Uncaught error:', msg, 'at', src, line + ':' + col, err);
        };
        window.addEventListener('unhandledrejection', function (e) {
            console.error('[CRASH] Unhandled promise rejection:', e.reason);
        });

        // Listen for BeeCaster control messages (art updates, etc.)
        context.addCustomMessageListener(CONTROL_NS, (event) => {
            const msg = event.data;
            if (!msg) return;
            if (msg.type === 'UPDATE_ART') {
                console.log('[art-update] Received UPDATE_ART:', msg.artUrl);
                setField('albumArtUrl', msg.artUrl);
                setBackground(msg.artUrl);
            }
        });

        console.log('Starting Cast receiver context with options:', options);
        try {
            context.start(options);
            console.log('[init] context.start() returned OK');
        } catch (e) {
            console.error('[CRASH] context.start() threw:', e);
        }
    </script>
</body>
</html>
