<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- hls.js: Chromecast does not support HLS via canPlayType; MSE (hls.js) is required -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <!--
        fmp4_muxed mode: single FFmpeg process muxes H.264 video + FLAC audio into
        fragmented MP4 (fMP4) HLS segments served in-memory from HlsSegmentStore.
        hls.js drives a single <video id="player"> element via MSE SourceBuffer.
        A/V sync is guaranteed by the shared PTS timeline in the muxed container —
        no sync loop, no rate steering, no hard seeks.
        Confirmed on Chromecast v2 (Chrome 90 / armv7l):
          MediaSource.isTypeSupported('video/mp4; codecs="avc1.640029, flac"') = true
    -->
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { overflow: hidden; margin: 0; padding: 0; background: #000; }

        /* Black overlay — full-screen, shown during load and pause */
        #overlay {
            position: absolute; inset: 0;
            background: #000; opacity: 1;
            transition: opacity 0.4s ease;
            pointer-events: none; z-index: 10;
        }

        /* CAF protocol vehicle — invisible, muted, only here so CAF has a
           valid media element to report state and accept commands.        */
        #caf-el {
            position: absolute; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
        }

        /* Muxed player — full-screen, produces both audio and video output. */
        #player {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- CAF protocol vehicle: loaded with /live WAV by CAF, muted at JS level.
         CAF needs a media element to track play/pause state and send commands. -->
    <video id="caf-el" class="castMediaElement"></video>
    <!-- Muxed player: hls.js drives this element with the H.264+FLAC fMP4 stream.
         NOT muted — this element produces the actual audio and video output.    -->
    <video id="player" playsinline></video>
    <!-- Overlay: black during load and pause -->
    <div id="overlay"></div>

    <script>
    (function () {
        'use strict';

        // ── CAF init ────────────────────────────────────────────────────────────
        var CHANNEL       = 'urn:x-cast:com.google.cast.media';
        var context       = cast.framework.CastReceiverContext.getInstance();
        var playerManager = context.getPlayerManager();

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE           |
            cast.framework.messages.Command.QUEUE_NEXT      |
            cast.framework.messages.Command.QUEUE_PREV
        );

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.PRELOAD,
            function (req) { return req; }
        );

        // ── Module state ───────────────────────────────────────────────────────
        var _baseUrl      = '';
        var _hls          = null;   // single hls.js instance for muxed fMP4 stream
        var _stallTimer   = null;   // stall recovery timeout

        // ── LOAD interceptor ────────────────────────────────────────────────────
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            function (request) {
                var custom = request.media && request.media.customData;
                _baseUrl = (custom && custom.MediaBaseUrl) || '';
                var mode = (custom && custom.HlsStreamingMode) || '';

                var cafEl = document.getElementById('caf-el');
                if (cafEl) { cafEl.muted = true; cafEl.volume = 0; }

                _reset();

                if (mode === 'fmp4_muxed') {
                    _startMuxed(_baseUrl);
                } else {
                    console.error('[receiver] Unsupported mode "' + mode + '" — expected fmp4_muxed');
                    _showOverlay(1);
                }

                return request;
            }
        );

        // ── CAF PAUSE ──────────────────────────────────────────────────────────
        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, function () {
            _showOverlay(1);
            var p = document.getElementById('player');
            if (p && !p.paused) p.pause();
            _postAck('PAUSED');
            setTimeout(function () { _showOverlay(0); }, 1500);
        });

        // ── CAF PLAYING ────────────────────────────────────────────────────────
        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, function () {
            var cafEl = document.getElementById('caf-el');
            if (cafEl) { cafEl.muted = true; cafEl.volume = 0; }
            var p = document.getElementById('player');
            if (p && p.paused) p.play().catch(function () {});
            _postAck('PLAYING');
        });

        // ── Queue next / prev ──────────────────────────────────────────────────
        playerManager.addEventListener(
            cast.framework.events.EventType.REQUEST_QUEUE_UPDATE,
            function (event) {
                var next = event.requestData && event.requestData.jump === 1;
                context.sendCustomMessage(CHANNEL, undefined, {
                    type:    next ? 'NEXT' : 'PREVIOUS',
                    message: next ? 'NEXT' : 'PREVIOUS',
                });
            }
        );

        // ── Sender disconnected ────────────────────────────────────────────────
        context.addEventListener(
            cast.framework.system.EventType.SENDER_DISCONNECTED,
            function () { context.stop(); }
        );

        // ── CAF options + start ────────────────────────────────────────────────
        var options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = {};
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600;
        options.mediaElement = document.getElementById('caf-el');

        context.start(options);

        // ── Permanently silence #caf-el via Web Audio API ──────────────────────
        // CAF owns #caf-el and overrides muted/volume on every PLAYING event,
        // making the /live WAV audible regardless of what JS sets.
        // createMediaElementSource() permanently re-routes the element's audio
        // output into the Web Audio graph and away from the speakers.
        // We deliberately do NOT connect the source node to AudioContext.destination,
        // so the audio is consumed (keeping the element playing for CAF state) but
        // produces zero output. CAF state tracking is unaffected.
        (function _silenceCafElement() {
            var cafEl = document.getElementById('caf-el');
            if (!cafEl) return;
            try {
                var silenceCtx = new (window.AudioContext || window.webkitAudioContext)();
                var src = silenceCtx.createMediaElementSource(cafEl);
            } catch (e) {
                cafEl.addEventListener('volumechange', function () {
                    if (cafEl.volume !== 0) { cafEl.volume = 0; }
                });
                cafEl.volume = 0;
            }
        })();

        // ══════════════════════════════════════════════════════════════════════
        // fmp4_muxed pipeline
        //
        // Architecture:
        //   Single <video id="player"> — hls.js + MSE SourceBuffer
        //   codec: video/mp4; codecs="avc1.640029, flac"
        //
        //   A/V sync is guaranteed by the muxed fMP4 container.  Both tracks share
        //   the same PTS timeline from a single FFmpeg muxer, so synchronisation is
        //   mathematically exact — no sync loop, no rate steering, no hard seeks.
        //
        //   Chromecast v2 (Chrome 90 / armv7l) confirms hardware support via:
        //     MediaSource.isTypeSupported('video/mp4; codecs="avc1.640029, flac"') = true
        // ══════════════════════════════════════════════════════════════════════

        function _reset() {
            if (_stallTimer) { clearTimeout(_stallTimer); _stallTimer = null; }
            if (_hls) { try { _hls.destroy(); } catch (e) {} _hls = null; }
            var p = document.getElementById('player');
            if (p) {
                try { p.pause(); } catch (e) {}
                p.removeAttribute('src');
                try { p.load(); } catch (e) {}  // flush stale MSE state
            }
            _showOverlay(1);
        }

        function _startMuxed(baseUrl) {
            var player = document.getElementById('player');
            if (!player) { console.error('[muxed] #player element missing'); return; }

            if (!window.Hls || !Hls.isSupported()) {
                console.error('[muxed] hls.js / MSE not available');
                return;
            }

            _showOverlay(1);

            fetch(baseUrl + 'api/settings')
                .then(function (r) { return r.ok ? r.json() : null; })
                .catch(function () { return null; })
                .then(function (cfg) {
                    var liveSyncCount = (cfg && cfg.hlsLiveSyncSegments  > 0) ? cfg.hlsLiveSyncSegments  : 3;
                    var liveMaxCount  = (cfg && cfg.hlsMaxLatencySegments > 0) ? cfg.hlsMaxLatencySegments : 6;

                    _hls = new Hls({
                        lowLatencyMode:              false,
                        liveSyncDurationCount:       liveSyncCount,
                        liveMaxLatencyDurationCount: liveMaxCount,
                        maxBufferLength:             30,
                        maxMaxBufferLength:          60,
                        maxBufferSize:               60 * 1024 * 1024,
                        backBufferLength:            0,
                        enableWorker:                true,
                        abrEnabled:                  false,
                        startLevel:                  0,
                        debug:                       false,
                        progressive:                 true,
                        manifestLoadingMaxRetry:     12,
                        manifestLoadingRetryDelay:   1000,
                        manifestLoadingMaxRetryTimeout: 12000,
                    });

                    // Defer play() until enough fragments are buffered.
                    var _playStarted = false;
                    var _fragsBuffered = 0;
                    function _tryStartPlayback() {
                        if (_playStarted) return;
                        _playStarted = true;
                        var pos = _hls.liveSyncPosition;
                        if (pos != null) { player.currentTime = pos; }
                        player.play().catch(function () {});
                        var _onPlaying = function () {
                            player.removeEventListener('playing', _onPlaying);
                            setTimeout(function () { _showOverlay(0); }, 500);
                        };
                        player.addEventListener('playing', _onPlaying);
                        setTimeout(function () {
                            player.removeEventListener('playing', _onPlaying);
                            _showOverlay(0);
                        }, 6000);
                    }

                    _hls.on(Hls.Events.LEVEL_LOADED, function (e, d) {
                        if (!_playStarted && d.details.fragments.length >= 3) {
                            _tryStartPlayback();
                        }
                    });

                    _hls.on(Hls.Events.FRAG_BUFFERED, function () {
                        _fragsBuffered++;
                        if (_stallTimer) { clearTimeout(_stallTimer); _stallTimer = null; }
                        if (!_playStarted && _fragsBuffered >= 3) {
                            _tryStartPlayback();
                        }
                    });

                    _hls.on(Hls.Events.BUFFER_STALLED, function () {
                        if (_stallTimer) clearTimeout(_stallTimer);
                        _stallTimer = setTimeout(function () {
                            _stallTimer = null;
                            if (!_hls) return;
                            var p = document.getElementById('player');
                            if (!p || p.readyState >= 3) return;
                            var syncPos = _hls.liveSyncPosition;
                            if (syncPos != null && syncPos > p.currentTime + 2) {
                                p.currentTime = syncPos;
                            }
                        }, 5000);
                    });

                    _hls.on(Hls.Events.ERROR, function (e, d) {
                        if (!d.fatal) return;
                        if (_hls) { try { _hls.destroy(); } catch (err) {} _hls = null; }
                        setTimeout(function () {
                            if (_baseUrl) _startMuxed(_baseUrl);
                        }, 3000);
                    });

                    _hls.loadSource(baseUrl + 'cast/muxed/stream.m3u8');
                    _hls.attachMedia(player);
                });
        }

        // ── Overlay ────────────────────────────────────────────────────────────
        function _showOverlay(opacity) {
            var el = document.getElementById('overlay');
            if (el) el.style.opacity = String(opacity);
        }

        // ── Server communication ────────────────────────────────────────────────
        function _postAck(state) {
            if (!_baseUrl) return;
            fetch(_baseUrl + 'cast/ack', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: state }),
            }).catch(function () {});
        }

    })(); // end IIFE
    </script>
</body>
</html>
