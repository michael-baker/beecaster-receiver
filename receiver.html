<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        video { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; background-size: cover; background-position: center; filter: blur(14px) saturate(150%) hue-rotate(-10deg); transform: scale(1.06); pointer-events: none; }
        #backdrop { position: fixed; inset: 0; z-index: 1; background-size: cover; background-position: center; opacity: 0.35; filter: blur(42px) saturate(160%) hue-rotate(-10deg); transform: scale(1.08); pointer-events: none; }
        #layout-container { position: fixed; inset: 0; z-index: 2; overflow: hidden; }
        #splash { position: fixed; inset: 0; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #3d2645 0%, #4a3052 50%, #5a4a6e 100%); transition: opacity 0.5s ease; }
        #splash.hidden { opacity: 0; pointer-events: none; }
        .splash-logo { font-size: 5vw; font-weight: 700; text-shadow: 0 0 40px rgba(233,75,158,0.8); letter-spacing: 0.05em; }
        .splash-sub  { margin-top: 1.5rem; font-size: 1.5vw; color: rgba(255,255,255,0.6); letter-spacing: 0.12em; }
        #debug-overlay { position: fixed; top: 20px; right: 20px; z-index: 10000; background: rgba(0,0,0,0.92); color: #0f0; font-family: 'Courier New', monospace; font-size: 13px; padding: 12px 16px; border: 2px solid #0f0; border-radius: 6px; line-height: 1.7; pointer-events: none; }
        .dl { color: #fa0; font-weight: bold; }
    </style>
</head>
<body>
    <video id="receiverVideoElement"></video>
    <div id="backdrop"></div>
    <div id="splash">
        <div class="splash-logo">BeeCaster</div>
        <div class="splash-sub">Now casting from MusicBee</div>
    </div>
    <div id="layout-container"></div>
    <div id="debug-overlay">
        <div><span class="dl">BEECASTER</span></div>
        <div>LOAD: <span id="d-loads">0</span></div>
        <div>ID:   <span id="d-cid">—</span></div>
        <div>Fields: <span id="d-fields">0</span></div>
        <div>State: <span id="d-state">idle</span></div>
    </div>

    <script>
        // ============================================================
        // BeeCaster Receiver — github.io hosted
        // Layout/theme/script delivered via Cast LOAD customData only.
        // Synchronous LOAD interceptor — no async, no debounce.
        // customNamespaces intentionally absent: registering the SDK's
        // reserved urn:x-cast:com.google.cast.media namespace as a
        // custom namespace intercepts LOAD before playerManager sees it,
        // causing LoadAsync to time out on the sender.
        // ============================================================

        const context       = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        // ── Cast SDK debug logger ─────────────────────────────────
        var castDebugLogger = cast.debug.CastDebugLogger.getInstance();
        context.addEventListener(cast.framework.system.EventType.READY, function() {
            castDebugLogger.setEnabled(true);
            castDebugLogger.showDebugLogs(true);
            castDebugLogger.loggerLevelByEvents = {
                'cast.framework.events.category.CORE'          : cast.framework.LoggerLevel.INFO,
                'cast.framework.events.EventType.MEDIA_STATUS' : cast.framework.LoggerLevel.DEBUG,
                'cast.framework.events.EventType.ERROR'        : cast.framework.LoggerLevel.ERROR
            };
            castDebugLogger.loggerLevelByTags = {
                'BeeCaster': cast.framework.LoggerLevel.DEBUG
            };
            castDebugLogger.info('BeeCaster', 'Receiver ready — debug logger active');
        });

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE           |
            cast.framework.messages.Command.QUEUE_NEXT      |
            cast.framework.messages.Command.QUEUE_PREV
        );

        // ── State ────────────────────────────────────────────────────
        const state = {
            media: {}, customData: {},
            currentTimeSec: 0, durationSec: 0,
            playbackState: 'STOPPED'
        };

        // ── Event bus ────────────────────────────────────────────────
        const eventListeners = {
            LOAD: [], PLAY: [], PAUSE: [], STOP: [],
            TIME_UPDATE: [], STATE_CHANGE: [], LAYOUT_READY: []
        };

        function emit(type, data) {
            (eventListeners[type] || []).forEach(function(cb) {
                try { cb(data); } catch (e) { console.error('[BeeCaster] listener error', type, e); }
            });
        }

        // ── BeeCaster public API (available to LayoutScript) ─────────
        window.BeeCaster = {
            on: function(eventType, callback) {
                if (eventListeners[eventType]) {
                    eventListeners[eventType].push(callback);
                } else {
                    console.warn('[BeeCaster] unknown event:', eventType);
                }
            },
            getState: function() { return Object.assign({}, state); },
            updateField: function(fieldName, value) {
                document.querySelectorAll('[data-field="' + fieldName + '"]').forEach(function(node) {
                    if (fieldName === 'albumArtUrl') {
                        node.src = value || '';
                    } else if (fieldName === 'progressFill') {
                        node.style.width = value || '0%';
                    } else {
                        var t = value || '';
                        if (node.textContent !== t) node.textContent = t;
                    }
                });
            }
        };

        // ── Helpers ──────────────────────────────────────────────────
        function formatSeconds(v) {
            if (!v || v < 0) return '0:00';
            var w = Math.floor(v), h = Math.floor(w / 3600),
                m = Math.floor((w % 3600) / 60), s = w % 60;
            return h > 0
                ? h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
                : m + ':' + String(s).padStart(2,'0');
        }

        var lastBgUrl = null;
        function setBackground(url) {
            if (!url || url === lastBgUrl) return;
            var img = new Image();
            img.onload = function() {
                document.getElementById('receiverVideoElement').style.backgroundImage =
                    'linear-gradient(135deg,rgba(61,38,69,.75) 0%,rgba(74,48,82,.65) 50%,rgba(90,74,110,.75) 100%),url("' + url + '")';
                document.getElementById('backdrop').style.backgroundImage = 'url("' + url + '")';
                lastBgUrl = url;
            };
            img.onerror = function() { lastBgUrl = null; };
            img.src = url;
        }

        function hideSplash() {
            var el = document.getElementById('splash');
            if (!el) return;
            el.classList.add('hidden');
            setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 600);
        }

        // ── Layout injection ─────────────────────────────────────────
        // HTML → innerHTML (no scripts — only LayoutScript field is used for JS).
        // CSS  → <style id="dynamic-theme">.
        // JS   → single named <script id="beecaster-layout-script">, replaced
        //        fresh on each LOAD so listeners never accumulate.
        function injectLayout(html, css, script) {
            // 1. HTML
            document.getElementById('layout-container').innerHTML = html || '';

            // 2. CSS
            var styleEl = document.getElementById('dynamic-theme');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'dynamic-theme';
                document.head.appendChild(styleEl);
            }
            styleEl.textContent = css || '';

            // 3. JS — clear accumulated listeners, then run fresh script
            Object.keys(eventListeners).forEach(function(k) { eventListeners[k] = []; });
            var oldScript = document.getElementById('beecaster-layout-script');
            if (oldScript) oldScript.remove();
            if (script && script.trim()) {
                var el = document.createElement('script');
                el.id = 'beecaster-layout-script';
                el.textContent = script;
                document.head.appendChild(el);
                console.log('[BeeCaster] LayoutScript executed (' + script.length + ' chars)');
            }

            emit('LAYOUT_READY', {});
        }

        // ── Debug overlay ────────────────────────────────────────────
        var loadCount = 0;
        function updateDebug(contentId, customData) {
            document.getElementById('d-loads').textContent  = loadCount;
            document.getElementById('d-cid').textContent    = (contentId || '').substring(0, 22) || '—';
            document.getElementById('d-fields').textContent = Object.keys(customData || {}).length;
            document.getElementById('d-state').textContent  = state.playbackState;
        }

        // ── LOAD interceptor (synchronous) ───────────────────────────
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            function(request) {
                loadCount++;
                console.log('[BeeCaster] LOAD #' + loadCount);
                castDebugLogger.info('BeeCaster', 'LOAD #' + loadCount + ' contentId=' + ((request.media && request.media.contentId) || '?'));

                try {
                    var media    = request.media    || {};
                    var custom   = media.customData || {};
                    var metadata = media.metadata   || {};
                    var images   = metadata.images  || [];
                    var artUrl   = images.length > 0 ? images[0].url : '';

                    state.media          = media;
                    state.customData     = custom;
                    state.durationSec    = Number(media.duration || 0);
                    state.currentTimeSec = 0;

                    injectLayout(
                        custom.LayoutHtml   || null,
                        custom.ThemeCss     || null,
                        custom.LayoutScript || null
                    );

                    window.BeeCaster.updateField('trackTitle',          metadata.title       || custom.TrackTitle  || '');
                    window.BeeCaster.updateField('artist',              metadata.artist      || custom.Artist      || '');
                    window.BeeCaster.updateField('album',               metadata.albumName   || custom.Album       || '');
                    window.BeeCaster.updateField('albumArtist',         metadata.albumArtist || custom.AlbumArtist || '');
                    window.BeeCaster.updateField('genre',               custom.Genre         || '');
                    window.BeeCaster.updateField('year',                custom.Year          || '');
                    window.BeeCaster.updateField('trackNumber',         custom.TrackNumber   || '');
                    window.BeeCaster.updateField('position',            custom.Position      || '');
                    window.BeeCaster.updateField('next',                custom.Next          || '');
                    window.BeeCaster.updateField('properties',          custom.Properties    || '');
                    window.BeeCaster.updateField('audioCodec',          custom.AudioCodec    || '');
                    window.BeeCaster.updateField('qualityLevel',        custom.QualityLevel  || '');
                    window.BeeCaster.updateField('durationText',        formatSeconds(state.durationSec));
                    window.BeeCaster.updateField('albumArtUrl',         artUrl);
                    window.BeeCaster.updateField('currentPositionText', '0:00');
                    window.BeeCaster.updateField('progressFill',        '0%');

                    setBackground(artUrl);
                    hideSplash();

                    emit('LOAD', { contentId: media.contentId, customData: custom });
                    updateDebug(media.contentId, custom);
                    castDebugLogger.info('BeeCaster', 'LOAD complete — ' + Object.keys(custom).length + ' customData fields');
                    console.log('[BeeCaster] LOAD complete — fields:', Object.keys(custom).length);
                } catch (err) {
                    castDebugLogger.error('BeeCaster', 'LOAD error: ' + err);
                    console.error('[BeeCaster] LOAD error:', err);
                }

                return request;
            }
        );

        // ── Time / progress ──────────────────────────────────────────
        var playerData = {};
        new cast.framework.ui.PlayerDataBinder(playerData).addEventListener(
            cast.framework.ui.PlayerDataEventType.CURRENT_TIME_CHANGED,
            function(e) {
                state.currentTimeSec = Number(e.value || 0);
                var pct = state.durationSec > 0
                    ? Math.min(100, Math.max(0, (state.currentTimeSec / state.durationSec) * 100))
                    : 0;
                window.BeeCaster.updateField('progressFill',        pct.toFixed(2) + '%');
                window.BeeCaster.updateField('currentPositionText', formatSeconds(state.currentTimeSec));
                emit('TIME_UPDATE', { currentTime: state.currentTimeSec, duration: state.durationSec });
            }
        );

        // ── Playback events ──────────────────────────────────────────
        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, function() {
            state.playbackState = 'PLAYING';
            document.getElementById('d-state').textContent = 'PLAYING';
            emit('PLAY', {});
            emit('STATE_CHANGE', Object.assign({}, state));
        });
        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, function() {
            state.playbackState = 'PAUSED';
            document.getElementById('d-state').textContent = 'PAUSED';
            emit('PAUSE', {});
            emit('STATE_CHANGE', Object.assign({}, state));
        });
        playerManager.addEventListener(cast.framework.events.EventType.STOPPED, function() {
            state.playbackState = 'STOPPED';
            document.getElementById('d-state').textContent = 'STOPPED';
            emit('STOP', {});
            emit('STATE_CHANGE', Object.assign({}, state));
        });
        playerManager.addEventListener(cast.framework.events.EventType.ERROR, function(e) {
            var msg = 'Player error code=' + e.detailedErrorCode;
            console.error('[BeeCaster] ' + msg, e.error);
            castDebugLogger.error('BeeCaster', msg);
            document.getElementById('d-state').textContent = 'ERR ' + e.detailedErrorCode;
        });

        // ── Start ────────────────────────────────────────────────────
        var options = new cast.framework.CastReceiverOptions();
        options.mediaElement     = document.getElementById('receiverVideoElement');
        options.maxInactivity    = 3600;
        options.disableIdleTimeout = false;

        console.log('[BeeCaster] Starting receiver context');
        context.start(options);
    </script>
</body>
</html>
