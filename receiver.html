<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- hls.js: Chromecast does not support HLS via canPlayType; MSE (hls.js) is required -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <style>
        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: #000;
        }

        /* Pause overlay — fades to black when audio is paused so the stale
           HLS buffer drain is hidden rather than looking like a sync error. */
        #pause-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
            z-index: 10;
        }

        /* CAF audio element — invisible but functional for audio playback */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* HLS background video — full screen, shown after manifest loads */
        #hls-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            display: none;
        }
    </style>
</head>
<body>
    <!-- CAF audio element; class="castMediaElement" lets CAF auto-discover it -->
    <video id="receiverVideoElement" class="castMediaElement"></video>
    <!-- HLS background: shows the WebView2 preview stream captured by FFmpeg -->
    <video id="hls-bg" muted playsinline autoplay></video>
    <!-- Black overlay that fades in on pause to hide the HLS buffer drain -->
    <div id="pause-overlay"></div>

    <script>
        const CHANNEL = 'urn:x-cast:com.google.cast.media';
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE |
            cast.framework.messages.Command.QUEUE_NEXT |
            cast.framework.messages.Command.QUEUE_PREV
        );

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.PRELOAD,
            request => request
        );
            
        playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, request => {
            const baseUrl = (request.media && request.media.customData && request.media.customData.MediaBaseUrl) || '';
            console.log('[receiver] LOAD interceptor: baseUrl=' + baseUrl);
            if (baseUrl) {
                _castBaseUrl      = baseUrl;
                _hlsStreamingMode = (request.media && request.media.customData && request.media.customData.HlsStreamingMode) || '';
                _fetchRemoteLogSetting(baseUrl);

                // In pcm_stream mode audio comes from the Web Audio API — silence the CAF
                // media element IMMEDIATELY (before any async work) so the WAV stream that
                // CAF loads into receiverVideoElement never reaches the speakers.
                var caf = document.getElementById('receiverVideoElement');
                if (caf) {
                    caf.muted  = (_hlsStreamingMode === 'pcm_stream');
                    caf.volume = (_hlsStreamingMode === 'pcm_stream') ? 0 : 1;
                }

                // Invalidate the sync epoch so the loop does not use a stale value
                // from the previous track while waiting for the next /cast/audio-clock poll.
                _epochWallMs    = -1;
                _videoStartDate = null;
                _resetPcmStream(); // tear down any previous AudioWorklet + Worker
                try {
                    if (!_splitVideoHls) {
                        _showAudioSyncOverlay();
                        resetBgVideo();
                        _dispatchStream(baseUrl);
                    } else {
                        console.log('[receiver] LOAD: HLS already running — skipping reset');
                    }
                } catch (e) {
                    console.error('[receiver] _dispatchStream threw (non-fatal):', e && e.message ? e.message : String(e));
                }
                _startCalibrationWatch();
            }
            return request;
        });

        var _pauseRevealTimer = null;
        var _loadSyncActive = false;       // true while the initial load overlay covers the HLS video
        var _audioSyncOverlayTimer = null; // timer to lift the load overlay

        // On PAUSE: fade to black immediately so the stale HLS buffer drain is hidden.
        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, function () {
            var overlay = document.getElementById('pause-overlay');
            if (_audioSyncOverlayTimer) { clearTimeout(_audioSyncOverlayTimer); _audioSyncOverlayTimer = null; }
            _loadSyncActive = false;
            if (overlay) overlay.style.opacity = '1';
            if (_pauseRevealTimer) { clearTimeout(_pauseRevealTimer); _pauseRevealTimer = null; }

            // Pause the HLS video so it doesn't drift during the audio pause.
            if (_splitVideoHls) {
                var bg = document.getElementById('hls-bg');
                if (bg) try { bg.pause(); } catch (e) {}
            }
            // Suspend Web Audio playback (pcm_stream mode).
            if (_audioCtx && _audioCtx.state === 'running') {
                _audioCtx.suspend().catch(function () {});
            }

            _pauseRevealTimer = setTimeout(function () {
                _pauseRevealTimer = null;
                if (overlay) overlay.style.opacity = '0';
            }, 1500);
                        
            if (_castBaseUrl) {
                fetch(_castBaseUrl + 'cast/ack', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ state: 'PAUSED' })
                }).catch(function () {});
            }
        });
                
        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, function () {
            var bg      = document.getElementById('hls-bg');
            var overlay = document.getElementById('pause-overlay');
            if (_pauseRevealTimer) { clearTimeout(_pauseRevealTimer); _pauseRevealTimer = null; }
            if (bg && _splitVideoHls) {
                // Do NOT hard-seek to liveSyncPosition here — that would jump the video
                // forward by the full HLS latency on every resume, causing a large drift
                // spike that the sync loop then has to fight against.
                // Instead: just unpause and let the sync loop correct any drift
                // with a hard-seek to the audio-aligned position within one tick.
                if (bg.paused) bg.play().catch(function (e) { console.warn('[hls-bg] resume play() rejected:', e); });
            }
            // Resume Web Audio playback (pcm_stream mode).
            if (_audioCtx && _audioCtx.state === 'suspended') {
                _audioCtx.resume().catch(function () {});
            }
            // Re-enforce mute on CAF element — CAF may reset it when it fires PLAYING.
            if (_hlsStreamingMode === 'pcm_stream') {
                var cafEl = document.getElementById('receiverVideoElement');
                if (cafEl) { cafEl.muted = true; cafEl.volume = 0; }
            }
            if (overlay && !_loadSyncActive) overlay.style.opacity = '0';
            
            if (_castBaseUrl) {
                fetch(_castBaseUrl + 'cast/ack', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ state: 'PLAYING' })
                }).catch(function () {});
            }
        });

        playerManager.addEventListener(cast.framework.events.EventType.REQUEST_QUEUE_UPDATE, function (event) {
            var next = event.requestData && event.requestData.jump == 1;
            context.sendCustomMessage(CHANNEL, undefined, {
                type: next ? 'NEXT' : 'PREVIOUS',
                message: next ? 'NEXT' : 'PREVIOUS'
            });
        });

        context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, function () {
            context.stop();
        });

        var options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = {};
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600;
        options.mediaElement = document.getElementById('receiverVideoElement');

        window.onerror = function (msg, src, line, col, err) {
            console.error('[CRASH] Uncaught error:', msg, 'at', src, line + ':' + col, err);
        };
        window.addEventListener('unhandledrejection', function (e) {
            console.error('[CRASH] Unhandled promise rejection:', e.reason);
        });

        context.start(options);
                
        var _remoteLogEnabled = false;

        function _postRemoteLog(entry) {
            if (!_remoteLogEnabled || !_castBaseUrl) return;
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', _castBaseUrl + 'cast/log', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.send(JSON.stringify(entry));
            } catch(e) { /* never let remote logging break the app */ }
        }

        function _sendRemoteLog(level, args) {
            if (!_remoteLogEnabled) return;
            var msg;
            try {
                msg = Array.prototype.map.call(args, function(a) {
                    if (a == null) return String(a);
                    try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
                    catch(e) { return '[unserializable]'; }
                }).join(' ');
            } catch(e) { msg = '[log serialization error]'; }
            _postRemoteLog({ level: level, message: msg, ts: new Date().toISOString() });
        }

        (function() {
            ['log', 'info', 'warn', 'error'].forEach(function(m) {
                var _orig = console[m].bind(console);
                console[m] = function() { _orig.apply(console, arguments); _sendRemoteLog(m, arguments); };
            });
            window.onerror = function(msg, src, line) {
                _sendRemoteLog('error', ['[uncaught] ' + msg + ' (' + src + ':' + line + ')']);
                return false;
            };
            window.addEventListener('unhandledrejection', function(e) {
                var r = e.reason;
                _sendRemoteLog('error', ['[unhandledrejection] ' + (r && r.message ? r.message : String(r))]);
            });
        })();

        function _fetchRemoteLogSetting(baseUrl) {
            try {
                fetch(baseUrl + 'api/settings')
                    .then(function(r) { return r.ok ? r.json() : null; })
                    .then(function(cfg) {
                        _remoteLogEnabled = !!(cfg && cfg.enableReceiverLog);
                        console.log('[receiver] remote log ' + (_remoteLogEnabled ? 'enabled' : 'disabled'));
                    })
                    .catch(function() { _remoteLogEnabled = false; });
            } catch(e) { _remoteLogEnabled = false; }
        }

        // ── CAF player state diagnostics ────────────────────────────────────────
        // Subscribe to every significant CAF event so we can trace the full lifecycle
        // in the remote log without needing a physical monitor attached.
        (function _wireCafDiagnostics() {
            var EV = cast.framework.events.EventType;
            var interesting = [
                EV.MEDIA_STATUS, EV.PLAYER_LOAD_COMPLETE, EV.PLAYER_LOAD_FAILED,
                EV.PLAY, EV.PAUSE, EV.PLAYING, EV.ENDED, EV.BUFFERING,
                EV.TIME_UPDATE, EV.BITRATE_CHANGED, EV.SEGMENT_DOWNLOADED,
                EV.ERROR, EV.MEDIA_FINISHED, EV.REQUEST_LOAD
            ];
            interesting.forEach(function (evType) {
                playerManager.addEventListener(evType, function (event) {
                    // TIME_UPDATE fires very frequently — only log every 5 s
                    if (evType === EV.TIME_UPDATE) {
                        var now = Date.now();
                        if (!_wireCafDiagnostics._lastTimeUpdate || now - _wireCafDiagnostics._lastTimeUpdate > 5000) {
                            _wireCafDiagnostics._lastTimeUpdate = now;
                            var caf = document.getElementById('receiverVideoElement');
                            console.log('[caf-diag] TIME_UPDATE currentTime=' +
                                (caf ? caf.currentTime.toFixed(2) : 'n/a') +
                                ' muted=' + (caf ? caf.muted : '?') +
                                ' volume=' + (caf ? caf.volume : '?') +
                                ' readyState=' + (caf ? caf.readyState : '?') +
                                ' paused=' + (caf ? caf.paused : '?'));
                        }
                        return;
                    }
                    var detail = '';
                    try { detail = JSON.stringify(event).substring(0, 200); } catch(e) { detail = String(event); }
                    console.log('[caf-diag] ' + evType + ' ' + detail);
                });
            });

            // Also log CAF context-level events
            var SYS = cast.framework.system.EventType;
            [SYS.READY, SYS.SENDER_CONNECTED, SYS.SENDER_DISCONNECTED,
             SYS.SYSTEM_VOLUME_CHANGED, SYS.ERROR].forEach(function (sysEvType) {
                context.addEventListener(sysEvType, function (event) {
                    var detail = '';
                    try { detail = JSON.stringify(event).substring(0, 200); } catch(e) { detail = String(event); }
                    console.log('[caf-sys] ' + sysEvType + ' ' + detail);
                });
            });
        })();

        var _hlsStarted    = false;
        var _splitVideoHls = null;
        var _syncTimer     = null;   // A/V sync loop interval handle
        var _castBaseUrl   = '';     // set on LOAD from customData.MediaBaseUrl
        var _hlsStreamingMode = '';  // set on LOAD from customData.HlsStreamingMode
        var _calibPollTimer = null;
        var _sawCalibrationMode = false;

        // Module-level sync state — must be reset on every LOAD so the sync loop
        // does not use a stale epoch from the previous track/session.
        var _epochWallMs      = -1;  // server UTC ms when CAF connected (caf.currentTime=0)
        var _videoStartDate   = null; // cached result of video.getStartDate()
        var _videoStartDateAt = 0;    // wall time when _videoStartDate was last refreshed

        // pcm_stream state — AudioWorklet + Web Worker audio pipeline.
        var _audioCtx           = null;    // AudioContext
        var _workletNode        = null;    // AudioWorkletNode (pcm-sink)
        var _pcmWorker          = null;    // Web Worker (pcm-fetch-worker.js)
        var _pcmStartWallMs     = -1;      // X-PCM-Start-Wall-Ms header value
        var _pcmAudioMs         = 0;       // audioTimeMs from last worklet clock message
        var _pcmRingFill        = 0;       // ringFill (samples) from last worklet clock message
        var _pcmSampleRate      = 48000;   // X-PCM-SampleRate header value
        var _pcmSamplesBuffered = 0;       // total Float32 samples delivered to worklet
        var _pcmPrerollSent     = false;   // true after 'start' sent to worklet

        function _postSplitTelemetry(data) {
            if (!_castBaseUrl) return;
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', _castBaseUrl + 'cast/telemetry', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.send(JSON.stringify(data));
            } catch(e) { /* never let telemetry break the stream */ }
        }
                
        function _showAudioSyncOverlay() {
            var overlay = document.getElementById('pause-overlay');
            if (!overlay) return;
            if (_audioSyncOverlayTimer) { clearTimeout(_audioSyncOverlayTimer); _audioSyncOverlayTimer = null; }
            _loadSyncActive = true;
            overlay.style.opacity = '1';
            fetch(_castBaseUrl + 'cast/state')
                .then(function (r) { return r.json(); })
                .then(function (s) {
                    var delayMs = s.calibrationMode ? 3000 : 14000;
                    _audioSyncOverlayTimer = setTimeout(function () {
                        _audioSyncOverlayTimer = null;
                        _loadSyncActive = false;
                        overlay.style.opacity = '0';
                    }, delayMs);
                })
                .catch(function () {
                    _audioSyncOverlayTimer = setTimeout(function () {
                        _audioSyncOverlayTimer = null;
                        _loadSyncActive = false;
                        overlay.style.opacity = '0';
                    }, 14000);
                });
        }
                
        function resetBgVideo() {
            var video = document.getElementById('hls-bg');
            if (_splitVideoHls) {
                try { _splitVideoHls.destroy(); } catch (e) {}
                _splitVideoHls = null;
            }
            _hlsStarted = false;
            if (_syncTimer) { clearInterval(_syncTimer); _syncTimer = null; }
            if (video) { try { video.pause(); } catch (e) {} video.style.display = 'none'; }
            console.log('[receiver] bg video reset — buffers dropped');
        }
                
        function _startCalibrationWatch() {
            if (_calibPollTimer) { clearTimeout(_calibPollTimer); }
            _calibPollTimer = setTimeout(_calibPoll, 1000);
        }

        function _calibPoll() {
            _calibPollTimer = null;
            if (!_castBaseUrl) return;
            fetch(_castBaseUrl + 'cast/state')
                .then(function (r) { return r.json(); })
                .then(function (s) {
                    if (s.calibrationMode) {
                        if (!_sawCalibrationMode) {
                            _sawCalibrationMode = true;
                            setTimeout(function () {
                                var bg = document.getElementById('hls-bg');
                                if (bg && _splitVideoHls && _splitVideoHls.liveSyncPosition) {
                                    bg.currentTime = _splitVideoHls.liveSyncPosition;
                                    console.log('[receiver] calibration start — video seeked to live edge ' + _splitVideoHls.liveSyncPosition.toFixed(2));
                                }
                            }, 3000);
                        }
                        _calibPollTimer = setTimeout(_calibPoll, 1000);
                    } else if (_sawCalibrationMode) {
                        _sawCalibrationMode = false;
                        console.log('[receiver] calibration ended — seeking to live edge');
                        setTimeout(function () {
                            var bg = document.getElementById('hls-bg');
                            if (bg && _splitVideoHls && _splitVideoHls.liveSyncPosition) {
                                bg.currentTime = _splitVideoHls.liveSyncPosition;
                            }
                        }, 3000);
                    }
                })
                .catch(function () {
                    if (_sawCalibrationMode) {
                        _calibPollTimer = setTimeout(_calibPoll, 2000);
                    }
                });
        }
                
        function startCafWavSync(baseUrl) {
            if (_hlsStarted || !baseUrl) return;
            var video = document.getElementById('hls-bg');
            if (!video) return;
            if (typeof Hls === 'undefined' || !Hls.isSupported()) {
                console.error('[caf-wav-sync] hls.js not available or MSE not supported');
                return;
            }

            _hlsStarted = true;

            var caf = document.getElementById('receiverVideoElement');
            if (caf) caf.muted = false;

            fetch(baseUrl + 'api/settings')
                .then(function (r) { return r.ok ? r.json() : null; })
                .catch(function () { return null; })
                .then(function (cfg) {
                    var liveSyncDurationCount       = (cfg && cfg.hlsLiveSyncSegments > 0)   ? cfg.hlsLiveSyncSegments   : 3;
                    var liveMaxLatencyDurationCount = (cfg && cfg.hlsMaxLatencySegments > 0) ? cfg.hlsMaxLatencySegments : 6;
                    
                    var maxBufferLength  = 25;
                    var backBufferLength = 20;

                    _splitVideoHls = new Hls({
                        lowLatencyMode: false,
                        liveSyncDurationCount: liveSyncDurationCount,
                        liveMaxLatencyDurationCount: liveMaxLatencyDurationCount,
                        maxBufferLength: maxBufferLength,
                        backBufferLength: backBufferLength,                        
                        enableWorker: false,
                        abrEnabled: false,
                        startLevel: 0,
                        manifestLoadingMaxRetry: 12,
                        manifestLoadingRetryDelay: 1000,
                        manifestLoadingMaxRetryTimeout: 12000,
                    });

                    _splitVideoHls.loadSource(baseUrl + 'cast/split_video/stream.m3u8');
                    _splitVideoHls.attachMedia(video);

                    _splitVideoHls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.muted = true;
                        video.style.display = 'block';
                        var pos = _splitVideoHls.liveSyncPosition;
                        if (pos != null) { video.currentTime = pos; }
                        video.play().catch(function (e) { console.warn('[caf-wav-sync] video play() rejected:', e); });
                        console.log('[caf-wav-sync] video manifest parsed — starting sync loop');
                        _cafWavSyncVideoSync();
                    });

                    _splitVideoHls.on(Hls.Events.ERROR, function (evt, data) {
                        if (!data.fatal) return;
                        console.error('[caf-wav-sync] video fatal HLS error:', data.type, data.details);
                        if (_splitVideoHls) { try { _splitVideoHls.destroy(); } catch (e) {} _splitVideoHls = null; }
                        if (_syncTimer) { clearInterval(_syncTimer); _syncTimer = null; }
                        _hlsStarted = false;
                        setTimeout(function () { startCafWavSync(baseUrl); }, 3000);
                    });
                });
        }

        function _cafWavSyncVideoSync() {
            if (_syncTimer) clearInterval(_syncTimer);
            var SYNC_TICK_MS   = 100;    // sync evaluation interval (ms)
            var CLOCK_POLL_MS  = 500;    // audio-clock poll interval (ms)
            var SEEK_THRESHOLD = 400;    // ms: hard-seek when |drift| exceeds this
            var DEAD_ZONE      = 40;     // ms: no correction within ±40 ms
            var RATE_GAIN      = 0.5;    // proportional gain (drift_s → rate delta)
            var MAX_RATE_DELTA = 0.10;   // ±10 % max rate adjustment
            var SEEK_COOLDOWN  = 2000;   // ms: suppress seeks for this long after a seek
            var MAX_RTT_MS     = 300;    // discard poll responses with RTT > this

            var _lastLoggedRate   = 1.0;
            var _graceUntil       = Date.now() + 8000; // ignore first 8 s while HLS latches
            // _epochWallMs, _videoStartDate, _videoStartDateAt are module-level so the LOAD
            // interceptor can reset them on every track change without restarting the sync loop.
            var _lastClockPollAt  = 0;
            var _clockPollActive  = false;
            var _lastHardSeekAt   = 0;

            function _pollAudioClock() {
                if (!_castBaseUrl || _clockPollActive) return;
                _clockPollActive = true;
                var t0 = Date.now();
                fetch(_castBaseUrl + 'cast/audio-clock', { cache: 'no-store' })
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (d) {
                        if (!d) return;
                        var rtt = Date.now() - t0;
                        if (rtt > MAX_RTT_MS) {
                            console.warn('[caf-wav-sync] clock poll RTT=' + rtt + 'ms > MAX — discarding');
                            return;
                        }
                        // epochWallMs: -1 until CAF has connected to the audio stream.
                        if (typeof d.epochWallMs === 'number' && d.epochWallMs >= 0) {
                            _epochWallMs = d.epochWallMs;
                        }
                    })
                    .catch(function () {})
                    .finally(function () { _clockPollActive = false; });
            }
         
            function _getVideoStartDate(video) {
                var now = Date.now();
                if (_videoStartDate && (now - _videoStartDateAt) < 10000) return _videoStartDate;
                if (typeof video.getStartDate === 'function') {
                    var d = video.getStartDate();
                    if (d && !isNaN(d.getTime()) && d.getTime() > 0) {
                        _videoStartDate = d;
                        _videoStartDateAt = now;
                    }
                }
                return _videoStartDate;
            }

            _syncTimer = setInterval(function () {
                var now = Date.now();

                // Refresh audio-clock at the configured rate.
                if (now - _lastClockPollAt >= CLOCK_POLL_MS) {
                    _lastClockPollAt = now;
                    _pollAudioClock();
                }

                if (!_splitVideoHls) return;
                var video = document.getElementById('hls-bg');
                if (!video || video.paused) return;
                if (now < _graceUntil) return;
                if (_epochWallMs < 0) return; // CAF has not connected yet

                var caf = document.getElementById('receiverVideoElement');
                if (!caf || caf.currentTime <= 0) return;

                // ── Wall-clock position of what audio is playing right now ──
                // epochWallMs is the server UTC time when caf.currentTime was 0.
                var audioWallMs = _epochWallMs + caf.currentTime * 1000;

                // ── Wall-clock position of what video is showing right now ──
                // getStartDate() returns the Date for currentTime = 0 from EXT-X-PROGRAM-DATE-TIME.
                var startDate = _getVideoStartDate(video);
                if (!startDate) {
                    // PDT not available yet — emit a one-time warning and skip this tick.
                    if (!_cafWavSyncVideoSync._pdtWarned) {
                        _cafWavSyncVideoSync._pdtWarned = true;
                        console.warn('[caf-wav-sync] EXT-X-PROGRAM-DATE-TIME not yet available — waiting for manifest PDT');
                    }
                    return;
                }

                var videoWallMs = startDate.getTime() + video.currentTime * 1000;

                // drift > 0: audio is ahead of video → video needs to play faster to catch up
                // drift < 0: video is ahead of audio → video needs to slow down
                var drift = audioWallMs - videoWallMs;  // in ms

                // Sanity: discard wild readings (startup transients, stale epoch, NaN)
                if (!isFinite(drift) || Math.abs(drift) > 30000) {
                    console.warn('[caf-wav-sync] anomalous drift=' + drift.toFixed(0) + 'ms — audioWall=' + audioWallMs + ' videoWall=' + videoWallMs + ' — skipping');
                    return;
                }

                // ── Hard-seek: large drift, outside cooldown ──
                if (Math.abs(drift) > SEEK_THRESHOLD && (now - _lastHardSeekAt) > SEEK_COOLDOWN) {
                    // targetVideoTime: move video so its PDT wall time matches the audio wall time.
                    var targetVideoTime = (audioWallMs - startDate.getTime()) / 1000;
                    // Clamp to buffered range
                    if (video.buffered.length > 0) {
                        var bufStart = video.buffered.start(0) + 0.1;
                        var bufEnd   = video.buffered.end(video.buffered.length - 1) - 0.1;
                        targetVideoTime = Math.max(bufStart, Math.min(bufEnd, targetVideoTime));
                    }
                    if (targetVideoTime > 0) {
                        video.currentTime = targetVideoTime;
                        video.playbackRate = 1.0;
                        _lastHardSeekAt = now;
                        _lastLoggedRate = 1.0;
                        _videoStartDate = null; // force PDT re-read after seek
                        console.log('[caf-wav-sync] hard-seek: drift=' + drift.toFixed(0) + 'ms → seekTo=' + targetVideoTime.toFixed(3) + ' cafT=' + caf.currentTime.toFixed(2));
                        _postSplitTelemetry({ type: 'caf_seek', driftMs: Math.round(drift), targetTime: targetVideoTime, audioWallMs: Math.round(audioWallMs), videoWallMs: Math.round(videoWallMs) });
                    }
                    return;
                }

                // ── Dead zone: no correction ──
                if (Math.abs(drift) < DEAD_ZONE) {
                    if (video.playbackRate !== 1.0) {
                        video.playbackRate = 1.0;
                        console.log('[caf-wav-sync] sync: dead zone — rate=1.0 drift=' + drift.toFixed(0) + 'ms');
                        _lastLoggedRate = 1.0;
                    }
                    return;
                }

                // ── Rate trim: proportional, capped at ±MAX_RATE_DELTA ──
                var rate = 1.0 + Math.max(-MAX_RATE_DELTA, Math.min(MAX_RATE_DELTA, (drift / 1000) * RATE_GAIN));
                video.playbackRate = rate;
                var roundedRate = Math.round(rate * 1000);
                if (Math.abs(roundedRate - Math.round(_lastLoggedRate * 1000)) >= 3) {
                    console.log('[caf-wav-sync] sync: drift=' + drift.toFixed(0) + 'ms rate=' + rate.toFixed(3) + ' cafT=' + caf.currentTime.toFixed(2) + ' vidT=' + video.currentTime.toFixed(2));
                    _lastLoggedRate = rate;
                }
            }, SYNC_TICK_MS);
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // pcm_stream pipeline — AudioWorklet + Web Worker for near-bit-perfect audio
        // + wall-clock A/V synchronisation against HLS video EXT-X-PROGRAM-DATE-TIME.
        // ═══════════════════════════════════════════════════════════════════════════

        // Tear down any live pcm_stream components (called on every LOAD / teardown).
        function _resetPcmStream() {
            console.log('[pcm-stream] _resetPcmStream — tearing down pipeline');
            if (_pcmWorker)   { try { _pcmWorker.terminate();    } catch (e) {} _pcmWorker   = null; }
            if (_workletNode) { try { _workletNode.disconnect(); } catch (e) {} _workletNode = null; }
            if (_audioCtx)    { try { _audioCtx.close();         } catch (e) {} _audioCtx    = null; }
            _pcmStartWallMs     = -1;
            _pcmAudioMs         = 0;
            _pcmRingFill        = 0;
            _pcmSamplesBuffered = 0;
            _pcmPrerollSent     = false;
            console.log('[pcm-stream] _resetPcmStream — done');
        }

        // Reads api/settings to detect the active streaming mode and dispatches to the
        // appropriate pipeline start function.  Both paths are kept so settings changes
        // take effect on the next LOAD without redeploying the receiver.
        function _dispatchStream(baseUrl) {
            fetch(baseUrl + 'api/settings')
                .then(function (r) { return r.ok ? r.json() : null; })
                .catch(function () { return null; })
                .then(function (cfg) {
                    var mode = (cfg && cfg.hlsStreamingMode) || '';
                    console.log('[receiver] streaming mode: ' + (mode || '(unknown)'));
                    if (mode === 'pcm_stream') {
                        startPcmStream(baseUrl, cfg);
                    } else {
                        // caf_wav_sync and all legacy modes — existing path.
                        // startCafWavSync does its own settings fetch internally.
                        startCafWavSync(baseUrl);
                    }
                });
        }

        // ── startPcmStream ────────────────────────────────────────────────────────
        // Mutes the CAF media element (audio comes from Web Audio API), starts the
        // HLS video pipeline, then starts the AudioWorklet + PCM fetch worker.
        function startPcmStream(baseUrl, cfg) {
            if (_hlsStarted || !baseUrl) return;
            _hlsStarted = true;

            console.log('[pcm-stream] startPcmStream — baseUrl=' + baseUrl);

            // Audio comes from the Web Audio API — keep CAF element muted.
            var caf = document.getElementById('receiverVideoElement');
            if (caf) caf.muted = true;
            console.log('[pcm-stream] CAF element muted=' + (caf ? caf.muted : 'no-element') + ' volume=' + (caf ? caf.volume : '?'));

            var video = document.getElementById('hls-bg');
            if (!video || typeof Hls === 'undefined' || !Hls.isSupported()) {
                console.error('[pcm-stream] hls.js not available or video element missing — Hls defined=' + (typeof Hls !== 'undefined') + ' isSupported=' + (typeof Hls !== 'undefined' && Hls.isSupported()));
                return;
            }

            var liveSyncDurationCount       = (cfg && cfg.hlsLiveSyncSegments  > 0) ? cfg.hlsLiveSyncSegments  : 3;
            var liveMaxLatencyDurationCount = (cfg && cfg.hlsMaxLatencySegments > 0) ? cfg.hlsMaxLatencySegments : 6;

            _splitVideoHls = new Hls({
                lowLatencyMode:              false,
                liveSyncDurationCount:       liveSyncDurationCount,
                liveMaxLatencyDurationCount: liveMaxLatencyDurationCount,
                maxBufferLength:             25,
                backBufferLength:            20,
                enableWorker:                false,
                abrEnabled:                  false,
                startLevel:                  0,
                manifestLoadingMaxRetry:     12,
                manifestLoadingRetryDelay:   1000,
                manifestLoadingMaxRetryTimeout: 12000,
            });

            _splitVideoHls.loadSource(baseUrl + 'cast/split_video/stream.m3u8');
            _splitVideoHls.attachMedia(video);
            console.log('[pcm-stream] HLS loading source: ' + baseUrl + 'cast/split_video/stream.m3u8');

            // ── Comprehensive hls.js event instrumentation ──
            _splitVideoHls.on(Hls.Events.MANIFEST_LOADING,  function (e, d) { console.log('[hls-diag] MANIFEST_LOADING url=' + d.url); });
            _splitVideoHls.on(Hls.Events.MANIFEST_LOADED,   function (e, d) { console.log('[hls-diag] MANIFEST_LOADED levels=' + d.levels.length); });
            _splitVideoHls.on(Hls.Events.MANIFEST_PARSED,   function (e, d) { console.log('[hls-diag] MANIFEST_PARSED levels=' + d.levels.length + ' firstLevel=' + d.firstLevel); });
            _splitVideoHls.on(Hls.Events.LEVEL_LOADED,      function (e, d) { console.log('[hls-diag] LEVEL_LOADED fragments=' + d.details.fragments.length + ' live=' + d.details.live + ' targetDuration=' + d.details.targetduration); });
            _splitVideoHls.on(Hls.Events.FRAG_LOADING,      function (e, d) { console.log('[hls-diag] FRAG_LOADING sn=' + d.frag.sn + ' url=' + d.frag.url.split('/').pop()); });
            _splitVideoHls.on(Hls.Events.FRAG_LOADED,       function (e, d) { console.log('[hls-diag] FRAG_LOADED sn=' + d.frag.sn + ' bytes=' + (d.networkDetails ? d.networkDetails.response : '?')); });
            _splitVideoHls.on(Hls.Events.FRAG_BUFFERED,     function (e, d) { console.log('[hls-diag] FRAG_BUFFERED sn=' + d.frag.sn + ' id=' + d.frag.level); });
            _splitVideoHls.on(Hls.Events.BUFFER_APPENDED,   function () { /* very frequent — omit */ });
            _splitVideoHls.on(Hls.Events.BUFFER_EOS,        function () { console.log('[hls-diag] BUFFER_EOS'); });
            _splitVideoHls.on(Hls.Events.BUFFER_STALLED,    function () { console.log('[hls-diag] BUFFER_STALLED'); });
            _splitVideoHls.on(Hls.Events.BUFFER_FLUSHED,    function () { console.log('[hls-diag] BUFFER_FLUSHED'); });
            _splitVideoHls.on(Hls.Events.ERROR,              function (evt, data) {
                var lvl = data.fatal ? 'error' : 'warn';
                console[lvl]('[hls-diag] ERROR fatal=' + data.fatal + ' type=' + data.type + ' details=' + data.details + (data.response ? ' status=' + data.response.code : ''));
            });

            _splitVideoHls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.muted = true;
                video.style.display = 'block';
                var pos = _splitVideoHls.liveSyncPosition;
                console.log('[pcm-stream] HLS manifest parsed liveSyncPos=' + pos);
                if (pos != null) { video.currentTime = pos; }
                video.play().catch(function (e) { console.warn('[pcm-stream] video play() rejected:', e); });
                console.log('[pcm-stream] HLS manifest parsed — starting AudioWorklet pipeline');
                _startPcmAudioWorklet(baseUrl);
                _pcmSyncVideoSync();
            });

            _splitVideoHls.on(Hls.Events.ERROR, function (evt, data) {
                if (!data.fatal) return;
                console.error('[pcm-stream] fatal HLS error — destroying and retrying in 3 s: type=' + data.type + ' details=' + data.details);
                if (_splitVideoHls) { try { _splitVideoHls.destroy(); } catch (e) {} _splitVideoHls = null; }
                if (_syncTimer) { clearInterval(_syncTimer); _syncTimer = null; }
                _hlsStarted = false;
                setTimeout(function () { startPcmStream(baseUrl, cfg); }, 3000);
            });
        }

        // ── _startPcmAudioWorklet ─────────────────────────────────────────────────
        // Creates AudioContext → loads pcm-worklet.js → creates PcmSinkProcessor node
        // → starts pcm-fetch-worker.js → opens /cast/pcmlive stream.
        function _startPcmAudioWorklet(baseUrl) {
            try {
                _audioCtx = new AudioContext({ sampleRate: _pcmSampleRate });
                console.log('[pcm-stream] AudioContext created state=' + _audioCtx.state + ' sampleRate=' + _audioCtx.sampleRate);

                // Chrome creates AudioContext in 'suspended' state unless a user gesture
                // has occurred. On Chromecast there is no gesture, and the CAF PLAYING event
                // (which calls _audioCtx.resume()) fires before this function is even called.
                // Resume unconditionally here so the context is running before any audio arrives.
                _audioCtx.resume().then(function () {
                    console.log('[pcm-stream] AudioContext.resume() resolved — state=' + _audioCtx.state);
                }).catch(function (e) {
                    console.warn('[pcm-stream] AudioContext.resume() failed:', e);
                });

                _audioCtx.audioWorklet.addModule('./pcm-worklet.js')
                    .then(function () {
                        console.log('[pcm-stream] pcm-worklet.js loaded — AudioContext state=' + _audioCtx.state);
                        _workletNode = new AudioWorkletNode(_audioCtx, 'pcm-sink');
                        _workletNode.connect(_audioCtx.destination);
                        console.log('[pcm-stream] PcmSinkProcessor node connected to destination');

                        _workletNode.port.onmessage = function (e) {
                            var msg = e.data;
                            if (msg.type === 'clock') {
                                _pcmAudioMs  = msg.audioTimeMs;
                                _pcmRingFill = msg.ringFill;
                                // Log first clock tick as confirmation audio pipeline is alive
                                if (!_startPcmAudioWorklet._firstClockLogged) {
                                    _startPcmAudioWorklet._firstClockLogged = true;
                                    console.log('[pcm-stream] FIRST WORKLET CLOCK: audioTimeMs=' + msg.audioTimeMs +
                                        ' samplesPlayed=' + msg.samplesPlayed +
                                        ' ringFill=' + msg.ringFill +
                                        ' ringCapacity=' + msg.ringCapacity +
                                        ' AudioCtx.state=' + (_audioCtx ? _audioCtx.state : 'null'));
                                }
                            } else if (msg.type === 'underrun') {
                                console.warn('[pcm-stream] worklet underrun ringFill=' + msg.ringFill + ' — re-arming pre-roll');
                                _pcmPrerollSent     = false;
                                _pcmSamplesBuffered = 0;
                                if (_workletNode) _workletNode.port.postMessage({ type: 'reset' });
                            }
                        };

                        // Start the Web Worker that fetches and parses the framed PCM stream.
                        _pcmWorker = new Worker('./pcm-fetch-worker.js');
                        console.log('[pcm-stream] pcm-fetch-worker.js Worker created');
                        var _workerPcmFrames = 0;
                        _pcmWorker.onmessage = function (e) {
                            var msg = e.data;
                            if (msg.type === 'pcm') {
                                _workerPcmFrames++;
                                // Log first frame + every 500th to confirm worker is parsing
                                if (_workerPcmFrames === 1 || _workerPcmFrames % 500 === 0) {
                                    console.log('[pcm-stream] worker pcm frame #' + _workerPcmFrames +
                                        ' audioTimeMs=' + msg.audioTimeMs +
                                        ' samples=' + msg.left.length +
                                        ' buffered=' + _pcmSamplesBuffered +
                                        ' prerollSent=' + _pcmPrerollSent);
                                }
                                if (_workletNode) {
                                    _workletNode.port.postMessage(
                                        { type: 'pcm', left: msg.left, right: msg.right, audioTimeMs: msg.audioTimeMs },
                                        [msg.left.buffer, msg.right.buffer]
                                    );
                                }
                                _pcmSamplesBuffered += msg.left.length;
                                if (!_pcmPrerollSent && _pcmSamplesBuffered >= 48000) {
                                    _pcmPrerollSent = true;
                                    if (_workletNode) _workletNode.port.postMessage({ type: 'start' });
                                    console.log('[pcm-stream] pre-roll complete (' + _pcmSamplesBuffered + ' samples) — sending start to worklet. AudioCtx.state=' + (_audioCtx ? _audioCtx.state : 'null'));
                                }
                            } else if (msg.type === 'syncLost') {
                                console.warn('[pcm-stream] frame sync lost — scanning for magic');
                            }
                        };
                        _pcmWorker.onerror = function (e) {
                            console.error('[pcm-stream] Worker error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
                        };

                        _startPcmFetch(baseUrl);
                        console.log('[pcm-stream] AudioWorklet + Worker ready');

                        // ── Periodic status heartbeat ────────────────────────────────
                        // Logs the full pipeline state every 10 s so we can confirm
                        // data is flowing even if no other events fire.
                        setInterval(function () {
                            if (!_audioCtx) return;
                            var currentPcmMs = _pcmAudioMs - (_pcmRingFill * 1000 / _pcmSampleRate);
                            console.log('[pcm-stream] HEARTBEAT' +
                                ' ctxState=' + _audioCtx.state +
                                ' buffered=' + _pcmSamplesBuffered +
                                ' prerollSent=' + _pcmPrerollSent +
                                ' audioTimeMs=' + _pcmAudioMs +
                                ' ringFill=' + _pcmRingFill +
                                ' currentPcmMs=' + currentPcmMs.toFixed(0) +
                                ' startWallMs=' + _pcmStartWallMs);
                        }, 10000);
                    })
                    .catch(function (err) {
                        console.error('[pcm-stream] audioWorklet.addModule failed:', err);
                    });
            } catch (err) {
                console.error('[pcm-stream] AudioContext/Worklet setup failed:', err);
            }
        }

        // ── _startPcmFetch ────────────────────────────────────────────────────────
        // Opens a streaming GET to /cast/pcmlive, reads the start wall-clock from the
        // response header, and pumps raw byte chunks to the Web Worker for parsing.
        function _startPcmFetch(baseUrl) {
            if (!_pcmWorker) return;
            console.log('[pcm-stream] _startPcmFetch — opening ' + baseUrl + 'cast/pcmlive');
            var _fetchChunks = 0;
            var _fetchBytes  = 0;
            fetch(baseUrl + 'cast/pcmlive', { cache: 'no-store' })
                .then(function (resp) {
                    console.log('[pcm-stream] /cast/pcmlive response status=' + resp.status +
                        ' X-PCM-Start-Wall-Ms=' + resp.headers.get('X-PCM-Start-Wall-Ms') +
                        ' X-PCM-SampleRate='    + resp.headers.get('X-PCM-SampleRate') +
                        ' Content-Type='        + resp.headers.get('Content-Type'));
                    if (!resp.ok) {
                        console.error('[pcm-stream] /cast/pcmlive HTTP ' + resp.status + ' — retrying in 3 s');
                        setTimeout(function () { _startPcmFetch(baseUrl); }, 3000);
                        return;
                    }

                    // X-PCM-Start-Wall-Ms: server UTC ms when AudioClockTee audioTimeMs = 0.
                    // Used as the fixed anchor: audioWallMs = startWallMs + currentPcmMs.
                    var startHdr = resp.headers.get('X-PCM-Start-Wall-Ms');
                    if (startHdr) {
                        var parsed = parseInt(startHdr, 10);
                        if (!isNaN(parsed) && parsed > 0) {
                            _pcmStartWallMs = parsed;
                            console.log('[pcm-stream] startWallMs=' + _pcmStartWallMs);
                        }
                    }
                    var srHdr = resp.headers.get('X-PCM-SampleRate');
                    if (srHdr) { var sr = parseInt(srHdr, 10); if (sr > 0) _pcmSampleRate = sr; }

                    if (!resp.body) {
                        console.error('[pcm-stream] response has no body — retrying');
                        setTimeout(function () { _startPcmFetch(baseUrl); }, 3000);
                        return;
                    }

                    var reader = resp.body.getReader();
                    function pump() {
                        reader.read().then(function (result) {
                            if (result.done) {
                                console.log('[pcm-stream] stream ended after ' + _fetchChunks + ' chunks / ' + _fetchBytes + ' bytes — reconnecting in 2 s');
                                if (_pcmWorker) _pcmWorker.postMessage({ type: 'reset' });
                                setTimeout(function () { _startPcmFetch(baseUrl); }, 2000);
                                return;
                            }
                            _fetchChunks++;
                            _fetchBytes += result.value.length;
                            // Log first chunk and every 200th to confirm bytes are flowing
                            if (_fetchChunks === 1 || _fetchChunks % 200 === 0) {
                                console.log('[pcm-stream] fetch chunk #' + _fetchChunks +
                                    ' bytes=' + result.value.length +
                                    ' total=' + _fetchBytes +
                                    ' workerAlive=' + (!!_pcmWorker));
                            }
                            if (_pcmWorker) {
                                _pcmWorker.postMessage({ type: 'chunk', data: result.value }, [result.value.buffer]);
                            }
                            pump();
                        }).catch(function (err) {
                            if (_pcmWorker) {
                                console.warn('[pcm-stream] fetch read error:', err, '— retrying in 3 s');
                                setTimeout(function () { _startPcmFetch(baseUrl); }, 3000);
                            }
                        });
                    }
                    pump();
                })
                .catch(function (err) {
                    console.error('[pcm-stream] fetch error:', err, '— retrying in 3 s');
                    setTimeout(function () { _startPcmFetch(baseUrl); }, 3000);
                });
        }

        // ── _pcmSyncVideoSync ─────────────────────────────────────────────────────
        //
        // A/V sync loop for pcm_stream mode.
        //
        // The AudioWorklet posts 'clock' messages every 1024 samples (~21 ms at 48 kHz).
        // Each message carries:
        //   audioTimeMs — content timestamp of the last frame written to the ring
        //   ringFill    — samples currently buffered ahead of the hardware playhead
        //
        // The DAC is currently playing content at approximately:
        //   currentPcmMs ≈ audioTimeMs − ringFill × 1000 / sampleRate
        //   audioWallMs  = pcmStartWallMs + currentPcmMs
        //
        // Video wall time comes directly from EXT-X-PROGRAM-DATE-TIME (PDT), avoiding
        // the liveSyncPosition sawtooth that broke the previous caf_wav_sync design:
        //   videoWallMs  = video.getStartDate().getTime() + video.currentTime × 1000
        //
        // drift = audioWallMs − videoWallMs
        //   > 0 : audio is ahead → video must catch up (rate > 1, or hard-seek forward)
        //   < 0 : video is ahead → video must slow down (rate < 1, or hard-seek back)
        //
        function _pcmSyncVideoSync() {
            if (_syncTimer) clearInterval(_syncTimer);

            var SYNC_TICK_MS   = 100;   // evaluation interval
            var SEEK_THRESHOLD = 400;   // ms: hard-seek when |drift| exceeds this
            var DEAD_ZONE      = 40;    // ms: no correction within ±40 ms
            var RATE_GAIN      = 0.5;   // proportional gain (drift_s → rate delta)
            var MAX_RATE_DELTA = 0.10;  // ±10 % max playback rate adjustment
            var SEEK_COOLDOWN  = 2000;  // ms: suppress consecutive seeks

            var _lastLoggedRate = 1.0;
            var _graceUntil     = Date.now() + 5000; // 5 s for HLS latch + pre-roll
            var _lastHardSeekAt = 0;

            _syncTimer = setInterval(function () {
                var now = Date.now();
                if (now < _graceUntil)      return;
                if (!_splitVideoHls)        return;
                if (!_pcmPrerollSent)       return; // worklet not yet playing
                if (_pcmStartWallMs < 0)    return; // header not received yet
                if (_pcmAudioMs === 0 && _pcmRingFill === 0) return; // no worklet clock yet

                var video = document.getElementById('hls-bg');
                if (!video || video.paused)  return;

                // ── Audio wall clock ──────────────────────────────────────────────
                // currentPcmMs: content time currently at the DAC output.
                // audioTimeMs is the content timestamp of the last chunk pushed to the
                // ring write head; subtracting ringFill gives the read head content time.
                var currentPcmMs = _pcmAudioMs - (_pcmRingFill * 1000 / _pcmSampleRate);
                var audioWallMs  = _pcmStartWallMs + Math.max(0, currentPcmMs);

                // ── Video wall clock ──────────────────────────────────────────────
                var startDate = _getVideoStartDate(video);
                if (!startDate) {
                    if (!_pcmSyncVideoSync._pdtWarned) {
                        _pcmSyncVideoSync._pdtWarned = true;
                        console.warn('[pcm-stream] EXT-X-PROGRAM-DATE-TIME not yet in manifest — waiting');
                    }
                    return;
                }
                var videoWallMs = startDate.getTime() + video.currentTime * 1000;

                var drift = audioWallMs - videoWallMs; // ms; > 0 = video behind audio

                if (!isFinite(drift) || Math.abs(drift) > 30000) {
                    console.warn('[pcm-stream] anomalous drift=' + drift.toFixed(0) + 'ms (pcmAudio=' + _pcmAudioMs + ' ringFill=' + _pcmRingFill + ') — skipping');
                    return;
                }

                // ── Hard-seek ─────────────────────────────────────────────────────
                if (Math.abs(drift) > SEEK_THRESHOLD && (now - _lastHardSeekAt) > SEEK_COOLDOWN) {
                    var targetVideoTime = (audioWallMs - startDate.getTime()) / 1000;
                    if (video.buffered.length > 0) {
                        var bufStart = video.buffered.start(0) + 0.1;
                        var bufEnd   = video.buffered.end(video.buffered.length - 1) - 0.1;
                        targetVideoTime = Math.max(bufStart, Math.min(bufEnd, targetVideoTime));
                    }
                    if (targetVideoTime > 0) {
                        video.currentTime = targetVideoTime;
                        video.playbackRate = 1.0;
                        _lastHardSeekAt = now;
                        _lastLoggedRate = 1.0;
                        _videoStartDate = null; // force PDT re-read after seek
                        console.log('[pcm-stream] hard-seek: drift=' + drift.toFixed(0) + 'ms curPcm=' + currentPcmMs.toFixed(0) + 'ms → seekTo=' + targetVideoTime.toFixed(3));
                        _postSplitTelemetry({ type: 'pcm_seek', driftMs: Math.round(drift), targetTime: targetVideoTime, audioWallMs: Math.round(audioWallMs), videoWallMs: Math.round(videoWallMs), currentPcmMs: Math.round(currentPcmMs) });
                    }
                    return;
                }

                // ── Dead zone ─────────────────────────────────────────────────────
                if (Math.abs(drift) < DEAD_ZONE) {
                    if (video.playbackRate !== 1.0) {
                        video.playbackRate = 1.0;
                        console.log('[pcm-stream] sync: dead zone — rate=1.0 drift=' + drift.toFixed(0) + 'ms');
                        _lastLoggedRate = 1.0;
                    }
                    return;
                }

                // ── Rate trim ─────────────────────────────────────────────────────
                var rate = 1.0 + Math.max(-MAX_RATE_DELTA, Math.min(MAX_RATE_DELTA, (drift / 1000) * RATE_GAIN));
                video.playbackRate = rate;
                var roundedRate = Math.round(rate * 1000);
                if (Math.abs(roundedRate - Math.round(_lastLoggedRate * 1000)) >= 3) {
                    console.log('[pcm-stream] sync: drift=' + drift.toFixed(0) + 'ms rate=' + rate.toFixed(3) + ' curPcm=' + currentPcmMs.toFixed(0) + 'ms vidT=' + video.currentTime.toFixed(2));
                    _lastLoggedRate = rate;
                }
            }, SYNC_TICK_MS);
        }
    </script>
</body>
</html>
