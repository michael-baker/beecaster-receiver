<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Cast Debug Logger for on-device debugging -->
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <style>
        /* Base receiver styles */
        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #3d2645 0%, #4a3052 50%, #5a4a6e 100%);
        }

        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            filter: blur(14px) saturate(150%) hue-rotate(-10deg);
            transform: scale(1.06);
        }

        #backdrop {
            position: absolute;
            inset: 0;
            z-index: 1;
            background-size: cover;
            background-position: center;
            opacity: 0.35;
            filter: blur(42px) saturate(160%) hue-rotate(-10deg);
            transform: scale(1.08);
        }

        #skin-root {
            position: absolute;
            inset: 0;
            z-index: 2;
        }

        #splash {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: #f5f7ff;
            z-index: 3;
            font-family: Segoe UI, Roboto, Arial, sans-serif;
            font-size: 72px;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        }

        #debug-overlay {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            line-height: 1.6;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        #debug-overlay div {
            margin: 4px 0;
        }

        .debug-label {
            color: #ffaa00;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <video id="receiverVideoElement"></video>
    <div id="backdrop"></div>
    <div id="skin-root"></div>
    <div id="splash">BeeCaster</div>
    <div id="debug-overlay">
        <div><span class="debug-label">BEECASTER DEBUG</span></div>
        <div>LOAD: <span id="debug-load-count">0</span></div>
        <div>Layout: <span id="debug-layout-count">0</span></div>
        <div>Theme: <span id="debug-theme-count">0</span></div>
        <div>ContentID: <span id="debug-content-id">—</span></div>
        <div>Fields: <span id="debug-fields">—</span></div>
        <div>State: <span id="debug-state">idle</span></div>
    </div>

    <script>
        const CHANNEL = 'urn:x-cast:com.google.cast.media';
        const LOG_TAG = 'BeeCaster';
        
        // Initialize Cast Debug Logger (if device is registered)
        let castDebugLogger = null;
        try {
            castDebugLogger = cast.debug.CastDebugLogger.getInstance();
        } catch (e) {
            console.log('CastDebugLogger not available - device may not be registered in Cast SDK Developer Console');
        }
        
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();
        
        // Enable debug logger on READY event
        if (castDebugLogger) {
            context.addEventListener(cast.framework.system.EventType.READY, () => {
                if (!castDebugLogger.debugOverlayElement_) {
                    castDebugLogger.setEnabled(true);
                    castDebugLogger.showDebugLogs(true);
                    castDebugLogger.info(LOG_TAG, 'Cast Debug Logger enabled');
                }
            });
            
            // Log player events for debugging
            castDebugLogger.loggerLevelByEvents = {
                'cast.framework.events.category.CORE': cast.framework.LoggerLevel.INFO,
                'cast.framework.events.EventType.MEDIA_STATUS': cast.framework.LoggerLevel.DEBUG
            };
        }

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE |
            cast.framework.messages.Command.QUEUE_NEXT |
            cast.framework.messages.Command.QUEUE_PREV
        );

        const state = {
            media: {},
            customData: {},
            currentTimeSec: 0,
            durationSec: 0,
            layoutEndpoint: '/cast/layout',
            themeEndpoint: '/cast/theme'
        };

        const defaultLayout = `
<div class='np-shell'>
  <div class='np-art-wrap'>
    <img class='np-art' data-field='albumArtUrl' alt='Album art' />
  </div>
  <div class='np-main'>
    <div class='np-kicker'>Now Playing</div>
    <div class='np-title' data-field='trackTitle'></div>
    <div class='np-subtitle' data-field='artist'></div>
    <div class='np-meta' data-field='album'></div>
    <div class='np-progress'>
      <span class='np-time' data-field='currentPositionText'>0:00</span>
      <div class='np-progress-track'><div class='np-progress-fill' data-field='progressFill'></div></div>
      <span class='np-time' data-field='durationText'>0:00</span>
    </div>
    <div class='np-detail-grid'>
      <div><span class='np-label'>Codec</span><span data-field='audioCodec'></span></div>
      <div><span class='np-label'>Quality</span><span data-field='qualityLevel'></span></div>
      <div><span class='np-label'>Format</span><span data-field='properties'></span></div>
      <div><span class='np-label'>Queue</span><span data-field='position'></span></div>
      <div><span class='np-label'>Next</span><span data-field='next'></span></div>
      <div><span class='np-label'>Genre</span><span data-field='genre'></span></div>
    </div>
  </div>
</div>`;

        const defaultTheme = `
:root {
  --np-bg: #090a0f;
  --np-surface: rgba(24, 27, 38, 0.82);
  --np-text: #f5f7ff;
  --np-text-muted: #adb3ca;
  --np-accent: #1db954;
}

.np-shell {
  display: grid;
  grid-template-columns: minmax(320px, 36vw) 1fr;
  gap: 4vw;
  height: 100vh;
  padding: 5vh 5vw;
  box-sizing: border-box;
}

.np-art-wrap { display: flex; align-items: center; justify-content: center; }

.np-art {
  width: min(34vw, 520px);
  aspect-ratio: 1 / 1;
  object-fit: cover;
  border-radius: 22px;
  box-shadow: 0 26px 70px rgba(0,0,0,0.5);
}

.np-main { align-self: center; }
.np-kicker { text-transform: uppercase; letter-spacing: .15em; color: var(--np-text-muted); font-size: 1.2vw; }
.np-title { font-size: 4.2vw; font-weight: 800; line-height: 1.05; margin-top: .4rem; }
.np-subtitle { margin-top: .7rem; font-size: 2vw; color: var(--np-text-muted); }
.np-meta { margin-top: .4rem; font-size: 1.45vw; color: var(--np-text-muted); }

.np-progress {
  margin-top: 2.8rem;
  display: grid;
  grid-template-columns: 80px 1fr 80px;
  gap: 1rem;
  align-items: center;
}

.np-progress-track {
  background: rgba(255,255,255,.16);
  height: 8px;
  border-radius: 999px;
  overflow: hidden;
}

.np-progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--np-accent), #63e29f);
}

.np-time { font-variant-numeric: tabular-nums; color: var(--np-text-muted); }

.np-detail-grid {
  margin-top: 2.1rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem 2rem;
}

.np-label {
  display: block;
  font-size: .95vw;
  color: var(--np-text-muted);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.np-detail-grid span[data-field] {
  display: block;
  margin-top: .2rem;
  font-size: 1.2vw;
}
`;

        // Track last art URL to prevent redundant background updates
        let lastBackgroundUrl = null;

        function setBackground(artUrl) {
            if (!artUrl) {
                console.log('No album art URL provided');
                return;
            }

            console.log(`setBackground called with: ${artUrl}`);
            console.log(`Last background URL was: ${lastBackgroundUrl}`);

            // Skip if this is the same URL we already have
            if (lastBackgroundUrl === artUrl) {
                console.log('Background already set to this URL, skipping');
                return;
            }

            console.log('Setting NEW background image:', artUrl);
            const videoElement = document.getElementById('receiverVideoElement');
            const backdropElement = document.getElementById('backdrop');

            // Preload image before setting to prevent flash
            const img = new Image();
            img.onload = () => {
                console.log('Background image loaded successfully');
                videoElement.style.backgroundImage = `linear-gradient(135deg, rgba(61, 38, 69, 0.75) 0%, rgba(74, 48, 82, 0.65) 50%, rgba(90, 74, 110, 0.75) 100%),url("${artUrl}")`;
                backdropElement.style.backgroundImage = `url("${artUrl}")`;
                lastBackgroundUrl = artUrl;
                console.log('Background updated to:', artUrl);
            };
            img.onerror = () => {
                console.error('Failed to load background image:', artUrl);
                lastBackgroundUrl = null;
            };
            img.src = artUrl;
        }

        function formatSeconds(value) {
            if (!value || value < 0) {
                return '0:00';
            }

            const whole = Math.floor(value);
            const h = Math.floor(whole / 3600);
            const m = Math.floor((whole % 3600) / 60);
            const s = whole % 60;

            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function readMediaState(request) {
            state.media = request.media || {};
            state.customData = state.media.customData || {};

            // Construct absolute URLs from MediaBaseUrl if provided
            const baseUrl = state.customData.MediaBaseUrl || '';
            console.log('MediaBaseUrl from customData:', baseUrl);

            state.layoutEndpoint = state.customData.LayoutEndpoint || (baseUrl ? baseUrl + 'cast/layout' : '/cast/layout');
            state.themeEndpoint = state.customData.ThemeEndpoint || (baseUrl ? baseUrl + 'cast/theme' : '/cast/theme');

            console.log('Layout endpoint:', state.layoutEndpoint);
            console.log('Theme endpoint:', state.themeEndpoint);

            state.durationSec = Number(state.media.duration || 0);
            if (!state.durationSec && state.customData.DurationMs) {
                state.durationSec = Number(state.customData.DurationMs) / 1000;
            }

            if (state.customData.CurrentPositionMs) {
                state.currentTimeSec = Number(state.customData.CurrentPositionMs) / 1000;
            }
        }

        function setField(name, value) {
            const nodes = document.querySelectorAll(`[data-field='${name}']`);
            nodes.forEach(node => {
                if (name === 'albumArtUrl' && node.tagName === 'IMG') {
                    // Only update image if URL actually changed to prevent reload flash
                    const newSrc = value || '';
                    if (node.src !== newSrc && node.getAttribute('data-current-src') !== newSrc) {
                        console.log('Updating album art:', newSrc);
                        node.setAttribute('data-current-src', newSrc);
                        node.src = newSrc;
                    }
                } else if (name === 'progressFill') {
                    // Progress bar always updates
                    node.style.width = value || '0%';
                } else {
                    // Only update text if it changed
                    const newText = value || '';
                    if (node.textContent !== newText) {
                        node.textContent = newText;
                    }
                }
            });
        }

        function renderData(fullUpdate = false) {
            const metadata = state.media.metadata || {};
            const custom = state.customData || {};
            const images = metadata.images || [];
            const artUrl = images.length > 0 ? images[0].url : '';

            console.log(`renderData called: fullUpdate=${fullUpdate}, artUrl=${artUrl}`);

            if (fullUpdate) {
                console.log('CustomData contents:', custom);
                console.log('AudioCodec:', custom.AudioCodec);
                console.log('Properties:', custom.Properties);
                console.log('Next:', custom.Next);
            }

            const durationText = custom.DurationText || formatSeconds(state.durationSec);
            const currentText = formatSeconds(state.currentTimeSec);
            const ratio = state.durationSec > 0 ? Math.min(100, Math.max(0, (state.currentTimeSec / state.durationSec) * 100)) : 0;

            // Always update time-sensitive fields
            setField('currentPositionText', currentText);
            setField('progressFill', `${ratio.toFixed(2)}%`);

            // Only update metadata fields on full update (track change)
            if (fullUpdate) {
                console.log('Full metadata update - updating all fields including album art');
                setField('trackTitle', metadata.title || custom.TrackTitle || 'Unknown title');
                setField('artist', metadata.artist || custom.Artist || 'Unknown artist');
                setField('album', metadata.albumName || custom.Album || '');
                setField('albumArtist', metadata.albumArtist || custom.AlbumArtist || '');
                setField('genre', custom.Genre || '');
                setField('year', custom.Year || '');
                setField('trackNumber', custom.TrackNumber || '');
                setField('position', custom.Position || '');
                setField('next', custom.Next || '');
                setField('properties', custom.Properties || '');
                setField('audioCodec', custom.AudioCodec || '');
                setField('qualityLevel', custom.QualityLevel || '');
                setField('durationText', durationText);
                setField('albumArtUrl', artUrl);

                // Update background on track change
                console.log('Calling setBackground from renderData with:', artUrl);
                setBackground(artUrl);
            }
        }

        async function loadTheme() {
            try {
                themeFetchCount++;
                console.log(`[THEME] Fetching theme (attempt #${themeFetchCount})`);
                const resp = await fetch(state.themeEndpoint, { cache: 'no-store' });
                if (!resp.ok) {
                    console.log('Theme endpoint not available, using default theme');
                    applyDefaultTheme();
                    return;
                }

                const css = await resp.text();
                let style = document.getElementById('dynamic-theme');
                if (!style) {
                    style = document.createElement('style');
                    style.id = 'dynamic-theme';
                    document.head.appendChild(style);
                }

                style.textContent = css;
            } catch (err) {
                console.log('Failed to load theme, using default:', err);
                applyDefaultTheme();
            }
        }

        function applyDefaultTheme() {
            let style = document.getElementById('dynamic-theme');
            if (!style) {
                style = document.createElement('style');
                style.id = 'dynamic-theme';
                document.head.appendChild(style);
            }
            style.textContent = defaultTheme;
        }

        let lastLoadedLayout = '';
        let layoutLoadCount = 0;

        async function loadLayout() {
            layoutFetchCount++;
            console.log(`=== loadLayout called (count: ${layoutFetchCount}) ===`);

            let html = defaultLayout;
            try {
                console.log(`[LAYOUT] Fetching layout (attempt #${layoutFetchCount}) from:`, state.layoutEndpoint);
                const resp = await fetch(state.layoutEndpoint, { cache: 'no-store', mode: 'cors' });
                console.log('Layout response status:', resp.status);
                if (resp.ok) {
                    html = await resp.text();
                    console.log('Layout loaded successfully, length:', html.length);
                } else {
                    console.warn('Layout endpoint returned', resp.status, '- using default layout');
                }
            } catch (err) {
                console.error('Failed to load layout, using default:', err);
            }

            const root = document.getElementById('skin-root');
            // Only update if layout actually changed to prevent flashing
            if (lastLoadedLayout !== html) {
                console.log('Layout changed, updating DOM');
                root.innerHTML = html;
                lastLoadedLayout = html;
                console.log('Layout DOM updated');
            } else {
                console.log('Layout unchanged, skipping DOM update');
            }
        }

        let loadCount = 0;
        let layoutFetchCount = 0;
        let themeFetchCount = 0;
        let isLoadInProgress = false;
        let firstLoadComplete = false;
        let lastLoadTimestamp = 0;
        let lastContentId = '';
        const LOAD_DEBOUNCE_MS = 500; // Ignore LOAD events within 500ms of last one

        // Real on-screen debug overlay update
        function updateDebugOverlay() {
            try {
                document.getElementById('debug-load-count').textContent = loadCount;
                document.getElementById('debug-layout-count').textContent = layoutFetchCount;
                document.getElementById('debug-theme-count').textContent = themeFetchCount;
                
                const shortId = lastContentId ? lastContentId.substring(0, 16) : '—';
                document.getElementById('debug-content-id').textContent = shortId;
                
                const metadataFields = Object.keys(state.customData)
                    .filter(k => k.match(/AudioCodec|QualityLevel|Properties|Genre/))
                    .length;
                document.getElementById('debug-fields').textContent = metadataFields > 0 ? `${metadataFields} ✓` : '0';
                
                const stateText = isLoadInProgress ? 'LOADING' : (firstLoadComplete ? 'PLAYING' : 'INIT');
                document.getElementById('debug-state').textContent = stateText;
            } catch (e) {
                console.error('Debug overlay update failed:', e);
            }
        }
        
        // Update overlay periodically
        setInterval(updateDebugOverlay, 500);

        playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, async request => {
            loadCount++;
            const now = Date.now();
            const timeSinceLastLoad = now - lastLoadTimestamp;

            const logMsg = `=== LOAD interceptor #${loadCount} === Time since last: ${timeSinceLastLoad}ms`;
            console.log(logMsg);
            if (castDebugLogger) castDebugLogger.info(LOG_TAG, logMsg);
            console.log('Timestamp:', new Date().toISOString());
            console.log('First load complete:', firstLoadComplete);

            // Debounce rapid LOAD events
            if (timeSinceLastLoad < LOAD_DEBOUNCE_MS && loadCount > 1) {
                const skipMsg = `LOAD event too soon (${timeSinceLastLoad}ms), ignoring as duplicate`;
                console.warn(skipMsg);
                if (castDebugLogger) castDebugLogger.warn(LOG_TAG, skipMsg);
                return request;
            }

            if (isLoadInProgress) {
                const inProgressMsg = 'LOAD already in progress, ignoring duplicate call';
                console.warn(inProgressMsg);
                if (castDebugLogger) castDebugLogger.warn(LOG_TAG, inProgressMsg);
                return request;
            }

            lastLoadTimestamp = now;
            isLoadInProgress = true;

            try {
                lastContentId = request.media?.contentId || '';
                console.log('Media info:', request.media);
                console.log('Content ID:', lastContentId);
                console.log('Content Type:', request.media?.contentType);
                console.log('Stream Type:', request.media?.streamType);
                const customDataKeys = Object.keys(request.media?.customData || {});
                console.log('Custom Data keys:', customDataKeys);
                if (castDebugLogger) {
                    castDebugLogger.debug(LOG_TAG, `Content ID: ${lastContentId.substring(0, 30)}`);
                    castDebugLogger.debug(LOG_TAG, `Custom Data fields: ${customDataKeys.length}`);
                }
                
                if (customDataKeys.length > 0) {
                    customDataKeys.forEach(key => {
                        if (request.media.customData[key]) {
                            const fieldMsg = `${key}: ${String(request.media.customData[key]).substring(0, 40)}`;
                            console.log(`  ${fieldMsg}`);
                            if (castDebugLogger && key.match(/AudioCodec|QualityLevel|Properties|Genre/)) {
                                castDebugLogger.debug(LOG_TAG, fieldMsg);
                            }
                        }
                    });
                }

                document.getElementById('splash').style.visibility = 'hidden';
                readMediaState(request);

                // Extract album art URL for background
                const images = request.media?.metadata?.images || [];
                const artUrl = images.length > 0 ? images[0].url : '';
                console.log('Album art URL from metadata:', artUrl);

                // Only load theme/layout on first load or if endpoints changed
                if (!firstLoadComplete) {
                    console.log('First load - loading theme and layout');
                    await loadTheme();
                    await loadLayout();
                    firstLoadComplete = true;

                    // Wait for DOM to be ready before rendering on first load
                    await new Promise(resolve => setTimeout(resolve, 100));
                } else {
                    console.log('Subsequent load - skipping theme/layout reload');
                }

                // renderData will handle setting the background
                renderData(true); // Full update on track load

                console.log('=== LOAD interceptor complete ===');
                if (castDebugLogger) castDebugLogger.info(LOG_TAG, `LOAD complete. Fields populated: ${Object.keys(state.customData).length}`);
                updateDebugOverlay();
                updateDebugOverlay();
            } catch (error) {
                console.error('Error in LOAD interceptor:', error);
            } finally {
                isLoadInProgress = false;
            }

            // Return the original request to allow default processing
            return request;
        });

        const playerData = {};
        const playerDataBinder = new cast.framework.ui.PlayerDataBinder(playerData);
        playerDataBinder.addEventListener(cast.framework.ui.PlayerDataEventType.CURRENT_TIME_CHANGED, e => {
            state.currentTimeSec = Number(e.value || 0);
            renderData(false); // Time-only update, no metadata refresh
        });

        // Listen for player state changes
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            console.log('Player load complete');
        });

        playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
            console.error('Player error:', event.detailedErrorCode, event.error);
        });

        // Log when media actually starts playing
        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, () => {
            console.log('Media is now PLAYING');
        });

        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, () => {
            console.log('Media PAUSED');
        });

        playerManager.addEventListener(cast.framework.events.EventType.REQUEST_QUEUE_UPDATE, event => {
            const next = event.requestData && event.requestData.jump == 1;
            const objToSender = {
                type: next ? 'NEXT' : 'PREVIOUS',
                message: next ? 'NEXT' : 'PREVIOUS'
            };
            context.sendCustomMessage(CHANNEL, undefined, objToSender);
        });

        context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
            context.stop();
        });

        const options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = Object.assign({});
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;

        // Configure media element for audio playback
        options.mediaElement = document.getElementById('receiverVideoElement');

        // Enable detailed logs for debugging
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600; // 1 hour
        options.debug = true; // Enable Cast SDK debugging

        console.log('Starting Cast receiver context with options:', options);
        context.start(options);

        // Set detailed logger level after context starts
        try {
            cast.framework.CastReceiverContext.getInstance().setLoggerLevel(cast.framework.LoggerLevel.DEBUG);
            console.log('[DEBUG] Cast SDK logger level set to DEBUG');
        } catch (e) {
            console.log('[DEBUG] Could not set logger level:', e);
        }

        // Enable Cast Debug Logger overlay if available
        if (cast.framework.CastDebugLogger) {
            try {
                cast.framework.CastDebugLogger.getInstance().setEnabled(true);
                console.log('[DEBUG] Cast Debug Logger overlay enabled on receiver');
            } catch (e) {
                console.log('[DEBUG] Cast Debug Logger not available:', e);
            }
        }
    </script>
</body>
</html>
