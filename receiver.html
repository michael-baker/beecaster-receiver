<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { overflow: hidden; margin: 0; padding: 0; background: #000; }
        #overlay {
            position: absolute; inset: 0;
            background: #000; opacity: 1;
            transition: opacity 0.4s ease;
            pointer-events: none; z-index: 10;
        }
        #caf-el {
            position: absolute; width: 1px; height: 1px;
            opacity: 0; pointer-events: none;
        }
        #player {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        #syncErr {
            position: absolute; left: 0; right: 0; top: 0;
            background: rgba(176,0,0,0.94); color: #fff;
            font: 600 30px/1.4 system-ui, "Segoe UI", sans-serif;
            padding: 28px 40px; text-align: center;
            z-index: 20; display: none;
        }
        #prepCalib {
            position: absolute; inset: 0;
            background: #07021a; color: #ffcf4d;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            font: 800 34px/1.4 system-ui, "Segoe UI", sans-serif; text-align: center;
            z-index: 15;
        }
        #prepCalib .s { margin-top: 14px; font: 400 18px/1.4 system-ui, sans-serif; color: rgba(221,214,240,.6); }
    </style>
</head>
<body>
<video id="caf-el" class="castMediaElement"></video>
<video id="player" playsinline muted></video>
<div id="overlay"></div>
<div id="syncErr"></div>
<div id="prepCalib">Preparing calibration&hellip;<div class="s">Waiting for the cast to stabilise.</div></div>

<script>
    (function () {
        'use strict';

        var RECEIVER_VERSION = '2026-06-10-r36-calib-closed-loop';

        var _logRing = [];
        var _LOG_RING_MAX = 60;
        var _evt = { rescue: 0, stall: 0, anchor: 0, reanchor: 0, hardSeek: 0, snap: 0, mseReinit: 0, hold: 0 };
        var _tEpoch = 0, _tPlayStart = 0, _tConverged = 0;
        var _convergeReported = false, _initialErrMs = null;
        var _lastRcvLogMs = 0;
        (function () {
            var ol = console.log, ow = console.warn, oe = console.error;
            function cap(lvl, args) {
                try {
                    var s = Array.prototype.map.call(args, function (a) {
                        return (typeof a === 'object' && a) ? (a.message || JSON.stringify(a)) : String(a);
                    }).join(' ');
                    _logRing.push(((Date.now() % 100000) / 1000).toFixed(3) + ' ' + lvl + ' ' + s);
                    if (_logRing.length > _LOG_RING_MAX) _logRing.shift();
                } catch (e) {}
            }
            console.log = function () { cap('I', arguments); ol.apply(console, arguments); };
            console.warn = function () { cap('W', arguments); ow.apply(console, arguments); };
            console.error = function () { cap('E', arguments); oe.apply(console, arguments); };
        })();
        function _postReceiverLog(reason, force) {
            if (!_baseUrl) return;
            var now = Date.now();
            if (!force && (now - _lastRcvLogMs) < 3000) return;
            _lastRcvLogMs = now;
            try {
                var b64 = btoa(unescape(encodeURIComponent(_logRing.join('\n'))));
                fetch(_baseUrl + 'cast/receiver-log', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason: reason, version: RECEIVER_VERSION, log: b64 })
                }).catch(function () {});
            } catch (e) {}
        }

        var CHANNEL       = 'urn:x-cast:com.google.cast.media';
        var context       = cast.framework.CastReceiverContext.getInstance();
        var playerManager = context.getPlayerManager();

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE           |
            cast.framework.messages.Command.QUEUE_NEXT      |
            cast.framework.messages.Command.QUEUE_PREV
        );

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.PRELOAD,
            function (req) { return req; }
        );

        var _baseUrl     = '';
        var _mode        = '';
        var _syncTimer   = null;
        var _pollTimer   = null;
        var _ms          = null;
        var _sb          = null;
        var _mseGen      = 0;
        var _mseRetryTimer = null;
        var _appendQueue = [];
        var _appending   = false;
        var _trimming    = false;
        var _quotaRetries = 0;        // consecutive appendBuffer quota failures on the head item
        var _drainRetryTimer = null;  // deferred re-drain (NEVER recurse synchronously on quota)
        var MAX_QUOTA_RETRIES = 50;   // ~4 s of trimming/retrying, then drop the stuck segment
        var _loadedSegs  = {};
        var _initLoaded  = false;
        var _segsBuffered = 0;
        var _epochMs     = -1;
        var _epochWallMs = -1;
        var _videoEpochMs = -1;
        var _videoEpochSet = false;
        var _cdispMs     = 0;
        var _cdispBaked  = 0;
        var _lastReanchorSeq = -1;
        var _reanchorPending = false;
        var _lastEpochJumpSeq = -1;  // last epochJumpSeq seen; a change = server ring-skip → hard recover
        var _lastCalibActive = false;
        var _calibActive = false;     // read by the drift loop to suppress auto clamp/nudge during a calibration session
        var _calibStopBlanked = false;
        var _calibStopRevealTimer = null;
        var _serverRtt   = 0;
        var _cafPlaying  = false;
        var _everPlayed  = false;
        var _videoReady  = false;
        var _maxBufferedWindowSec = 24;
        var _backBufferKeepSec = 10;
        var _lastManifestInfo = null;
        var _lastClockInfo = null;
        var _debugWatchTimer = null;
        var _epochPollTimer = null;
        var _reportTimer = null;
        var _lastSeekMs  = 0;

        var _audioLastMs   = -1;
        var _audioLastWall = 0;
        var _audioHeld     = false;
        var _playerLastT   = -1;
        var _playerStallWall = 0;
        var _startWaitCount = 0;

        var SEEK_GUARD_SEC      = 0.5;
        var HEAL_LEAD_SEC       = 4.0;
        var HARD_SEEK_MS        = 1000;
        var REANCHOR_OUTSIDE_SEC = 1.5;
        var AUDIO_STALL_MS      = 700;
        var AUDIO_JUMP_MS       = 4000;  // audio clock leaping forward > this in one tick ⇒ ring skip ⇒ hard recover

        // Consecutive prep-timeout ticks before the on-screen failure banner is shown.
        var CALIB_ERR_TICKS     = 3;
        var _calibErrTicks      = 0;

        // Calibration readiness gate. The real sync loop converges the picture (closed loop); "ready" fires
        // only once the MEAN error over the window is genuinely centred on zero (not merely stable) and the
        // loop is quiet (no recent seek). Spread is allowed to absorb the pipeline's residual jitter.
        var CALIB_READY_BAND_MS    = 80;
        var CALIB_READY_SPREAD_MS  = 400;
        var CALIB_SETTLE_QUIET_MS  = 3000;
        var CALIB_SETTLE_SAMPLES   = 8;
        var CALIB_PREP_TIMEOUT_MS  = 20000;
        var CALIB_UNSETTLE_HOLD_MS = 4000;
        var _calibSettled  = false;
        var _calibErrWin   = [];
        var _lastDisruptMs = 0;
        var _lastEvtSum    = 0;
        var _calibActiveSinceMs = 0;
        var _unsettledSinceMs = 0;

        function _getBufferedRanges(mediaEl) {
            if (!mediaEl || !mediaEl.buffered) return [];
            var ranges = [];
            for (var i = 0; i < mediaEl.buffered.length; i++) {
                var start = mediaEl.buffered.start(i);
                var end = mediaEl.buffered.end(i);
                ranges.push({ start: start, end: end, duration: end - start });
            }
            return ranges;
        }

        function _snapshotSyncState() {
            var player = document.getElementById('player');
            var cafEl = document.getElementById('caf-el');
            var audioClockMs = null;
            var videoClockMs = null;
            var errorMs = null;
            var targetSec = null;
            var bufferAheadSec = null;

            if (cafEl && _epochMs >= 0) audioClockMs = _getAudioClockMs(cafEl);
            if (player && _videoEpochSet) videoClockMs = _getVideoClockMs(player);
            if (audioClockMs != null && videoClockMs != null) {
                errorMs = videoClockMs - audioClockMs - _cdispBaked;
                targetSec = _getVideoTimeSecForAudioMs(audioClockMs);
            }
            if (player && player.buffered && player.buffered.length > 0) {
                bufferAheadSec = player.buffered.end(player.buffered.length - 1) - player.currentTime;
            }

            var rVFCActive = _rVFCMediaTimeSec >= 0;
            return {
                mode: _mode,
                epochs: {
                    epochMs: _epochMs,
                    epochWallMs: _epochWallMs,
                    videoEpochMs: _videoEpochMs,
                    serverRttMs: _serverRtt
                },
                latestClockPoll: _lastClockInfo,
                latestManifest: _lastManifestInfo,
                queue: {
                    pendingAppends: _appendQueue.length,
                    appending: _appending,
                    trimming: _trimming,
                    loadedSegCount: Object.keys(_loadedSegs).length,
                    segsBuffered: _segsBuffered,
                    videoReady: _videoReady,
                    cafPlaying: _cafPlaying
                },
                audio: cafEl ? {
                    currentTime: cafEl.currentTime,
                    paused: cafEl.paused,
                    readyState: cafEl.readyState,
                    computedClockMs: audioClockMs
                } : null,
                video: player ? {
                    currentTime: player.currentTime,
                    paused: player.paused,
                    readyState: player.readyState,
                    playbackRate: player.playbackRate,
                    computedClockMs: videoClockMs,
                    rVFCActive: rVFCActive,
                    rVFCMediaTimeSec: _rVFCMediaTimeSec,
                    rVFCDeltaMs: rVFCActive ? (player.currentTime - _rVFCMediaTimeSec) * 1000 : null,
                    rVFCRenderedCount: _rVFCRenderedCount,
                    targetTimeSecForAudio: targetSec,
                    bufferAheadSec: bufferAheadSec,
                    buffered: _getBufferedRanges(player)
                } : null,
                drift: { errorMs: errorMs },
                nowMs: Date.now()
            };
        }

        window.__cws = {
            state: function () { return _snapshotSyncState(); },
            log: function () {
                var s = _snapshotSyncState();
                console.log('[cws][debug]', s);
                if (console.table && s.video && s.video.buffered) console.table(s.video.buffered);
                return s;
            },
            watch: function (intervalMs) {
                var ms = Math.max(250, intervalMs || 1000);
                if (_debugWatchTimer) clearInterval(_debugWatchTimer);
                _debugWatchTimer = setInterval(function () {
                    var s = _snapshotSyncState();
                    console.log('[cws][watch] err=' + (s.drift.errorMs != null ? s.drift.errorMs.toFixed(0) : 'n/a') +
                                'ms audio=' + (s.audio && s.audio.computedClockMs != null ? (s.audio.computedClockMs / 1000).toFixed(3) : 'n/a') +
                                's video=' + (s.video && s.video.computedClockMs != null ? (s.video.computedClockMs / 1000).toFixed(3) : 'n/a') +
                                's playerT=' + (s.video ? s.video.currentTime.toFixed(3) : 'n/a') +
                                's rate=' + (s.video ? s.video.playbackRate.toFixed(4) : 'n/a') +
                                ' bufAhead=' + (s.video && s.video.bufferAheadSec != null ? s.video.bufferAheadSec.toFixed(3) : 'n/a') + 's');
                }, ms);
                return ms;
            },
            stopWatch: function () {
                if (_debugWatchTimer) clearInterval(_debugWatchTimer);
                _debugWatchTimer = null;
            },
            player: function () { return document.getElementById('player'); },
            caf: function () { return document.getElementById('caf-el'); }
        };

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            function (request) {
                var custom = request.media && request.media.customData;
                _baseUrl = (custom && custom.MediaBaseUrl) || '';
                _mode = (custom && custom.HlsStreamingMode) || '';

                _reset();
                _reportCapabilities(_baseUrl);

                if (_mode === 'caf_wav_sync') {
                    _startCafWavSync(_baseUrl);
                } else if (_mode === 'fmp4_muxed') {
                    _silenceCaf();
                    _startMuxed(_baseUrl);
                } else {
                    console.error('[receiver] Unsupported mode: ' + _mode);
                    _showOverlay(1);
                }

                return request;
            }
        );

        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, function () {
            _showOverlay(1);
            var p = document.getElementById('player');
            if (p && !p.paused) p.pause();
            _cafPlaying = false;
            setTimeout(function () { _showOverlay(0); }, 1500);
        });

        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, function () {
            _cafPlaying = true;
            _everPlayed = true;
            if (_mode === 'caf_wav_sync') {
                var p = document.getElementById('player');
                if (p && p.paused) p.play().catch(function () {});
            } else {
                _silenceCaf();
                var p2 = document.getElementById('player');
                if (p2 && p2.paused) p2.play().catch(function () {});
            }
        });

        playerManager.addEventListener(
            cast.framework.events.EventType.REQUEST_QUEUE_UPDATE,
            function (event) {
                var next = event.requestData && event.requestData.jump === 1;
                context.sendCustomMessage(CHANNEL, undefined, {
                    type:    next ? 'NEXT' : 'PREVIOUS',
                    message: next ? 'NEXT' : 'PREVIOUS',
                });
            }
        );

        context.addEventListener(
            cast.framework.system.EventType.SENDER_DISCONNECTED,
            function () { context.stop(); }
        );

        var options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = {};
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600;
        options.mediaElement = document.getElementById('caf-el');
        context.start(options);

        // Persistent calibration-overlay poll, independent of the media pipeline (NOT cleared by _reset),
        // so the device-side "Preparing" overlay appears within ~1 s of calibration starting and stays up
        // through the pipeline restart + warmup, then hides the moment the server reports the picture ready.
        setInterval(function () {
            if (!_baseUrl) return;
            fetch(_baseUrl + 'cast/audio-clock').then(function (r) { return r.json(); }).then(function (d) {
                if (d.calibActive === true && d.calibReady !== true) _showPrepCalib();
                else _hidePrepCalib();
            }).catch(function () {});
        }, 1000);


        function _startCafWavSync(baseUrl) {
            var player = document.getElementById('player');
            if (!player) { console.error('[cws] #player missing'); return; }
            player.muted = true;

            _showOverlay(1);
            console.log('[cws] Starting caf_wav_sync pipeline');

            _waitForEpoch(baseUrl, function () {
                console.log('[cws] Epoch acquired: epochMs=' + _epochMs + ' epochWallMs=' + _epochWallMs + ' videoEpochMs=' + _videoEpochMs);
                _initVideoMSE(player, baseUrl);
            });
        }

        var _rVFCMediaTimeSec = -1;
        var _rVFCRenderedCount = 0;

        function _waitForEpoch(baseUrl, cb) {
            var attempt = 0;
            (function poll() {
                var t0 = Date.now();
                fetch(baseUrl + 'cast/audio-clock')
                    .then(function (r) { return r.json(); })
                    .then(function (d) {
                        _serverRtt = Date.now() - t0;
                        _lastClockInfo = {
                            audioMs: d.audioMs,
                            epochMs: d.epochMs,
                            epochWallMs: d.epochWallMs,
                            videoEpochMs: d.videoEpochMs,
                            serverNowMs: d.serverNowMs,
                            receiverNowMs: Date.now(),
                            receiverRttMs: _serverRtt
                        };
                        if (d.epochMs >= 0 && typeof d.videoEpochMs === 'number') {
                            _epochMs      = d.epochMs;
                            _epochWallMs  = d.epochWallMs;
                            _videoEpochMs = d.videoEpochMs;
                            _videoEpochSet = true;
                            _cdispMs      = (typeof d.cdispMs === 'number') ? d.cdispMs : 0;
                            _cdispBaked      = _cdispMs;
                            _lastReanchorSeq = (typeof d.reanchorSeq === 'number') ? d.reanchorSeq : 0;
                            if (!_tEpoch) _tEpoch = Date.now();
                            cb();
                        } else {
                            attempt++;
                            if (attempt % 10 === 0)
                                console.log('[cws] Waiting for epochs (attempt ' + attempt + ')...');
                            setTimeout(poll, 500);
                        }
                    })
                    .catch(function () {
                        attempt++;
                        setTimeout(poll, 1000);
                    });
            })();
        }

        function _codecFromInit(u8) {
            for (var i = 0; i + 8 < u8.length; i++) {
                if (u8[i] === 0x61 && u8[i + 1] === 0x76 && u8[i + 2] === 0x63 && u8[i + 3] === 0x43) {
                    var hx = function (b) { return ('0' + b.toString(16)).slice(-2); };
                    return 'video/mp4; codecs="avc1.' + hx(u8[i + 5]) + hx(u8[i + 6]) + hx(u8[i + 7]) + '"';
                }
            }
            return null;
        }

        function _logSbError(tag) {
            try {
                var p = document.getElementById('player');
                var me = p && p.error ? { code: p.error.code, message: p.error.message } : null;
                var upd = 'n/a', buf = 'n/a';
                try { upd = String(_sb && _sb.updating); } catch (e1) { upd = 'detached'; }
                try {
                    buf = (_sb && _sb.buffered && _sb.buffered.length)
                        ? (_sb.buffered.start(0).toFixed(2) + '-' + _sb.buffered.end(_sb.buffered.length - 1).toFixed(2))
                        : 'empty';
                } catch (e2) { buf = 'detached'; }
                console.error('[cws] ' + tag + ' player.error=' + JSON.stringify(me) +
                    ' msState=' + (_ms && _ms.readyState) + ' sbUpdating=' + upd + ' buffered=' + buf);
            } catch (e) {  }
        }

        function _initVideoMSE(player, baseUrl) {
            var gen = ++_mseGen;
            var ms = new MediaSource();
            _ms = ms; _sb = null;
            player.src = URL.createObjectURL(ms);
            player.onerror = function () {
                if (gen !== _mseGen) return;
                _logSbError('video element error.');
                _scheduleMseReinit(player, baseUrl, gen);
            };

            ms.addEventListener('sourceopen', function () {
                if (gen !== _mseGen || _ms !== ms) return;
                console.log('[cws] MediaSource opened');
                fetch(baseUrl + 'cast/split_video/init.mp4')
                    .then(function (r) { if (!r.ok) throw new Error('init.mp4 HTTP ' + r.status); return r.arrayBuffer(); })
                    .then(function (buf) {
                        if (gen !== _mseGen || _ms !== ms || ms.readyState !== 'open') return;
                        var u8 = new Uint8Array(buf);
                        var codec = _codecFromInit(u8);
                        var fallbacks = ['video/mp4; codecs="avc1.640029"', 'video/mp4; codecs="avc1.4d401f"', 'video/mp4; codecs="avc1.42E01E"'];
                        if (!codec || !MediaSource.isTypeSupported(codec)) {
                            console.warn('[cws] codec from init (' + codec + ') unsupported; trying fallbacks');
                            for (var k = 0; k < fallbacks.length; k++) { if (MediaSource.isTypeSupported(fallbacks[k])) { codec = fallbacks[k]; break; } }
                        }
                        console.log('[cws] MSE codec (from init): ' + codec);
                        var sb;
                        try {
                            sb = ms.addSourceBuffer(codec);
                        } catch (e) {
                            console.error('[cws] addSourceBuffer failed:', e, 'codec=' + codec);
                            _scheduleMseReinit(player, baseUrl, gen);
                            return;
                        }
                        _sb = sb;
                        sb.mode = 'segments';
                        sb.addEventListener('updateend', _drainAppendQueue);
                        sb.addEventListener('error', function () {
                            if (gen !== _mseGen) return;
                            _logSbError('SourceBuffer error.');
                            _scheduleMseReinit(player, baseUrl, gen);
                        });

                        _queueAppend(u8, function () {
                            _initLoaded = true;
                            console.log('[cws] init.mp4 appended (' + u8.length + ' bytes)');
                            _pollManifest(baseUrl);
                        });
                    })
                    .catch(function (e) {
                        if (gen !== _mseGen) return;
                        console.error('[cws] init.mp4 fetch failed:', e, '— retrying');
                        _scheduleMseReinit(player, baseUrl, gen);
                    });
            });
        }

        function _scheduleMseReinit(player, baseUrl, gen) {
            if (gen !== _mseGen || _mseRetryTimer) return;
            _evt.mseReinit++;
            console.warn('[cws] video pipeline error — rebuilding MSE in 1s');
            _postReceiverLog('mse-reinit');
            _mseRetryTimer = setTimeout(function () {
                _mseRetryTimer = null;
                if (gen !== _mseGen) return;
                try { if (_ms && _ms.readyState === 'open') _ms.endOfStream(); } catch (e) {}
                _ms = null; _sb = null;
                if (_drainRetryTimer) { clearTimeout(_drainRetryTimer); _drainRetryTimer = null; }
                _appendQueue = []; _appending = false; _trimming = false; _quotaRetries = 0;
                _loadedSegs = {}; _initLoaded = false; _segsBuffered = 0; _videoReady = false;
                try { player.removeAttribute('src'); player.load(); } catch (e) {}
                _initVideoMSE(player, baseUrl);
            }, 1000);
        }

        // Hard video recovery after the audio timeline leapt forward (server CAF ring skipped to the
        // live edge). The buffered video can never cover the skipped gap, so chasing it with seeks
        // thrashes forever and wedges the SourceBuffer. Tear down and rebuild MSE from the new live
        // edge instead — the rebuilt pipeline re-anchors video to the post-skip audio clock.
        function _hardRecoverVideo(reason) {
            var player = document.getElementById('player');
            if (!player || !_baseUrl) return;
            console.warn('[cws] hard video recover (' + reason + ') — rebuilding MSE from live edge');
            _scheduleMseReinit(player, _baseUrl, _mseGen);
        }

        function _pollManifest(baseUrl) {
            if (_everPlayed && !_cafPlaying) {
                _pollTimer = setTimeout(function () { _pollManifest(baseUrl); }, 1000);
                return;
            }
            var manifestUrl = baseUrl + 'cast/split_video/stream.m3u8';
            fetch(manifestUrl)
                .then(function (r) {
                    if (!r.ok) throw new Error('m3u8 HTTP ' + r.status);
                    return r.text();
                })
                .then(function (text) {
                    var parsed = _parseM3u8(text);
                    _lastManifestInfo = {
                        fetchedAtMs: Date.now(),
                        mediaSeq: parsed.mediaSeq,
                        targetDuration: parsed.targetDuration,
                        segmentCount: parsed.segments.length,
                        firstSegment: parsed.segments.length > 0 ? parsed.segments[0] : null,
                        lastSegment: parsed.segments.length > 0 ? parsed.segments[parsed.segments.length - 1] : null
                    };
                    var newFrags = [];
                    for (var i = 0; i < parsed.segments.length; i++) {
                        var seg = parsed.segments[i];
                        if (!_loadedSegs[seg.sn]) {
                            newFrags.push(seg);
                            _loadedSegs[seg.sn] = true;
                        }
                    }
                    var newestSn = parsed.segments.length ? parsed.segments[parsed.segments.length - 1].sn : 0;
                    var pruneBelow = newestSn - 64;
                    if (pruneBelow > 0) {
                        for (var s in _loadedSegs) { if (+s < pruneBelow) delete _loadedSegs[s]; }
                    }
                    if (newFrags.length > 0) {
                        _fetchSegments(baseUrl, newFrags, 0);
                    }
                    var pollMs = Math.max(1000, (parsed.targetDuration || 1) * 1000);
                    _pollTimer = setTimeout(function () { _pollManifest(baseUrl); }, pollMs);
                })
                .catch(function (e) {
                    console.warn('[cws] m3u8 fetch failed:', e);
                    _pollTimer = setTimeout(function () { _pollManifest(baseUrl); }, 2000);
                });
        }

        function _fetchSegments(baseUrl, segs, idx) {
            if (idx >= segs.length) return;
            var seg = segs[idx];
            fetch(baseUrl + 'cast/split_video/' + seg.uri)
                .then(function (r) {
                    if (!r.ok) throw new Error(seg.uri + ' HTTP ' + r.status);
                    return r.arrayBuffer();
                })
                .then(function (buf) {
                    _queueAppend(new Uint8Array(buf), function (appendErr) {
                        if (appendErr) {
                            console.warn('[cws] Segment ' + seg.sn + ' append failed:', appendErr);
                            _fetchSegments(baseUrl, segs, idx + 1);
                            return;
                        }

                        videoEpochMs: Math.round(_videoEpochMs),
                        epochMs: _epochMs,
                        paused: player.paused,
                        readyState: player.readyState,
                        appendQueueLen: _appendQueue.length,
                        videoEpochSet: _videoEpochSet,
                        calibSettled: _calibSettled,
                        evt: _evt
                    })
                }).catch(function () {});
            } catch(_) {}
        }

        function _parseM3u8(text) {
            var lines = text.split('\n');
            var segments = [];
            var mediaSeq = 0;
            var targetDuration = 4;
            var sn = 0;
            var pendingProgramDateTime = null;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line.indexOf('#EXT-X-MEDIA-SEQUENCE:') === 0) {
                    mediaSeq = parseInt(line.split(':')[1], 10) || 0;
                    sn = mediaSeq;
                } else if (line.indexOf('#EXT-X-TARGETDURATION:') === 0) {
                    targetDuration = parseInt(line.split(':')[1], 10) || 4;
                } else if (line.indexOf('#EXT-X-PROGRAM-DATE-TIME:') === 0) {
                    pendingProgramDateTime = Date.parse(line.substring('#EXT-X-PROGRAM-DATE-TIME:'.length));
                } else if (line.indexOf('#EXTINF:') === 0) {
                    for (var j = i + 1; j < lines.length; j++) {
                        var nextLine = lines[j].trim();
                        if (nextLine && nextLine.charAt(0) !== '#') {
                            segments.push({ sn: sn, uri: nextLine, programDateTimeMs: pendingProgramDateTime });
                            pendingProgramDateTime = null;
                            sn++;
                            i = j;
                            break;
                        }
                    }
                }
            }
            return { segments: segments, mediaSeq: mediaSeq, targetDuration: targetDuration };
        }

        function _silenceCaf() {
            var cafEl = document.getElementById('caf-el');
            if (!cafEl || cafEl._silenced) return;
            cafEl._silenced = true;
            try {
                var silenceCtx = new (window.AudioContext || window.webkitAudioContext)();
                silenceCtx.createMediaElementSource(cafEl);
            } catch (e) {
                cafEl.addEventListener('volumechange', function () {
                    if (cafEl.volume !== 0) cafEl.volume = 0;
                });
                cafEl.volume = 0;
            }
        }

        var _hls = null;
        window.__hls = function () { return _hls; };

        function _startMuxed(baseUrl) {
            var player = document.getElementById('player');
            if (!player) { console.error('[muxed] #player missing'); return; }
            if (!window.Hls || !Hls.isSupported()) {
                console.error('[muxed] hls.js / MSE not available');
                return;
            }

            player.muted = false;
            _showOverlay(1);

            fetch(baseUrl + 'api/settings')
                .then(function (r) { return r.ok ? r.json() : null; })
                .catch(function () { return null; })
                .then(function (cfg) {
                    var liveSyncCount = (cfg && cfg.hlsLiveSyncSegments  > 0) ? cfg.hlsLiveSyncSegments  : 3;
                    var liveMaxCount  = (cfg && cfg.hlsMaxLatencySegments > 0) ? cfg.hlsMaxLatencySegments : 6;

                    _hls = new Hls({
                        lowLatencyMode:              false,
                        liveSyncDurationCount:       liveSyncCount,
                        liveMaxLatencyDurationCount: liveMaxCount,
                        maxBufferLength:             30,
                        maxMaxBufferLength:          60,
                        maxBufferSize:               60 * 1024 * 1024,
                        backBufferLength:            Infinity,
                        enableWorker:                false,
                        abrEnabled:                  false,
                        startLevel:                  0,
                        debug:                       false,
                        progressive:                 false,
                        manifestLoadingMaxRetry:     12,
                        manifestLoadingRetryDelay:   1000,
                        manifestLoadingMaxRetryTimeout: 12000,
                    });

                    var _playStarted = false;
                    var _fragsBuffered = 0;
                    function _tryStartPlayback() {
                        if (_playStarted) return;
                        _playStarted = true;
                        var pos = _hls.liveSyncPosition;
                        if (pos != null) player.currentTime = pos;
                        player.play().catch(function () {});
                        player.addEventListener('playing', function onP() {
                            player.removeEventListener('playing', onP);
                            setTimeout(function () { _showOverlay(0); }, 500);
                        });
                        setTimeout(function () { _showOverlay(0); }, 6000);
                    }

                    _hls.on(Hls.Events.LEVEL_LOADED, function (e, d) {
                        if (!_playStarted && d.details.fragments.length >= 3) _tryStartPlayback();
                    });
                    _hls.on(Hls.Events.FRAG_BUFFERED, function () {
                        _fragsBuffered++;
                        if (!_playStarted && _fragsBuffered >= 3) _tryStartPlayback();
                    });
                    _hls.on(Hls.Events.ERROR, function (e, d) {
                        if (!d.fatal) return;
                        if (_hls) { try { _hls.destroy(); } catch (err) {} _hls = null; }
                        setTimeout(function () { if (_baseUrl) _startMuxed(_baseUrl); }, 3000);
                    });

                    _hls.loadSource(baseUrl + 'cast/muxed/stream.m3u8');
                    _hls.attachMedia(player);
                });
        }


        function _reset() {
            if (_syncTimer)  { clearInterval(_syncTimer); _syncTimer = null; }
            if (_pollTimer)  { clearTimeout(_pollTimer); _pollTimer = null; }
            if (_epochPollTimer) { clearInterval(_epochPollTimer); _epochPollTimer = null; }
            if (_reportTimer)    { clearInterval(_reportTimer); _reportTimer = null; }
            if (_calibStopRevealTimer) { clearTimeout(_calibStopRevealTimer); _calibStopRevealTimer = null; }
            _lastCalibActive = false; _calibActive = false; _calibStopBlanked = false;
            _calibSettled = false; _calibErrWin = [];
            _lastEvtSum = 0; _calibActiveSinceMs = 0; _unsettledSinceMs = 0;
            _hideSyncError();
            var _cafReset = document.getElementById('caf-el');
            if (_cafReset) { try { _cafReset.muted = false; } catch (e) {} }
            _lastSeekMs = 0;
            _audioLastMs = -1; _audioLastWall = 0; _audioHeld = false;
            _playerLastT = -1; _playerStallWall = 0; _startWaitCount = 0;
            _mseGen++;
            if (_mseRetryTimer) { clearTimeout(_mseRetryTimer); _mseRetryTimer = null; }
            if (_hls)        { try { _hls.destroy(); } catch (e) {} _hls = null; }
            if (_ms)         { try { _ms.endOfStream(); } catch (e) {} }
            _ms = null; _sb = null;
            if (_drainRetryTimer) { clearTimeout(_drainRetryTimer); _drainRetryTimer = null; }
            _appendQueue = []; _appending = false; _trimming = false; _quotaRetries = 0;
            _loadedSegs = {}; _initLoaded = false; _segsBuffered = 0;
            _epochMs = -1; _epochWallMs = -1; _videoEpochMs = -1; _videoEpochSet = false; _cdispMs = 0;
            _cdispBaked = 0; _lastReanchorSeq = -1; _reanchorPending = false; _lastEpochJumpSeq = -1;
            _videoReady = false; _cafPlaying = false; _everPlayed = false;
            _lastManifestInfo = null; _lastClockInfo = null;
            if (_debugWatchTimer) clearInterval(_debugWatchTimer);
            _debugWatchTimer = null;
            var p = document.getElementById('player');
            if (p) {
                try { p.pause(); } catch (e) {}
                p.removeAttribute('src');
                try { p.load(); } catch (e) {}
                p.playbackRate = 1.0;
            }
            _showOverlay(1);
        }

        function _showOverlay(opacity) {
            var el = document.getElementById('overlay');
            if (el) el.style.opacity = String(opacity);
        }

        function _showSyncError(errMs) {
            var el = document.getElementById('syncErr');
            if (!el) return;
            el.textContent = 'A/V sync lost (' + (errMs / 1000).toFixed(1) + 's). Your PC may be too slow '
                + 'to render the cast, or the local pipeline stalled. Stop calibration and retry.';
            el.style.display = 'block';
        }

        function _hideSyncError() {
            _calibErrTicks = 0;
            var el = document.getElementById('syncErr');
            if (el) el.style.display = 'none';
        }

        // Instant device-side "Preparing" overlay over #player — appears the moment calibration goes active,
        // long before the calibration video frame arrives, and hides on the first settle.
        function _showPrepCalib() { var el = document.getElementById('prepCalib'); if (el) el.style.display = 'flex'; }
        function _hidePrepCalib() { var el = document.getElementById('prepCalib'); if (el) el.style.display = 'none'; }

        function _calibStopBlank(player, cafEl) {
            _calibStopBlanked = true;
            _hideSyncError();
            var bufAheadMs = 0;
            try {
                if (player && player.buffered && player.buffered.length > 0)
                    bufAheadMs = Math.max(0, (player.buffered.end(player.buffered.length - 1) - player.currentTime) * 1000);
            } catch (e) {}
            var revealMs = Math.min(20000, Math.max(1500, bufAheadMs + 1000));
            console.log('[cws] calibration stopped — overlay + CAF mute now; reveal theme in ~' +
                        Math.round(revealMs) + 'ms (buffer drain)');
            _showOverlay(1);
            if (cafEl) { try { cafEl.muted = true; } catch (e) {} }
            if (_calibStopRevealTimer) clearTimeout(_calibStopRevealTimer);
            _calibStopRevealTimer = setTimeout(function () {
                _calibStopRevealTimer = null;
                _calibStopReveal(document.getElementById('caf-el'));
            }, revealMs);
        }

        function _calibStopReveal(cafEl) {
            if (_calibStopRevealTimer) { clearTimeout(_calibStopRevealTimer); _calibStopRevealTimer = null; }
            _calibStopBlanked = false;
            if (cafEl) { try { cafEl.muted = false; } catch (e) {} }
            _showOverlay(0);
        }

        function _reportCapabilities(baseUrl) {
            if (!baseUrl) return;
            function ms(t) { try { return !!(window.MediaSource && MediaSource.isTypeSupported(t)); } catch (e) { return false; } }
            var caps = {
                receiverVersion: RECEIVER_VERSION,
                screen: { w: (window.screen && screen.width) || 0, h: (window.screen && screen.height) || 0 },
                audio: {
                    aac:  ms('audio/mp4; codecs="mp4a.40.2"'),
                    flac: ms('audio/mp4; codecs="flac"'),
                    eac3: ms('audio/mp4; codecs="ec-3"'),
                    ac3:  ms('audio/mp4; codecs="ac-3"'),
                    opus: ms('audio/mp4; codecs="opus"')
                },
                video: {
                    h264: ms('video/mp4; codecs="avc1.640029"'),
                    hevc: ms('video/mp4; codecs="hvc1.1.6.L93.B0"'),
                    vp9:  ms('video/mp4; codecs="vp09.00.10.08"')
                }
            };
            try { caps.device = context.getDeviceCapabilities ? context.getDeviceCapabilities() : null; } catch (e) { caps.device = null; }
            try {
                fetch(baseUrl + 'cast/capabilities', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(caps)
                }).catch(function () {});
            } catch (e) {}
        }

    })();
    </script>
</body>
