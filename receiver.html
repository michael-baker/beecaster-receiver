<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{overflow:hidden;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
        video{position:fixed;inset:0;width:100%;height:100%;z-index:0;background-size:cover;background-position:center;filter:blur(14px) saturate(150%) hue-rotate(-10deg);transform:scale(1.06);pointer-events:none}
        #backdrop{position:fixed;inset:0;z-index:1;background-size:cover;background-position:center;opacity:0.35;filter:blur(42px) saturate(160%) hue-rotate(-10deg);transform:scale(1.08);pointer-events:none}
        #layout-container{position:fixed;inset:0;z-index:2;overflow:hidden}
        #debug-overlay{position:fixed;top:20px;right:20px;z-index:10000;background:rgba(0,0,0,0.95);color:#0f0;font-family:'Courier New',monospace;font-size:14px;padding:15px;border:3px solid #0f0;border-radius:8px;line-height:1.6;max-width:450px;box-shadow:0 0 30px rgba(0,255,0,0.5);pointer-events:none;overflow-y:auto;max-height:80vh}
        #debug-overlay div{margin:4px 0}.debug-label{color:#fa0;font-weight:bold}
        #splash{position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#3d2645 0%,#4a3052 50%,#5a4a6e 100%);transition:opacity .5s ease}
        #splash.hidden{opacity:0;pointer-events:none}
        .splash-logo{font-size:5vw;font-weight:700;color:#fff;font-family:'Product Sans','Google Sans',Roboto,sans-serif;text-shadow:0 0 40px rgba(233,75,158,.8);letter-spacing:.05em}
        .splash-sub{margin-top:1.5rem;font-size:1.5vw;color:rgba(255,255,255,.6);font-family:Roboto,sans-serif;letter-spacing:.12em}
    </style>
</head>
<body>
    <video id="receiverVideoElement"></video>
    <div id="backdrop"></div>
    <div id="splash">
        <div class="splash-logo">BeeCaster</div>
        <div class="splash-sub">Now casting from MusicBee</div>
    </div>
    <div id="layout-container"></div>
    <div id="debug-overlay">
        <div><span class="debug-label">BEECASTER DEBUG</span></div>
        <div>LOAD: <span id="debug-load-count">0</span></div>
        <div>Layout: <span id="debug-layout-hash">—</span></div>
        <div>ContentID: <span id="debug-content-id">—</span></div>
        <div>Fields: <span id="debug-fields">—</span></div>
        <div>State: <span id="debug-state">idle</span></div>
    </div>
    <script>
        // ============================================================================
        // BEECASTER BOOTSTRAP RECEIVER - GitHub Hosted Version
        // ============================================================================
        // This receiver is hosted on GitHub. It fetches layout/theme from the
        // local MusicBee plugin web server using MediaBaseUrl from customData.
        // ============================================================================

        const CHANNEL = 'urn:x-cast:com.google.cast.media';
        const LOG_TAG = 'BeeCaster';

        let castDebugLogger = null;
        try {
            castDebugLogger = cast.debug.CastDebugLogger.getInstance();
        } catch (e) {
            console.log('CastDebugLogger not available');
        }

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        if (castDebugLogger) {
            context.addEventListener(cast.framework.system.EventType.READY, () => {
                if (!castDebugLogger.debugOverlayElement_) {
                    castDebugLogger.setEnabled(true);
                    castDebugLogger.showDebugLogs(true);
                    castDebugLogger.info(LOG_TAG, 'Cast Debug Logger enabled');
                }
            });
            castDebugLogger.loggerLevelByEvents = {
                'cast.framework.events.category.CORE': cast.framework.LoggerLevel.INFO,
                'cast.framework.events.EventType.MEDIA_STATUS': cast.framework.LoggerLevel.DEBUG
            };
        }

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE |
            cast.framework.messages.Command.QUEUE_NEXT |
            cast.framework.messages.Command.QUEUE_PREV
        );

        // ============================================================================
        // STATE
        // ============================================================================
        const state = {
            media: {},
            customData: {},
            currentTimeSec: 0,
            durationSec: 0,
            playbackState: 'STOPPED'
        };

        let lastKnownPositionSec = 0;
        let lastKnownPositionTimestamp = 0;
        let isAnimatingProgress = false;
        let animationFrameId = null;

        let loadCount = 0;
        let lastLoadTimestamp = 0;
        let isLoadInProgress = false;
        let lastContentId = '';
        let lastBackgroundUrl = null;
        let lastRenderTime = 0;
        let lastLayoutHtmlHash = '';

        const LOAD_DEBOUNCE_MS = 500;
        const RENDER_DEBOUNCE_MS = 500;

        const eventListeners = {
            'LOAD': [], 'PLAY': [], 'PAUSE': [], 'STOP': [],
            'TIME_UPDATE': [], 'STATE_CHANGE': [], 'LAYOUT_READY': []
        };

        // ============================================================================
        // BEECASTER PUBLIC API
        // ============================================================================
        window.BeeCaster = {
            on(eventType, callback) {
                if (eventListeners[eventType]) {
                    eventListeners[eventType].push(callback);
                    console.log(`[API] Listener registered for ${eventType}`);
                } else {
                    console.warn(`[API] Unknown event type: ${eventType}`);
                }
            },
            onStateChange(callback) {
                this.on('STATE_CHANGE', callback);
            },
            getState() {
                return { ...state };
            },
            updateField(fieldName, value) {
                const fields = document.querySelectorAll(`[data-field="${fieldName}"]`);
                fields.forEach(node => {
                    if (fieldName === 'progressFill') {
                        node.style.width = value || '0%';
                    } else if (fieldName === 'albumArtUrl') {
                        node.src = value || '';
                    } else {
                        const newText = value || '';
                        if (node.textContent !== newText) {
                            node.textContent = newText;
                        }
                    }
                });
            }
        };

        // ============================================================================
        // INTERNAL FUNCTIONS
        // ============================================================================
        function emit(eventType, data) {
            if (eventListeners[eventType]) {
                eventListeners[eventType].forEach(cb => {
                    try { cb(data); } catch (e) {
                        console.error(`Error in ${eventType} listener:`, e);
                    }
                });
            }
        }

        function updateState(updates) {
            Object.assign(state, updates);
            emit('STATE_CHANGE', { ...state });
            updateDebugOverlay();
        }

        function formatSeconds(value) {
            if (!value || value < 0) return '0:00';
            const whole = Math.floor(value);
            const h = Math.floor(whole / 3600);
            const m = Math.floor((whole % 3600) / 60);
            const s = whole % 60;
            if (h > 0) {
                return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        // ============================================================================
        // PROGRESS ANIMATION
        // ============================================================================
        function updateProgressSmooth() {
            if (!isAnimatingProgress || state.durationSec <= 0) return;
            const now = Date.now();
            const elapsedMs = now - lastKnownPositionTimestamp;
            const elapsedSec = elapsedMs / 1000;
            const smoothPosition = lastKnownPositionSec + elapsedSec;
            const ratio = Math.min(100, Math.max(0, (smoothPosition / state.durationSec) * 100));

            window.BeeCaster.updateField('progressFill', `${ratio.toFixed(2)}%`);

            const now2 = Date.now();
            if (now2 - lastRenderTime >= RENDER_DEBOUNCE_MS) {
                const currentText = formatSeconds(smoothPosition);
                window.BeeCaster.updateField('currentPositionText', currentText);
                lastRenderTime = now2;
            }

            if (smoothPosition >= state.durationSec) {
                isAnimatingProgress = false;
                return;
            }

            animationFrameId = requestAnimationFrame(updateProgressSmooth);
        }

        function startProgressAnimation(positionSec, timestamp) {
            lastKnownPositionSec = positionSec;
            lastKnownPositionTimestamp = timestamp;
            isAnimatingProgress = true;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            updateProgressSmooth();
        }

        function stopProgressAnimation() {
            isAnimatingProgress = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        // ============================================================================
        // LAYOUT INJECTION — content delivered via Cast LOAD customData
        // (avoids mixed-content: receiver is HTTPS, local server is HTTP)
        // ============================================================================
        function simpleHash(str) {
            if (!str) return '';
            let h = 0;
            for (let i = 0; i < str.length; i++) {
                h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
            }
            return String(h);
        }

        function injectLayout(layoutHtml, themeCss) {
            const hash = simpleHash(layoutHtml);
            if (hash && hash === lastLayoutHtmlHash) {
                console.log('[LAYOUT] Same layout content, skipping re-inject');
                return;
            }
            lastLayoutHtmlHash = hash;

            if (layoutHtml) {
                document.getElementById('layout-container').innerHTML = layoutHtml;
                console.log('[LAYOUT] Injected layout HTML (' + layoutHtml.length + ' chars)');
            } else {
                console.warn('[LAYOUT] No LayoutHtml provided in customData');
            }

            if (themeCss) {
                let style = document.getElementById('dynamic-theme');
                if (!style) {
                    style = document.createElement('style');
                    style.id = 'dynamic-theme';
                    document.head.appendChild(style);
                }
                style.textContent = themeCss;
                console.log('[THEME] Injected theme CSS (' + themeCss.length + ' chars)');
            } else {
                console.warn('[THEME] No ThemeCss provided in customData');
            }

            emit('LAYOUT_READY', {});
            updateDebugOverlay();
        }

        function hideSplash() {
            const splash = document.getElementById('splash');
            if (splash) {
                splash.classList.add('hidden');
                setTimeout(() => { if (splash.parentNode) splash.parentNode.removeChild(splash); }, 600);
            }
        }

        // ============================================================================
        // BACKGROUND IMAGE
        // ============================================================================
        function setBackground(artUrl) {
            if (!artUrl) return;
            if (lastBackgroundUrl === artUrl) return;

            const videoElement = document.getElementById('receiverVideoElement');
            const backdropElement = document.getElementById('backdrop');

            const img = new Image();
            img.onload = () => {
                videoElement.style.backgroundImage = `linear-gradient(135deg, rgba(61, 38, 69, 0.75) 0%, rgba(74, 48, 82, 0.65) 50%, rgba(90, 74, 110, 0.75) 100%), url("${artUrl}")`;
                backdropElement.style.backgroundImage = `url("${artUrl}")`;
                lastBackgroundUrl = artUrl;
            };
            img.onerror = () => {
                console.error('Failed to load background:', artUrl);
                lastBackgroundUrl = null;
            };
            img.src = artUrl;
        }

        // ============================================================================
        // CAST MESSAGE INTERCEPTOR - LOAD HANDLER
        // ============================================================================
        playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, request => {
            loadCount++;
            const now = Date.now();
            const timeSinceLastLoad = now - lastLoadTimestamp;

            console.log(`=== LOAD #${loadCount} === Time since last: ${timeSinceLastLoad}ms`);

            if (timeSinceLastLoad < LOAD_DEBOUNCE_MS && loadCount > 1) {
                console.warn(`LOAD too soon, ignoring`);
                return request;
            }

            if (isLoadInProgress) {
                console.warn('LOAD in progress, ignoring');
                return request;
            }

            lastLoadTimestamp = now;
            isLoadInProgress = true;

            try {
                lastContentId = request.media?.contentId || '';
                state.media = request.media || {};
                state.customData = state.media.customData || {};

                console.log(`[CONFIG] CustomData fields: ${Object.keys(state.customData).length}`);

                // Inject layout/theme — content is embedded in customData by the sender
                injectLayout(state.customData.LayoutHtml || null, state.customData.ThemeCss || null);

                const metadata = state.media.metadata || {};
                const images = metadata.images || [];
                const artUrl = images.length > 0 ? images[0].url : '';

                updateState({
                    media: state.media,
                    customData: state.customData,
                    durationSec: state.media.duration || 0
                });

                // Update all UI fields
                window.BeeCaster.updateField('trackTitle', metadata.title || state.customData.TrackTitle || 'Unknown');
                window.BeeCaster.updateField('artist', metadata.artist || state.customData.Artist || 'Unknown');
                window.BeeCaster.updateField('album', metadata.albumName || state.customData.Album || '');
                window.BeeCaster.updateField('albumArtist', metadata.albumArtist || state.customData.AlbumArtist || '');
                window.BeeCaster.updateField('genre', state.customData.Genre || '');
                window.BeeCaster.updateField('year', state.customData.Year || '');
                window.BeeCaster.updateField('trackNumber', state.customData.TrackNumber || '');
                window.BeeCaster.updateField('position', state.customData.Position || '');
                window.BeeCaster.updateField('next', state.customData.Next || '');
                window.BeeCaster.updateField('properties', state.customData.Properties || '');
                window.BeeCaster.updateField('audioCodec', state.customData.AudioCodec || '');
                window.BeeCaster.updateField('qualityLevel', state.customData.QualityLevel || '');
                window.BeeCaster.updateField('durationText', formatSeconds(state.durationSec));
                window.BeeCaster.updateField('albumArtUrl', artUrl);

                setBackground(artUrl);
                hideSplash();

                emit('LOAD', { contentId: lastContentId, customData: state.customData });
                console.log('=== LOAD complete ===');
                updateDebugOverlay();
            } catch (error) {
                console.error('Error in LOAD:', error);
            } finally {
                isLoadInProgress = false;
            }

            return request;
        });

        // ============================================================================
        // PLAYER STATE SYNCHRONIZATION
        // ============================================================================
        const playerData = {};
        const playerDataBinder = new cast.framework.ui.PlayerDataBinder(playerData);
        playerDataBinder.addEventListener(cast.framework.ui.PlayerDataEventType.CURRENT_TIME_CHANGED, e => {
            const now = Date.now();
            const timeSinceLastRender = now - lastRenderTime;
            state.currentTimeSec = Number(e.value || 0);
            if (timeSinceLastRender >= RENDER_DEBOUNCE_MS) {
                lastRenderTime = now;
                startProgressAnimation(state.currentTimeSec, now);
                emit('TIME_UPDATE', { currentTime: state.currentTimeSec, duration: state.durationSec });
            }
        });

        // ============================================================================
        // PLAYER EVENT LISTENERS
        // ============================================================================
        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            console.log('Player load complete');
        });

        playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
            console.error('Player error:', event.detailedErrorCode, event.error);
        });

        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, () => {
            console.log('PLAYING');
            state.playbackState = 'PLAYING';
            startProgressAnimation(state.currentTimeSec, Date.now());
            emit('PLAY', {});
            updateState({ playbackState: 'PLAYING' });
        });

        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, () => {
            console.log('PAUSED');
            state.playbackState = 'PAUSED';
            stopProgressAnimation();
            emit('PAUSE', {});
            updateState({ playbackState: 'PAUSED' });
        });

        playerManager.addEventListener(cast.framework.events.EventType.STOPPED, () => {
            console.log('STOPPED');
            state.playbackState = 'STOPPED';
            stopProgressAnimation();
            emit('STOP', {});
            updateState({ playbackState: 'STOPPED' });
        });

        playerManager.addEventListener(cast.framework.events.EventType.REQUEST_QUEUE_UPDATE, event => {
            const next = event.requestData && event.requestData.jump == 1;
            context.sendCustomMessage(CHANNEL, undefined, {
                type: next ? 'NEXT' : 'PREVIOUS',
                message: next ? 'NEXT' : 'PREVIOUS'
            });
        });

        // ============================================================================
        // DEBUG OVERLAY UPDATES
        // ============================================================================
        function updateDebugOverlay() {
            try {
                document.getElementById('debug-load-count').textContent = loadCount;
                document.getElementById('debug-layout-hash').textContent = lastLayoutHtmlHash || '—';
                document.getElementById('debug-content-id').textContent = lastContentId.substring(0, 20) || '—';
                document.getElementById('debug-fields').textContent = Object.keys(state.customData).length;
                document.getElementById('debug-state').textContent = state.playbackState;
            } catch (e) {}
        }

        // ============================================================================
        // STARTUP
        // ============================================================================
        console.log('[BOOTSTRAP] BeeCaster receiver initialising (github.io hosted)');
        console.log('[BOOTSTRAP] Layout/theme injected via Cast LOAD customData — no device-side fetch');
        console.log('[BOOTSTRAP] Waiting for LOAD message...');

        const options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = Object.assign({});
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;
        options.mediaElement = document.getElementById('receiverVideoElement');
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600;
        options.debug = true;

        context.start(options);
    </script>
</body>
</html>
