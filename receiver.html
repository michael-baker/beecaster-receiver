<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BeeCaster Receiver</title>
    <script type="text/javascript" src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- hls.js: Chromecast does not support HLS via canPlayType; MSE (hls.js) is required -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <style>
        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            background: #000;
        }

        /* Pause overlay — fades to black when audio is paused so the stale
           HLS buffer drain is hidden rather than looking like a sync error. */
        #pause-overlay {
            position: absolute;
            inset: 0;
            background: #000;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
            z-index: 10;
        }

        /* CAF audio element — invisible but functional for audio playback */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* HLS background video — full screen, shown after manifest loads */
        #hls-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            display: none;
        }
    </style>
</head>
<body>
    <!-- CAF audio element; class="castMediaElement" lets CAF auto-discover it -->
    <video id="receiverVideoElement" class="castMediaElement"></video>
    <!-- HLS background: shows the WebView2 preview stream captured by FFmpeg -->
    <video id="hls-bg" muted playsinline autoplay></video>
    <!-- Black overlay that fades in on pause to hide the HLS buffer drain -->
    <div id="pause-overlay"></div>

    <script>
        const CHANNEL = 'urn:x-cast:com.google.cast.media';
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        playerManager.setSupportedMediaCommands(
            cast.framework.messages.Command.ALL_BASIC_MEDIA |
            cast.framework.messages.Command.PAUSE |
            cast.framework.messages.Command.QUEUE_NEXT |
            cast.framework.messages.Command.QUEUE_PREV
        );

        // Suppress UI updates for preloaded (queued-next) tracks
        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.PRELOAD,
            request => request
        );

        // On LOAD: extract MediaBaseUrl from customData and start background video
        playerManager.setMessageInterceptor(cast.framework.messages.MessageType.LOAD, request => {
            const baseUrl = (request.media && request.media.customData && request.media.customData.MediaBaseUrl) || '';
            console.log('[receiver] LOAD interceptor: baseUrl=' + baseUrl);
            if (baseUrl) {
                _castBaseUrl = baseUrl;
                _fetchRemoteLogSetting(baseUrl);
                // CAF IS the audio source in caf_wav_sync — must remain unmuted.
                var caf = document.getElementById('receiverVideoElement');
                if (caf) caf.muted = false;
                try {
                    // The HLS video pipeline runs continuously across track changes —
                    // don't destroy and recreate the player on every LOAD.
                    if (!_splitVideoHls) {
                        _showAudioSyncOverlay();
                        resetBgVideo();
                        startCafWavSync(baseUrl);
                    } else {
                        console.log('[receiver] LOAD: HLS already running — skipping reset');
                    }
                } catch (e) {
                    console.error('[receiver] startCafWavSync threw (non-fatal):', e && e.message ? e.message : String(e));
                }
                _startCalibrationWatch();
            }
            return request;
        });

        var _pauseRevealTimer = null;
        var _loadSyncActive = false;       // true while the initial load overlay covers the HLS video
        var _audioSyncOverlayTimer = null; // timer to lift the load overlay

        // On PAUSE: fade to black immediately so the stale HLS buffer drain is hidden.
        playerManager.addEventListener(cast.framework.events.EventType.PAUSE, function () {
            var overlay = document.getElementById('pause-overlay');
            if (_audioSyncOverlayTimer) { clearTimeout(_audioSyncOverlayTimer); _audioSyncOverlayTimer = null; }
            _loadSyncActive = false;
            if (overlay) overlay.style.opacity = '1';
            if (_pauseRevealTimer) { clearTimeout(_pauseRevealTimer); _pauseRevealTimer = null; }

            // Pause the HLS video so it doesn't drift during the audio pause.
            if (_splitVideoHls) {
                var bg = document.getElementById('hls-bg');
                if (bg) try { bg.pause(); } catch (e) {}
            }

            _pauseRevealTimer = setTimeout(function () {
                _pauseRevealTimer = null;
                if (overlay) overlay.style.opacity = '0';
            }, 1500);

            // Notify plugin that CC has entered PAUSED state.
            if (_castBaseUrl) {
                fetch(_castBaseUrl + 'cast/ack', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ state: 'PAUSED' })
                }).catch(function () {});
            }
        });

        // On PLAYING (resume): seek video to live edge, fade out overlay.
        // On initial load _loadSyncActive is true so the overlay stays until the timer fires.
        playerManager.addEventListener(cast.framework.events.EventType.PLAYING, function () {
            var bg      = document.getElementById('hls-bg');
            var overlay = document.getElementById('pause-overlay');
            if (_pauseRevealTimer) { clearTimeout(_pauseRevealTimer); _pauseRevealTimer = null; }
            if (bg && _splitVideoHls) {
                if (_splitVideoHls.liveSyncPosition) {
                    bg.currentTime = _splitVideoHls.liveSyncPosition;
                }
                if (bg.paused) bg.play().catch(function (e) { console.warn('[hls-bg] resume play() rejected:', e); });
            }
            if (overlay && !_loadSyncActive) overlay.style.opacity = '0';
            // Notify plugin that CC has entered PLAYING state.
            if (_castBaseUrl) {
                fetch(_castBaseUrl + 'cast/ack', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ state: 'PLAYING' })
                }).catch(function () {});
            }
        });

        // Forward next/previous queue jumps back to the plugin
        playerManager.addEventListener(cast.framework.events.EventType.REQUEST_QUEUE_UPDATE, function (event) {
            var next = event.requestData && event.requestData.jump == 1;
            context.sendCustomMessage(CHANNEL, undefined, {
                type: next ? 'NEXT' : 'PREVIOUS',
                message: next ? 'NEXT' : 'PREVIOUS'
            });
        });

        context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, function () {
            context.stop();
        });

        var options = new cast.framework.CastReceiverOptions();
        options.customNamespaces = {};
        options.customNamespaces[CHANNEL] = cast.framework.system.MessageType.JSON;
        options.disableIdleTimeout = false;
        options.maxInactivity = 3600;
        options.mediaElement = document.getElementById('receiverVideoElement');

        window.onerror = function (msg, src, line, col, err) {
            console.error('[CRASH] Uncaught error:', msg, 'at', src, line + ':' + col, err);
        };
        window.addEventListener('unhandledrejection', function (e) {
            console.error('[CRASH] Unhandled promise rejection:', e.reason);
        });

        context.start(options);

        // Remote logging — gated by the EnableReceiverLog server setting.
        // Re-fetched on every LOAD so the checkbox in settings takes effect without
        // restarting the cast session. Off by default — zero HTTP traffic until enabled.
        var _remoteLogEnabled = false;

        function _postRemoteLog(entry) {
            if (!_remoteLogEnabled || !_castBaseUrl) return;
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', _castBaseUrl + 'cast/log', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.send(JSON.stringify(entry));
            } catch(e) { /* never let remote logging break the app */ }
        }

        function _sendRemoteLog(level, args) {
            if (!_remoteLogEnabled) return;
            var msg;
            try {
                msg = Array.prototype.map.call(args, function(a) {
                    if (a == null) return String(a);
                    try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
                    catch(e) { return '[unserializable]'; }
                }).join(' ');
            } catch(e) { msg = '[log serialization error]'; }
            _postRemoteLog({ level: level, message: msg, ts: new Date().toISOString() });
        }

        (function() {
            ['log', 'info', 'warn', 'error'].forEach(function(m) {
                var _orig = console[m].bind(console);
                console[m] = function() { _orig.apply(console, arguments); _sendRemoteLog(m, arguments); };
            });
            window.onerror = function(msg, src, line) {
                _sendRemoteLog('error', ['[uncaught] ' + msg + ' (' + src + ':' + line + ')']);
                return false;
            };
            window.addEventListener('unhandledrejection', function(e) {
                var r = e.reason;
                _sendRemoteLog('error', ['[unhandledrejection] ' + (r && r.message ? r.message : String(r))]);
            });
        })();

        function _fetchRemoteLogSetting(baseUrl) {
            try {
                fetch(baseUrl + 'api/settings')
                    .then(function(r) { return r.ok ? r.json() : null; })
                    .then(function(cfg) {
                        _remoteLogEnabled = !!(cfg && cfg.enableReceiverLog);
                        console.log('[receiver] remote log ' + (_remoteLogEnabled ? 'enabled' : 'disabled'));
                    })
                    .catch(function() { _remoteLogEnabled = false; });
            } catch(e) { _remoteLogEnabled = false; }
        }

        var _hlsStarted    = false;
        var _splitVideoHls = null;
        var _syncTimer     = null;   // A/V sync loop interval handle
        var _castBaseUrl   = '';     // set on LOAD from customData.MediaBaseUrl
        var _calibPollTimer = null;
        var _sawCalibrationMode = false;

        function _postSplitTelemetry(data) {
            if (!_castBaseUrl) return;
            try {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', _castBaseUrl + 'cast/telemetry', true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.send(JSON.stringify(data));
            } catch(e) { /* never let telemetry break the stream */ }
        }

        // Load overlay: shown immediately on LOAD to cover the HLS video until CAF has
        // consumed its ~9 s audio pre-buffer. Fades out after 14 s (3 s during calibration).
        function _showAudioSyncOverlay() {
            var overlay = document.getElementById('pause-overlay');
            if (!overlay) return;
            if (_audioSyncOverlayTimer) { clearTimeout(_audioSyncOverlayTimer); _audioSyncOverlayTimer = null; }
            _loadSyncActive = true;
            overlay.style.opacity = '1';
            fetch(_castBaseUrl + 'cast/state')
                .then(function (r) { return r.json(); })
                .then(function (s) {
                    var delayMs = s.calibrationMode ? 3000 : 14000;
                    _audioSyncOverlayTimer = setTimeout(function () {
                        _audioSyncOverlayTimer = null;
                        _loadSyncActive = false;
                        overlay.style.opacity = '0';
                    }, delayMs);
                })
                .catch(function () {
                    _audioSyncOverlayTimer = setTimeout(function () {
                        _audioSyncOverlayTimer = null;
                        _loadSyncActive = false;
                        overlay.style.opacity = '0';
                    }, 14000);
                });
        }

        // Destroys the HLS video player, clearing all MSE source buffers.
        function resetBgVideo() {
            var video = document.getElementById('hls-bg');
            if (_splitVideoHls) {
                try { _splitVideoHls.destroy(); } catch (e) {}
                _splitVideoHls = null;
            }
            _hlsStarted = false;
            if (_syncTimer) { clearInterval(_syncTimer); _syncTimer = null; }
            if (video) { try { video.pause(); } catch (e) {} video.style.display = 'none'; }
            console.log('[receiver] bg video reset — buffers dropped');
        }

        // Polls /cast/state to detect calibration mode transitions.
        // On start: seeks video to live edge so the calibration display appears promptly.
        // On end: seeks back to live edge to flush calibration frames.
        function _startCalibrationWatch() {
            if (_calibPollTimer) { clearTimeout(_calibPollTimer); }
            _calibPollTimer = setTimeout(_calibPoll, 1000);
        }

        function _calibPoll() {
            _calibPollTimer = null;
            if (!_castBaseUrl) return;
            fetch(_castBaseUrl + 'cast/state')
                .then(function (r) { return r.json(); })
                .then(function (s) {
                    if (s.calibrationMode) {
                        if (!_sawCalibrationMode) {
                            _sawCalibrationMode = true;
                            setTimeout(function () {
                                var bg = document.getElementById('hls-bg');
                                if (bg && _splitVideoHls && _splitVideoHls.liveSyncPosition) {
                                    bg.currentTime = _splitVideoHls.liveSyncPosition;
                                    console.log('[receiver] calibration start — video seeked to live edge ' + _splitVideoHls.liveSyncPosition.toFixed(2));
                                }
                            }, 3000);
                        }
                        _calibPollTimer = setTimeout(_calibPoll, 1000);
                    } else if (_sawCalibrationMode) {
                        _sawCalibrationMode = false;
                        console.log('[receiver] calibration ended — seeking to live edge');
                        setTimeout(function () {
                            var bg = document.getElementById('hls-bg');
                            if (bg && _splitVideoHls && _splitVideoHls.liveSyncPosition) {
                                bg.currentTime = _splitVideoHls.liveSyncPosition;
                            }
                        }, 3000);
                    }
                })
                .catch(function () {
                    if (_sawCalibrationMode) {
                        _calibPollTimer = setTimeout(_calibPoll, 2000);
                    }
                });
        }

        // ─── CAF WAV Sync mode ────────────────────────────────────────────────────────
        // CAF plays /cast/caf-audio as its ContentId (raw WAV stream, hardware audio path).
        // The split_video HLS pipeline runs as a muted background video; its playbackRate
        // is steered by an audio-clock-driven sync loop to stay locked to CAF's position.
        function startCafWavSync(baseUrl) {
            if (_hlsStarted || !baseUrl) return;
            var video = document.getElementById('hls-bg');
            if (!video) return;
            if (typeof Hls === 'undefined' || !Hls.isSupported()) {
                console.error('[caf-wav-sync] hls.js not available or MSE not supported');
                return;
            }

            _hlsStarted = true;

            var caf = document.getElementById('receiverVideoElement');
            if (caf) caf.muted = false;

            fetch(baseUrl + 'api/settings')
                .then(function (r) { return r.ok ? r.json() : null; })
                .catch(function () { return null; })
                .then(function (cfg) {
                    var liveSyncDurationCount       = (cfg && cfg.hlsLiveSyncSegments > 0)   ? cfg.hlsLiveSyncSegments   : 3;
                    var liveMaxLatencyDurationCount = (cfg && cfg.hlsMaxLatencySegments > 0) ? cfg.hlsMaxLatencySegments : 6;
                    // maxBufferLength must exceed cafBufS (~9 s) so after the initial
                    // hard-seek the player can sustain the lookback position.
                    // backBufferLength retains already-played segments so seek-back works.
                    var maxBufferLength  = 25;
                    var backBufferLength = 20;

                    _splitVideoHls = new Hls({
                        lowLatencyMode: false,
                        liveSyncDurationCount: liveSyncDurationCount,
                        liveMaxLatencyDurationCount: liveMaxLatencyDurationCount,
                        maxBufferLength: maxBufferLength,
                        backBufferLength: backBufferLength,
                        // Disable hls.js Worker: in the Cast receiver context the Worker
                        // runs in a separate V8 isolate which can cause GC pressure.
                        enableWorker: false,
                        abrEnabled: false,
                        startLevel: 0,
                        manifestLoadingMaxRetry: 12,
                        manifestLoadingRetryDelay: 1000,
                        manifestLoadingMaxRetryTimeout: 12000,
                    });

                    _splitVideoHls.loadSource(baseUrl + 'cast/split_video/stream.m3u8');
                    _splitVideoHls.attachMedia(video);

                    _splitVideoHls.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.muted = true;
                        video.style.display = 'block';
                        var pos = _splitVideoHls.liveSyncPosition;
                        if (pos != null) { video.currentTime = pos; }
                        video.play().catch(function (e) { console.warn('[caf-wav-sync] video play() rejected:', e); });
                        console.log('[caf-wav-sync] video manifest parsed — starting sync loop');
                        _cafWavSyncVideoSync();
                    });

                    _splitVideoHls.on(Hls.Events.ERROR, function (evt, data) {
                        if (!data.fatal) return;
                        console.error('[caf-wav-sync] video fatal HLS error:', data.type, data.details);
                        if (_splitVideoHls) { try { _splitVideoHls.destroy(); } catch (e) {} _splitVideoHls = null; }
                        if (_syncTimer) { clearInterval(_syncTimer); _syncTimer = null; }
                        _hlsStarted = false;
                        setTimeout(function () { startCafWavSync(baseUrl); }, 3000);
                    });
                });
        }

        // Audio-clock-driven A/V sync for caf_wav_sync.
        //
        // CAF buffers ~9 s of WAV audio ahead of its playback position (fixed by the
        // Chromecast media player; we cannot reduce it).  The HLS video must therefore
        // also run ~9 s behind its own live edge to stay in sync.
        //
        //   cafBufS   = (serverAudioMs - epochMs) / 1000 + wallElapsedSincePoll - caf.currentTime
        //             = seconds of audio buffered by CAF but not yet played
        //   videoBufS = liveSyncPosition - video.currentTime
        //             = seconds of video buffered ahead of currentTime
        //   drift     = videoBufS - cafBufS
        //     > 0  video has more buffer than audio  → video is running too close to live edge
        //     < 0  video has less buffer than audio  → video is ahead of audio
        //
        // Strategy:
        //   |drift| > SEEK_THRESHOLD  → hard-seek video.currentTime to liveSyncPosition - cafBufS
        //   |drift| > DEAD_ZONE       → gentle rate trim (±8%)
        //   |drift| < DEAD_ZONE       → rate = 1.0
        //
        // Audio-clock is polled on a separate slower timer (every CLOCK_POLL_MS) to
        // reduce HTTP overhead; the sync loop itself runs at SYNC_TICK_MS.
        function _cafWavSyncVideoSync() {
            if (_syncTimer) clearInterval(_syncTimer);
            var SYNC_TICK_MS   = 200;   // sync evaluation interval
            var CLOCK_POLL_MS  = 2000;  // how often to refresh cafBufS from server
            var SEEK_THRESHOLD = 1.0;   // seconds: hard-seek when drift exceeds this
            var DEAD_ZONE      = 0.15;  // seconds: no correction within this band
            var SEEK_COOLDOWN  = 3000;  // ms: suppress seeks for this long after a seek
            var ANOMALY_CAP    = 60.0;  // seconds: discard readings beyond this (true glitch)

            var _lastLoggedRate      = 1.0;
            var _graceUntil          = Date.now() + 8000; // ignore first 8 s while HLS latches
            var _cafEpochMs          = -1;  // -1 = not yet connected (0 is a valid epoch)
            var _cafServerMs         = 0;
            var _lastClockPollAt     = 0;
            var _cafLastPollReturnMs = 0;   // wall time when last poll response arrived
            var _clockPollActive     = false;
            var _lastHardSeekAt      = 0;

            function _pollAudioClock() {
                if (!_castBaseUrl || _clockPollActive) return;
                _clockPollActive = true;
                fetch(_castBaseUrl + 'cast/audio-clock', { cache: 'no-store' })
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (d) {
                        if (d) {
                            // epochMs: server returns -1 until CAF has connected; 0 is a valid epoch
                            // (CAF connects before the first audio sample is produced).
                            _cafEpochMs  = (typeof d.epochMs === 'number') ? d.epochMs : -1;
                            _cafServerMs = d.audioMs  || 0;
                            _cafLastPollReturnMs = Date.now();
                        }
                    })
                    .catch(function () {})
                    .finally(function () { _clockPollActive = false; });
            }

            _syncTimer = setInterval(function () {
                var now = Date.now();

                // Refresh audio-clock at the slower rate
                if (now - _lastClockPollAt >= CLOCK_POLL_MS) {
                    _lastClockPollAt = now;
                    _pollAudioClock();
                }

                if (!_splitVideoHls) return;
                var video = document.getElementById('hls-bg');
                if (!video || video.paused) return;
                if (now < _graceUntil) return;
                if (_cafEpochMs < 0 || _cafServerMs === 0) return; // -1 = epoch not yet set

                var caf = document.getElementById('receiverVideoElement');
                if (!caf) return;

                var videoSync = _splitVideoHls.liveSyncPosition;
                if (videoSync == null) return;

                // Compensate for stale server clock: _cafServerMs was captured up to
                // CLOCK_POLL_MS ms ago. Both the hardware audio clock and caf.currentTime
                // advance at ~1 s/s, so adding the elapsed wall-clock time keeps cafBufS
                // approximately stable between polls and removes the sawtooth artifact.
                var wallElapsed = _cafLastPollReturnMs > 0 ? Math.min((now - _cafLastPollReturnMs) / 1000, CLOCK_POLL_MS / 1000 + 1.0) : 0;
                var cafBufS   = (_cafServerMs - _cafEpochMs) / 1000 + wallElapsed - caf.currentTime;
                var videoBufS = videoSync - video.currentTime;
                var drift     = videoBufS - cafBufS;

                // Discard only truly broken readings (liveSyncPosition spike, epoch not set yet)
                if (cafBufS < 0 || cafBufS > ANOMALY_CAP || Math.abs(drift) > ANOMALY_CAP) {
                    console.warn('[caf-wav-sync] sync: anomalous reading — cafBuf=' + (cafBufS * 1000).toFixed(0) + 'ms videoBuf=' + (videoBufS * 1000).toFixed(0) + 'ms drift=' + (drift * 1000).toFixed(0) + 'ms — skipping');
                    return;
                }

                // Large drift: hard-seek video to liveSyncPosition - cafBufS
                if (Math.abs(drift) > SEEK_THRESHOLD && (now - _lastHardSeekAt) > SEEK_COOLDOWN) {
                    var targetTime = videoSync - cafBufS;
                    // Clamp: stay inside the buffered range; never past the live edge
                    if (video.buffered.length > 0) {
                        targetTime = Math.max(video.buffered.start(0) + 0.1, targetTime);
                    }
                    targetTime = Math.min(videoSync - 0.2, targetTime);
                    if (targetTime > 0 && targetTime < videoSync) {
                        video.currentTime = targetTime;
                        video.playbackRate = 1.0;
                        _lastHardSeekAt = now;
                        _lastLoggedRate = 1.0;
                        console.log('[caf-wav-sync] hard-seek: cafBuf=' + (cafBufS * 1000).toFixed(0) + 'ms videoBuf=' + (videoBufS * 1000).toFixed(0) + 'ms drift=' + (drift * 1000).toFixed(0) + 'ms → seekTo=' + targetTime.toFixed(3));
                        _postSplitTelemetry({ type: 'caf_seek', cafBufMs: Math.round(cafBufS * 1000), videoBufMs: Math.round(videoBufS * 1000), driftMs: Math.round(drift * 1000), targetTime: targetTime });
                    }
                    return;
                }

                // Dead zone: no correction
                if (Math.abs(drift) < DEAD_ZONE) {
                    if (video.playbackRate !== 1.0) {
                        video.playbackRate = 1.0;
                        console.log('[caf-wav-sync] sync: dead zone — rate=1.0');
                        _lastLoggedRate = 1.0;
                    }
                    return;
                }

                // Small drift: proportional rate trim, capped at ±8%
                var rate = 1.0 + Math.max(-0.08, Math.min(0.08, drift * 0.2));
                video.playbackRate = rate;
                var roundedRate = Math.round(rate * 1000);
                if (Math.abs(roundedRate - Math.round(_lastLoggedRate * 1000)) >= 3) {
                    console.log('[caf-wav-sync] sync: cafBuf=' + (cafBufS * 1000).toFixed(0) + 'ms videoBuf=' + (videoBufS * 1000).toFixed(0) + 'ms drift=' + (drift * 1000).toFixed(0) + 'ms rate=' + rate.toFixed(3));
                    _lastLoggedRate = rate;
                }
            }, SYNC_TICK_MS);
        }
    </script>
</body>
</html>
